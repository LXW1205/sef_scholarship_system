<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reports - ScholarNet Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: 'hsl(222.2 47.4% 11.2%)', foreground: 'hsl(210 40% 98%)' },
                        secondary: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(222.2 47.4% 11.2%)' },
                        muted: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(215.4 16.3% 46.9%)' },
                        background: 'hsl(0 0% 100%)',
                    }
                }
            }
        }
    </script>
</head>

<body class="font-sans antialiased bg-muted/30">
    <div id="header-container"></div>

    <main class="min-h-screen py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="text-3xl font-bold mb-6">System Reports</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl border hover:shadow-lg transition-all">
                    <i data-lucide="bar-chart" class="w-10 h-10 text-primary mb-4"></i>
                    <h3 class="text-xl font-bold mb-2">Application Statistics</h3>
                    <p class="text-sm text-gray-500 mb-4">View application trends over time.</p>
                    <button class="text-primary font-medium hover:underline">View Report</button>
                </div>
                <div class="bg-white p-6 rounded-xl border hover:shadow-lg transition-all">
                    <i data-lucide="users" class="w-10 h-10 text-primary mb-4"></i>
                    <h3 class="text-xl font-bold mb-2">User Demographics</h3>
                    <p class="text-sm text-gray-500 mb-4">Analyze user registration data.</p>
                    <button class="text-primary font-medium hover:underline">View Report</button>
                </div>
                <div class="bg-white p-6 rounded-xl border hover:shadow-lg transition-all">
                    <i data-lucide="award" class="w-10 h-10 text-primary mb-4"></i>
                    <h3 class="text-xl font-bold mb-2">Scholarship Performance</h3>
                    <p class="text-sm text-gray-500 mb-4">Track which scholarships are most popular.</p>
                    <button class="text-primary font-medium hover:underline">View Report</button>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-container"></div>
    <script src="/common.js"></script>
</body>

</html>
