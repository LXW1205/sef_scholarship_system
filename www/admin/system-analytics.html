<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reports - ScholarNet Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: 'hsl(222.2 47.4% 11.2%)', foreground: 'hsl(210 40% 98%)' },
                        secondary: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(222.2 47.4% 11.2%)' },
                        muted: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(215.4 16.3% 46.9%)' },
                        background: 'hsl(0 0% 100%)',
                    }
                }
            }
        }
    </script>
</head>

<body class="font-sans antialiased bg-muted/30">
    <div id="header-container"></div>

    <main class="min-h-screen py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Analytics Charts Section (Now at Top) -->
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-8">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Application Trends (Bar Chart) -->
                    <div class="lg:col-span-2 bg-white p-6 rounded-xl border shadow-sm">
                        <div class="flex flex-col md:flex-row justify-between items-center mb-6">
                            <h3 class="text-xl font-bold">Application Trends</h3>
                            <div class="flex gap-3 mt-4 md:mt-0">
                                <select id="timeRange" class="px-4 py-2 bg-background border border-input rounded-lg">
                                    <option value="all">All Time</option>
                                    <option value="year">Past Year</option>
                                    <option value="month">Past Month</option>
                                    <option value="week">Past Week</option>
                                </select>
                                <button onclick="exportCSV()"
                                    class="flex items-center gap-2 px-4 py-2 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90">
                                    <i data-lucide="download" class="w-4 h-4"></i> Export CSV
                                </button>
                            </div>
                        </div>
                        <div class="relative h-96 w-full">
                            <canvas id="analyticsChart"></canvas>
                        </div>
                    </div>

                    <!-- User Distribution (Pie Chart) -->
                    <div class="bg-white p-6 rounded-xl border shadow-sm">
                        <h3 class="text-xl font-bold mb-6">User Distribution</h3>
                        <div class="relative h-64 w-full flex justify-center">
                            <canvas id="userChart"></canvas>
                        </div>
                        <div class="mt-6 space-y-2" id="userLegend">
                            <!-- Legend will be populated by JS if needed, or ChartJS handles it -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Summary Cards (Moved to Bottom) -->
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Total Users -->
                    <div class="bg-white p-6 rounded-xl border hover:shadow-lg transition-all">
                        <i data-lucide="bar-chart" class="w-10 h-10 text-primary mb-4"></i>
                        <h3 class="text-xl font-bold mb-2">Total Users</h3>
                        <p id="totalUsers" class="text-3xl font-bold text-gray-800">Loading...</p>
                        <p class="text-sm text-gray-500 mt-2">Registered in system</p>
                    </div>
                    <!-- Pending Apps -->
                    <div class="bg-white p-6 rounded-xl border hover:shadow-lg transition-all">
                        <i data-lucide="users" class="w-10 h-10 text-primary mb-4"></i>
                        <h3 class="text-xl font-bold mb-2">Pending Applications</h3>
                        <p id="pendingApps" class="text-3xl font-bold text-gray-800">Loading...</p>
                        <p class="text-sm text-gray-500 mt-2">Awaiting review</p>
                    </div>
                    <!-- Active Scholarships -->
                    <div class="bg-white p-6 rounded-xl border hover:shadow-lg transition-all">
                        <i data-lucide="award" class="w-10 h-10 text-primary mb-4"></i>
                        <h3 class="text-xl font-bold mb-2">Active Scholarships</h3>
                        <p id="activeScholarships" class="text-3xl font-bold text-gray-800">Loading...</p>
                        <p class="text-sm text-gray-500 mt-2">Currently open</p>
                    </div>
                </div>
            </div>

    </main>
    <div id="footer-container"></div>
    <script src="/common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const token = localStorage.getItem('token');
        let chartInstance = null;
        let userChartInstance = null;

        async function loadStats() {
            const range = document.getElementById('timeRange').value;
            try {
                const response = await fetch(`/api/admin/stats?range=${range}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                // Update Cards
                document.getElementById('totalUsers').textContent = data.totalUsers || 0;
                document.getElementById('pendingApps').textContent = data.pendingApps || 0;
                document.getElementById('activeScholarships').textContent = data.activeScholarships || 0;

                // Update Charts
                updateChart(data.trends || {});
                updateUserChart(data.userRoles || {});

                lucide.createIcons();
            } catch (e) {
                console.error(e);
            }
        }

        function updateChart(trends) {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            const labels = Object.keys(trends);
            const values = Object.values(trends);

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Applications Submitted',
                        data: values,
                        backgroundColor: 'rgba(37, 99, 235, 0.6)',
                        borderColor: 'rgb(37, 99, 235)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { precision: 0 }
                        }
                    }
                }
            });
        }

        function updateUserChart(roles) {
            const ctx = document.getElementById('userChart').getContext('2d');
            const labels = Object.keys(roles);
            const values = Object.values(roles);

            if (userChartInstance) {
                userChartInstance.destroy();
            }

            userChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: [
                            'rgba(59, 130, 246, 0.8)', // Blue
                            'rgba(16, 185, 129, 0.8)', // Green
                            'rgba(245, 158, 11, 0.8)', // Yellow
                            'rgba(239, 68, 68, 0.8)'   // Red
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        function exportCSV() {
            const range = document.getElementById('timeRange').value;
            fetch(`/api/admin/stats?range=${range}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
                .then(res => res.json())
                .then(data => {
                    const trends = data.trends || {};
                    let csvContent = "data:text/csv;charset=utf-8,Date,Applications\n";
                    for (const [date, count] of Object.entries(trends)) {
                        csvContent += `${date},${count}\n`;
                    }
                    const encodedUri = encodeURI(csvContent);
                    const link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    link.setAttribute("download", `analytics_report_${range}.csv`);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                })
                .catch(e => console.error(e));
        }

        document.getElementById('timeRange').addEventListener('change', loadStats);
        loadStats();
    </script>
</body>

</html>
