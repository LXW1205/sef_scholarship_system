<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - ScholarNet Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <!-- Admin Navigation -->
  <div id="header-container"></div>

  <main class="min-h-screen py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <!-- Page Header -->
      <div class="flex justify-between items-center mb-8">
        <div>
          <h2 class="text-3xl font-bold mb-2">User Management</h2>
          <p class="text-muted-foreground">Manage system users, reviewers, and committee members</p>
        </div>
        <button id="addUserBtn"
          class="px-6 py-3 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors flex items-center gap-2 font-medium">
          <i data-lucide="user-plus" class="w-5 h-5"></i>
          Add New User
        </button>
      </div>

      <!-- Search and Filters -->
      <div class="bg-card rounded-xl border border-border p-6 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
          <div class="md:col-span-2">
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i data-lucide="search" class="w-5 h-5 text-muted-foreground"></i>
              </div>
              <input type="text" id="searchInput" placeholder="Search by name, email, or username..."
                class="w-full pl-10 pr-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
            </div>
          </div>
          <div>
            <select id="roleFilter"
              class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
              <option value="">All Roles</option>
              <option value="Student">Student</option>
              <option value="Reviewer">Reviewer</option>
              <option value="Committee">Committee</option>
              <option value="Admin">Admin</option>
            </select>
          </div>
          <div>
            <select id="statusFilter"
              class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
              <option value="">All Statuses</option>
              <option value="true">Active</option>
              <option value="false">Inactive</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Users Table -->
      <div class="bg-card rounded-xl border border-border overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-muted/50 border-b border-border">
              <tr>
                <th class="px-6 py-4 text-left text-sm font-semibold">Name</th>
                <th class="px-6 py-4 text-left text-sm font-semibold">Email</th>
                <th class="px-6 py-4 text-left text-sm font-semibold">Role</th>
                <th class="px-6 py-4 text-left text-sm font-semibold">Role Specific</th>
                <th class="px-6 py-4 text-left text-sm font-semibold">Status</th>
                <th class="px-6 py-4 text-left text-sm font-semibold">Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody" class="divide-y divide-border">
              <tr>
                <td colspan="7" class="px-6 py-8 text-center">
                  <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-muted-foreground mx-auto"></i>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Add/Edit User Modal -->
  <div id="userModal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4" style="display: none;">
    <div class="bg-card rounded-xl border border-border p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-2xl font-bold" id="modalTitle">Add New User</h3>
        <button id="closeModalBtn" class="text-muted-foreground hover:text-foreground">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>

      <form id="userForm" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="fullName" class="block text-sm font-medium mb-2">Full Name *</label>
            <input type="text" id="fullName" required
              class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
          </div>

          <div>
            <label for="email" class="block text-sm font-medium mb-2">Email *</label>
            <input type="email" id="email" required
              class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
          </div>
          <div>
            <label for="customID" class="block text-sm font-medium mb-2">User ID (Optional - Auto-detects Role)</label>
            <input type="text" id="customID" placeholder="e.g. S12345, R101, A001"
              class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
            <p class="text-xs text-muted-foreground mt-1">Start with S: Student, R: Reviewer, C: Committee, A: Admin</p>
          </div>
          <div>
            <label for="role" class="block text-sm font-medium mb-2">Role *</label>
            <select id="role" required
              class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
              <option value="">Select Role</option>
              <option value="Student">Student</option>
              <option value="Reviewer">Reviewer</option>
              <option value="Committee">Committee Member</option>
              <option value="Admin">Admin</option>
            </select>
          </div>
          <div>
            <label for="password" class="block text-sm font-medium mb-2">Password *</label>
            <div class="relative">
              <input type="text" id="password" required minlength="8"
                class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
            </div>
          </div>
          <div id="roleSpecificContainer">
            <label id="roleSpecificLabel" for="roleSpecificValue"
              class="block text-sm font-medium mb-2">Department</label>
            <input type="text" id="roleSpecificValue"
              class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
          </div>
        </div>

        <div id="formError"
          class="text-destructive bg-destructive/10 border border-destructive/20 rounded-lg p-3 text-sm flex items-center gap-2"
          style="display: none;">
          <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
          <span id="formErrorText"></span>
        </div>

        <div id="formSuccess"
          class="text-success bg-success/10 border border-success/20 rounded-lg p-3 text-sm flex items-center gap-2"
          style="display: none;">
          <i data-lucide="check-circle" class="w-4 h-4 flex-shrink-0"></i>
          <span id="formSuccessText"></span>
        </div>

        <div class="flex gap-4">
          <button type="button" id="cancelBtn"
            class="flex-1 px-6 py-3 bg-secondary text-secondary-foreground rounded-lg hover:bg-secondary/80 transition-colors font-medium">
            Cancel
          </button>
          <button type="submit" id="submitBtn"
            class="flex-1 px-6 py-3 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-medium">
            Create User
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

    // TESTING MODE: Auth check disabled
    // if (!token || user.role !== 'Admin') {
    //   window.location.href = '/login.html';
    // }


    function renderUsers(users) {
      const tbody = document.getElementById('usersTableBody');

      if (users.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="7" class="px-6 py-8 text-center text-muted-foreground">
              No users found
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = users.map(u => {
        let roleSpecific = '-';
        if (u.role === 'Student') roleSpecific = u.major || '-';
        else if (u.role === 'Reviewer') roleSpecific = u.department || '-';
        else if (u.role === 'Committee') roleSpecific = u.position || '-';
        else if (u.role === 'Admin') roleSpecific = u.adminLevel || '-';

        return `
        <tr class="hover:bg-muted/30 transition-colors">
          <td class="px-6 py-4">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center">
                <i data-lucide="user" class="w-5 h-5 text-primary"></i>
              </div>
              <div>
                <p class="font-medium">${u.fullName}</p>
              </div>
            </div>
          </td>
          <td class="px-6 py-4 text-muted-foreground font-mono text-xs">${u.email}</td>
          <td class="px-6 py-4">
            <span class="px-3 py-1 text-xs font-medium rounded-full ${u.role === 'Admin' ? 'bg-purple-500/10 text-purple-600' :
            u.role === 'Reviewer' ? 'bg-blue-500/10 text-blue-600' :
              u.role === 'Committee' ? 'bg-green-500/10 text-green-600' :
                'bg-muted text-muted-foreground'
          }">${u.role}</span>
          </td>
          <td class="px-6 py-4 text-sm">${roleSpecific}</td>
          <td class="px-6 py-4">
            <span class="px-3 py-1 text-xs font-medium rounded-full ${u.isActive ? 'bg-success/10 text-success' : 'bg-destructive/10 text-destructive'
          }">${u.isActive ? 'Active' : 'Inactive'}</span>
          </td>
          <td class="px-6 py-4">
            <div class="flex items-center gap-2">
              <button onclick="editUser(${u.id})" class="p-2 hover:bg-muted rounded-lg transition-colors" title="Edit">
                <i data-lucide="edit" class="w-4 h-4"></i>
              </button>
              <button onclick="toggleUserStatus(${u.id}, ${u.isActive})" class="p-2 hover:bg-muted rounded-lg transition-colors" title="${u.isActive ? 'Disable' : 'Enable'}">
                <i data-lucide="${u.isActive ? 'user-x' : 'user-check'}" class="w-4 h-4 ${u.isActive ? 'text-destructive' : 'text-success'}"></i>
              </button>
              <button onclick="deleteUser(${u.id})" class="p-2 hover:bg-muted rounded-lg transition-colors" title="Delete">
                <i data-lucide="trash-2" class="w-4 h-4 text-destructive"></i>
              </button>
            </div>
          </td>
        </tr>
      `}).join('');

      lucide.createIcons();
    } // end renderUsers

    // loadUsers called at bottom instead of renderUsers(mockUsers)

    // Modal handling
    const modal = document.getElementById('userModal');
    const modalTitle = document.getElementById('modalTitle');
    const userForm = document.getElementById('userForm');
    const roleSelect = document.getElementById('role');
    const roleSpecificLabel = document.getElementById('roleSpecificLabel');
    const roleSpecificValue = document.getElementById('roleSpecificValue');
    const customIDInput = document.getElementById('customID');
    let currentUserId = null;

    // Auto-detect role from ID
    customIDInput.addEventListener('input', (e) => {
      if (document.getElementById('role').disabled) return; // Don't auto-detect if editing existing and role locked

      const val = e.target.value.toUpperCase();
      if (!val) return;

      const firstChar = val.charAt(0);
      let detectedRole = "";

      if (firstChar === 'S') detectedRole = 'Student';
      else if (firstChar === 'R') detectedRole = 'Reviewer';
      else if (firstChar === 'C') detectedRole = 'Committee';
      else if (firstChar === 'A') detectedRole = 'Admin';

      if (detectedRole && roleSelect.value !== detectedRole) {
        roleSelect.value = detectedRole;
        updateRoleSpecificUI(detectedRole);
      }
    });

    roleSelect.addEventListener('change', (e) => {
      const role = e.target.value;
      updateRoleSpecificUI(role);
    });

    function updateRoleSpecificUI(role) {
      if (role === 'Student') {
        roleSpecificLabel.textContent = "Major *";
        roleSpecificValue.placeholder = "e.g. Computer Science";
      } else if (role === 'Committee') {
        roleSpecificLabel.textContent = "Position *";
        roleSpecificValue.placeholder = "e.g. Chair";
      } else if (role === 'Admin') {
        roleSpecificLabel.textContent = "Admin Level *";
        roleSpecificValue.placeholder = "e.g. Super Admin";
      } else {
        roleSpecificLabel.textContent = "Department *";
        roleSpecificValue.placeholder = "e.g. Science Faculty";
      }
    }

    document.getElementById('addUserBtn').addEventListener('click', () => {
      currentUserId = null;
      modalTitle.textContent = "Add New User";
      userForm.reset();
      updateRoleSpecificUI('');
      document.getElementById('submitBtn').textContent = "Create User";
      document.getElementById('role').disabled = false;
      document.getElementById('password').required = true;
      document.getElementById('customID').disabled = false;
      modal.style.display = 'flex';
      lucide.createIcons();
    });

    document.getElementById('closeModalBtn').addEventListener('click', () => {
      modal.style.display = 'none';
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      modal.style.display = 'none';
    });

    // Form submission
    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const role = document.getElementById('role').value;
      const specificValue = document.getElementById('roleSpecificValue').value;
      const customID = document.getElementById('customID').value;

      const formData = {
        fullName: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        role: role,
        password: document.getElementById('password').value,
      };

      // Map role specific field and ID
      if (role === 'Student') {
        formData.major = specificValue;
        if (customID) formData.studentID = customID;
      }
      else if (role === 'Reviewer') {
        formData.department = specificValue;
        if (customID) formData.reviewerID = customID;
      }
      else if (role === 'Committee') {
        formData.position = specificValue;
        if (customID) formData.committeeID = customID;
      }
      else if (role === 'Admin') {
        formData.adminLevel = specificValue;
        if (customID) formData.adminID = customID;
      }

      if (currentUserId) {
        formData.id = currentUserId;
        const existing = allUsers.find(u => u.id === currentUserId);
        formData.isActive = existing ? existing.isActive : true;

        // If student, include other mandatory fields to avoid nulls
        if (role === 'Student' && existing) {
          formData.cgpa = existing.cgpa || 0;
          formData.qualification = existing.qualification || "";
          formData.yearOfStudy = existing.yearOfStudy || "";
          formData.expectedGraduation = existing.expectedGraduation || "";
          formData.familyIncome = existing.familyIncome || 0;
        }
      }

      const url = currentUserId ? '/api/users' : '/api/auth/register';

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (response.ok) {
          document.getElementById('formSuccessText').textContent = currentUserId ? 'User updated successfully!' : 'User created successfully!';
          document.getElementById('formSuccess').style.display = 'flex';
          document.getElementById('formError').style.display = 'none';
          lucide.createIcons();

          setTimeout(() => {
            modal.style.display = 'none';
            loadUsers(); // Refresh list instead of full reload
            document.getElementById('formSuccess').style.display = 'none';
          }, 1500);
        } else {
          document.getElementById('formErrorText').textContent = data.error || 'Operation failed';
          document.getElementById('formError').style.display = 'flex';
          document.getElementById('formSuccess').style.display = 'none';
          lucide.createIcons();
        }
      } catch (error) {
        console.error('[v0] User op error:', error);
        document.getElementById('formErrorText').textContent = 'An error occurred';
        document.getElementById('formError').style.display = 'flex';
        document.getElementById('formSuccess').style.display = 'none';
        lucide.createIcons();
      }
    });

    window.editUser = function (id) {
      const u = allUsers.find(u => u.id === id);
      if (!u) return;

      currentUserId = id;
      modalTitle.textContent = "Edit User";
      document.getElementById('submitBtn').textContent = "Update User";

      document.getElementById('fullName').value = u.fullName || '';
      document.getElementById('email').value = u.email || '';
      document.getElementById('role').value = u.role || '';
      document.getElementById('role').disabled = true; // Disable role editing

      // Populate ID if available (read-only in edit usually, but let's allow viewing)
      const cInput = document.getElementById('customID');
      cInput.value = "";
      if (u.role === 'Student') cInput.value = u.studentID || "";
      else if (u.role === 'Reviewer') cInput.value = u.reviewerID || "";
      else if (u.role === 'Committee') cInput.value = u.committeeID || "";
      else if (u.role === 'Admin') cInput.value = u.adminID || "";
      cInput.disabled = true; // Disable ID editing for now as it's a primary key/identifier

      // Password populated from DB
      document.getElementById('password').value = u.password || '';
      document.getElementById('password').required = true;

      // Specialized fields
      updateRoleSpecificUI(u.role);
      if (u.role === 'Student') roleSpecificValue.value = u.major || '';
      else if (u.role === 'Reviewer') roleSpecificValue.value = u.department || '';
      else if (u.role === 'Committee') roleSpecificValue.value = u.position || '';
      else if (u.role === 'Admin') roleSpecificValue.value = u.adminLevel || '';

      document.getElementById('formError').style.display = 'none';
      document.getElementById('formSuccess').style.display = 'none';

      modal.style.display = 'flex';
      lucide.createIcons();
    };

    window.toggleUserStatus = async function (id, currentStatus) {
      const userToEdit = allUsers.find(u => u.id === id);
      if (!userToEdit) return;

      const newStatus = !currentStatus;
      const action = newStatus ? "enable" : "disable";

      if (!confirm(`Are you sure you want to ${action} this user?`)) return;

      // Construct payload mimicking a full update but just toggling status
      // Note: Password field sent as empty string (handler ignores it if empty/null for updates)
      const formData = {
        id: userToEdit.id,
        fullName: userToEdit.fullName,
        email: userToEdit.email,
        role: userToEdit.role,
        isActive: newStatus,
        // Include role-specific fields to avoid data loss if handler requires them
        // (Our UserHandler.update checks instance type so sending extra fields is safe/ignored)
        cgpa: userToEdit.cgpa || 0,
        major: userToEdit.major || "",
        qualification: userToEdit.qualification || "",
        yearOfStudy: userToEdit.yearOfStudy || "",
        expectedGraduation: userToEdit.expectedGraduation || "",
        familyIncome: userToEdit.familyIncome || 0,
        department: userToEdit.department || "",
        position: userToEdit.position || "",
        adminLevel: userToEdit.adminLevel || ""
      };
      // Password explicitly empty to signal no change
      formData.password = "";

      try {
        const response = await fetch('/api/users', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(formData)
        });

        if (response.ok) {
          loadUsers();
        } else {
          const data = await response.json();
          alert(data.error || "Failed to update status");
        }
      } catch (e) {
        console.error(e);
        alert("An error occurred");
      }
    };

    window.deleteUser = async function (id) {
      if (!confirm('Are you sure you want to PERMANENTLY delete this user? This action cannot be undone.')) return;

      try {
        const response = await fetch(`/api/users?id=${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
          loadUsers();
        } else {
          const data = await response.json();
          alert(data.error || "Failed to delete user");
        }
      } catch (e) {
        console.error(e);
        alert("An error occurred");
      }
    };

    // Filter functionality
    let allUsers = [];

    async function loadUsers() {
      try {
        const response = await fetch('/api/users', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        allUsers = data.users || [];

        // Default sort by role
        allUsers.sort((a, b) => a.role.localeCompare(b.role));

        applyFilters();
      } catch (error) {
        console.error('[v0] Load users error:', error);
        document.getElementById('usersTableBody').innerHTML = `
          <tr><td colspan="5" class="px-6 py-8 text-center text-destructive">Failed to load users</td></tr>
        `;
      }
    }

    function applyFilters() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const roleFilter = document.getElementById('roleFilter').value;

      let filtered = allUsers.filter(user => {
        const matchesSearch = !searchTerm ||
          user.username?.toLowerCase().includes(searchTerm) ||
          user.email?.toLowerCase().includes(searchTerm) ||
          (user.fullName && user.fullName.toLowerCase().includes(searchTerm));

        const matchesRole = !roleFilter || user.role === roleFilter;

        const statusFilter = document.getElementById('statusFilter').value;
        const matchesStatus = statusFilter === "" || String(user.isActive) === statusFilter;

        return matchesSearch && matchesRole && matchesStatus;
      });

      renderUsers(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('roleFilter').addEventListener('change', applyFilters);
    document.getElementById('statusFilter').addEventListener('change', applyFilters);

    loadUsers();
  </script>
  <div id="footer-container"></div>
  <script src="/common.js"></script>
</body>

</html>
