<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiries - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(214.3 31.8% 91.4%)',
                        input: 'hsl(214.3 31.8% 91.4%)',
                        ring: 'hsl(222.2 84% 4.9%)',
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(222.2 84% 4.9%)',
                        primary: {
                            DEFAULT: 'hsl(222.2 47.4% 11.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        secondary: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(222.2 47.4% 11.2%)',
                        },
                        destructive: {
                            DEFAULT: 'hsl(0 84.2% 60.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        muted: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(215.4 16.3% 46.9%)',
                        },
                        card: {
                            DEFAULT: 'hsl(0 0% 100%)',
                            foreground: 'hsl(222.2 84% 4.9%)',
                        },
                    },
                }
            }
        }
    </script>
</head>

<body class="font-sans antialiased bg-[#7A8691]">
    <div id="header-container"></div>

    <main class="max-w-[1600px] mx-auto py-8 px-4 sm:px-6 lg:px-8 min-h-screen">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-black">Student Inquiries</h1>
            <p class="text-black mt-1">Manage and respond to student questions.</p>
        </header>

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div class="flex items-center gap-4">
                <div class="relative min-w-[200px]">
                    <select id="statusFilter" onchange="filterInquiries()"
                        class="w-full pl-3 pr-10 py-2 bg-white border border-gray-200 rounded-lg appearance-none focus:outline-none focus:ring-2 focus:ring-primary/20">
                        <option value="All">All Inquiries</option>
                        <option value="Pending">Pending</option>
                        <option value="Answered">Answered</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>
        </div>

        <div id="inquiriesList" class="space-y-4">
            <div class="p-8 text-center text-gray-500 bg-white rounded-xl border border-gray-200 shadow-sm">Loading
                inquiries...</div>
        </div>
    </main>

    <!-- Template for Inquiry Item -->
    <template id="inquiryTemplate">
        <div
            class="inquiry-item bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden transition-all hover:shadow-md">
            <button onclick="toggleAccordion(this)" class="w-full text-left p-6 focus:outline-none group">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-3 mb-2">
                            <span
                                class="status-badge inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider"></span>

                            <span class="date-text text-xs text-gray-400"></span>

                        </div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="student-name font-bold text-gray-900"></span>
                            <span class="student-id text-xs text-gray-400"></span>
                        </div>
                        <p
                            class="question-preview text-sm text-gray-600 truncate group-hover:text-primary transition-colors">
                        </p>
                    </div>
                    <div class="flex items-center gap-4 text-gray-400 group-hover:text-primary transition-colors">
                        <i data-lucide="chevron-down"
                            class="accordion-icon w-5 h-5 transition-transform duration-200"></i>
                    </div>
                </div>
            </button>
            <div class="accordion-content hidden border-t border-gray-100 bg-gray-50/50">
                <div class="p-6 space-y-6">
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-2">Student Question
                        </p>
                        <p class="question-full text-gray-700 whitespace-pre-wrap leading-relaxed"></p>
                    </div>

                    <div class="answer-section border-t border-gray-100 pt-6">
                        <div class="flex items-center justify-between mb-4">
                            <p class="text-[10px] text-primary font-bold uppercase tracking-wider">Administrator
                                Response</p>
                            <div class="reply-button-container"></div>
                        </div>
                        <div class="answer-content">
                            <p
                                class="answer-text text-gray-700 whitespace-pre-wrap leading-relaxed italic text-gray-400">
                                No response yet.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Reply Modal -->
    <div id="replyModal"
        class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl w-full max-w-lg mx-4 overflow-hidden shadow-2xl transform transition-all">
            <div class="bg-primary p-4 text-white flex justify-between items-center">
                <h3 class="font-bold flex items-center gap-2">
                    <i data-lucide="message-square" class="w-5 h-5"></i>
                    Reply to Inquiry
                </h3>
                <button onclick="closeModal()" class="hover:bg-white/10 p-1 rounded transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6">
                <div class="mb-6">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-2">Student Question</p>
                    <p id="modalQuestion"
                        class="text-sm text-gray-700 bg-gray-50 p-4 rounded-lg border border-gray-100 italic"></p>
                </div>

                <form id="replyForm">
                    <input type="hidden" id="modalInquiryId">
                    <div class="mb-6">
                        <label class="block text-[10px] text-primary font-bold uppercase tracking-wider mb-2">Your
                            Answer</label>
                        <textarea id="modalAnswer" rows="5"
                            class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary focus:outline-none transition-all resize-none"
                            placeholder="Type your response here..." required></textarea>
                    </div>
                    <div class="flex justify-end gap-3">
                        <button type="button" onclick="closeModal()"
                            class="px-5 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-medium transition-colors">Cancel</button>
                        <button type="submit" id="submitReplyBtn"
                            class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-opacity-90 transition-all shadow-md font-medium flex items-center gap-2">
                            Send Reply
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>
    <script src="/common.js?v=3"></script>
    <script>
        let allInquiries = [];

        function toggleAccordion(button) {
            const content = button.nextElementSibling;
            const icon = button.querySelector('.accordion-icon');
            const isHidden = content.classList.contains('hidden');

            document.querySelectorAll('.accordion-content').forEach(c => {
                if (c !== content) {
                    c.classList.add('hidden');
                    c.previousElementSibling.querySelector('.accordion-icon').style.transform = 'rotate(0deg)';
                }
            });

            if (isHidden) {
                content.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        function filterInquiries() {
            const status = document.getElementById('statusFilter').value;
            renderInquiries(status === 'All' ? allInquiries : allInquiries.filter(i => i.status === status));
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || "{}");

            if (!token || user.role !== 'Admin') {
                window.location.href = '/login.html';
                return;
            }

            loadInquiries();

            document.getElementById('replyForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('modalInquiryId').value;
                const answer = document.getElementById('modalAnswer').value;
                const btn = document.getElementById('submitReplyBtn');

                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Sending...';
                if (window.lucide) lucide.createIcons();

                try {
                    const res = await fetch(`/api/inquiries/${id}/answer`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ answer })
                    });

                    if (res.ok) {
                        closeModal();
                        loadInquiries();
                    } else {
                        alert('Failed to send reply');
                    }
                } catch (err) {
                    alert('Error sending reply');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Send Reply';
                    if (window.lucide) lucide.createIcons();
                }
            });
        });

        async function loadInquiries() {
            const container = document.getElementById('inquiriesList');
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            try {
                const res = await fetch('/api/inquiries', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Error loading inquiries');

                allInquiries = await res.json();
                renderInquiries(allInquiries);

            } catch (err) {
                container.innerHTML = `<div class="p-8 text-center text-red-500 bg-white rounded-xl border border-red-100 shadow-sm">Error loading data: ${err.message}</div>`;
            }
        }

        function renderInquiries(data) {
            const container = document.getElementById('inquiriesList');
            const template = document.getElementById('inquiryTemplate');

            container.innerHTML = '';
            if (data.length === 0) {
                container.innerHTML = '<div class="p-12 text-center text-gray-500 bg-white rounded-xl border border-gray-200 shadow-sm"><i data-lucide="inbox" class="w-12 h-12 mx-auto mb-4 text-gray-300"></i> No inquiries found matching the criteria.</div>';
                if (window.lucide) lucide.createIcons();
                return;
            }

            data.forEach((i, idx) => {
                const clone = template.content.cloneNode(true);

                const badge = clone.querySelector('.status-badge');
                badge.textContent = i.status;
                badge.className += i.status === 'Answered'
                    ? ' bg-green-50 text-green-700 border border-green-100'
                    : ' bg-amber-50 text-amber-700 border border-amber-100';

                clone.querySelector('.date-text').textContent = new Date(i.submittedAt).toLocaleDateString('en-GB', {
                    day: 'numeric', month: 'short', year: 'numeric'
                });


                clone.querySelector('.student-name').textContent = i.studentName || 'Unknown Student';
                clone.querySelector('.student-id').textContent = `(${i.studentID})`;
                clone.querySelector('.question-preview').textContent = i.message;
                clone.querySelector('.question-full').textContent = i.message;

                if (i.answer) {
                    const ansText = clone.querySelector('.answer-text');
                    ansText.textContent = i.answer;
                    ansText.classList.remove('italic', 'text-gray-400');
                    ansText.classList.add('text-gray-700');
                } else {
                    const btnContainer = clone.querySelector('.reply-button-container');
                    const replyBtn = document.createElement('button');
                    replyBtn.className = 'text-primary hover:text-primary/80 font-bold text-xs flex items-center gap-1 transition-colors';
                    replyBtn.innerHTML = '<i data-lucide="reply" class="w-3 h-3"></i> Reply Now';
                    replyBtn.onclick = (e) => {
                        e.stopPropagation();
                        openReplyModal(i);
                    };
                    btnContainer.appendChild(replyBtn);
                }

                container.appendChild(clone);
            });

            if (window.lucide) lucide.createIcons();
        }

        function openReplyModal(inquiry) {
            document.getElementById('modalInquiryId').value = inquiry.inquiryID;
            document.getElementById('modalQuestion').textContent = inquiry.message;
            document.getElementById('modalAnswer').value = '';
            document.getElementById('replyModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('replyModal').classList.add('hidden');
        }
    </script>
</body>

</html>
