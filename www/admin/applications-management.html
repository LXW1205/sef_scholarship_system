<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Management - ScholarNet Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(214.3 31.8% 91.4%)',
                        input: 'hsl(214.3 31.8% 91.4%)',
                        ring: 'hsl(222.2 84% 4.9%)',
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(222.2 84% 4.9%)',
                        primary: {
                            DEFAULT: 'hsl(222.2 47.4% 11.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        secondary: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(222.2 47.4% 11.2%)',
                        },
                        destructive: {
                            DEFAULT: 'hsl(0 84.2% 60.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        muted: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(215.4 16.3% 46.9%)',
                        },
                        card: {
                            DEFAULT: 'hsl(0 0% 100%)',
                            foreground: 'hsl(222.2 84% 4.9%)',
                        },
                        success: {
                            DEFAULT: 'hsl(142.1 76.2% 36.3%)',
                            foreground: 'hsl(355.7 100% 97.3%)',
                        },
                    },
                }
            }
        }
    </script>
</head>

<body class="font-sans antialiased bg-muted/30">
    <div id="header-container"></div>

    <main class="min-h-screen py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold mb-2">Application Management</h2>
                    <p class="text-muted-foreground">Monitor and manage all scholarship applications</p>
                </div>
            </div>

            <!-- Filters -->
            <div class="bg-card rounded-xl border border-border p-6 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-2">
                        <div class="relative">
                            <i data-lucide="search"
                                class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground"></i>
                            <input type="text" placeholder="Search applications..."
                                class="w-full pl-10 pr-4 py-2 bg-background border border-input rounded-lg">
                        </div>
                    </div>
                    <select class="px-4 py-2 bg-background border border-input rounded-lg">
                        <option>All Statuses</option>
                        <option>Pending</option>
                        <option>Reviewed</option>
                        <option>Approved</option>
                        <option>Rejected</option>
                    </select>
                </div>
            </div>

            <!-- Applications Table -->
            <div class="bg-card rounded-xl border border-border overflow-hidden">
                <table class="w-full">
                    <thead class="bg-muted/50 border-b border-border">
                        <tr>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Applicant</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Scholarship</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Status</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Reviewer</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="applicationsTableBody" class="divide-y divide-border">
                        <tr>
                            <td colspan="5" class="px-6 py-8 text-center text-muted-foreground">
                                <i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto mb-2"></i>
                                Loading applications...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Assign Modal -->
        <div id="assignModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
            <div class="bg-card rounded-xl p-6 w-full max-w-md shadow-lg border border-border">
                <h3 class="text-lg font-bold mb-4">Assign Reviewer</h3>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">Select Reviewer</label>
                    <select id="reviewerSelect" class="w-full px-4 py-2 bg-background border border-input rounded-lg">
                        <option value="">Loading...</option>
                    </select>
                </div>
                <div class="flex justify-end gap-3">
                    <button id="closeModal"
                        class="px-4 py-2 text-sm font-medium text-muted-foreground hover:text-foreground">Cancel</button>
                    <button id="saveAssign"
                        class="px-4 py-2 text-sm font-medium bg-primary text-primary-foreground rounded-lg hover:bg-primary/90">Save
                        Assignment</button>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="/common.js"></script>
    <script>
        const token = localStorage.getItem('token');
        let currentAppId = null;

        // Modal elements
        const modal = document.getElementById('assignModal');
        const closeModal = document.getElementById('closeModal');
        const saveAssign = document.getElementById('saveAssign');
        const reviewerSelect = document.getElementById('reviewerSelect');

        function openModal(appId) {
            currentAppId = appId;
            modal.classList.remove('hidden');
        }

        closeModal.addEventListener('click', () => {
            modal.classList.add('hidden');
            currentAppId = null;
        });

        saveAssign.addEventListener('click', async () => {
            if (!currentAppId || !reviewerSelect.value) return;
            try {
                const response = await fetch('/api/applications', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json' // Important for manual parsing backend
                    },
                    body: JSON.stringify({ appId: currentAppId, reviewerId: reviewerSelect.value })
                });
                if (response.ok) {
                    modal.classList.add('hidden');
                    loadApplications(); // Refresh list
                } else {
                    alert('Failed to assign reviewer');
                }
            } catch (e) {
                console.error(e);
                alert('Error assigning reviewer');
            }
        });

        async function loadReviewers() {
            try {
                const response = await fetch('/api/users?role=Reviewer', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                const reviewers = data.users || [];
                reviewerSelect.innerHTML = '<option value="">Select Reviewer</option>' +
                    reviewers.map(r => `<option value="${r.staffID}">${r.username} (${r.department})</option>`).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function loadApplications() {
            try {
                const response = await fetch('/api/applications', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                const applications = data.applications || [];

                const tbody = document.getElementById('applicationsTableBody');
                if (applications.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-muted-foreground">No applications found</td></tr>';
                } else {
                    tbody.innerHTML = applications.map(app => `
                    <tr>
                        <td class="px-6 py-4">
                            <div class="font-medium">${app.fullname || 'Anonymous'}</div>
                            <div class="text-xs text-muted-foreground">ID: ${app.id}</div>
                        </td>
                        <td class="px-6 py-4 text-sm">
                            <div class="mb-1">${app.scholarship_title}</div>
                            <div class="flex flex-wrap gap-2 mt-2">
                                ${(app.documents || []).map(doc => `
                                    <button onclick="previewFile('${doc.fileContent}')" 
                                            class="inline-flex items-center gap-1.5 px-2 py-1 bg-primary/5 text-primary rounded text-xs hover:bg-primary/10 transition-colors">
                                        <i data-lucide="paperclip" class="w-3 h-3"></i>
                                        ${doc.fileName}
                                    </button>
                                `).join('')}
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2.5 py-0.5 rounded-full text-xs font-medium bg-muted text-muted-foreground">${app.status}</span>
                        </td>
                        <td class="px-6 py-4 text-sm">
                            ${app.reviewerName ?
                            `<span class="text-gray-700 font-medium">${app.reviewerName}</span>` :
                            '<span class="text-gray-400 italic">Unassigned</span>'}
                        </td>
                        <td class="px-6 py-4">
                            ${app.reviewerName ?
                            '<button class="text-gray-400 cursor-not-allowed text-sm font-medium" disabled>Assigned</button>' :
                            `<button onclick="openModal(${app.id})" class="text-primary hover:underline text-sm font-medium">Assign Reviewer</button>`
                        }
                        </td>
                    </tr>
                `).join('');
                }
                lucide.createIcons();
            } catch (e) {
                console.error(e);
            }
        }

        window.previewFile = function (base64) {
            if (!base64 || base64 === "null") {
                alert("File content not available");
                return;
            }
            const win = window.open();
            if (base64.startsWith('data:image/')) {
                win.document.write(`<img src="${base64}" style="max-width: 100%;">`);
            } else if (base64.startsWith('data:application/pdf')) {
                win.document.write(`<iframe src="${base64}" frameborder="0" style="border:0; top:0px; left:0px; bottom:0px; right:0px; width:100%; height:100%;" allowfullscreen></iframe>`);
            } else {
                win.location.href = base64;
            }
        };

        loadReviewers();
        loadApplications();
    </script>
</body>

</html>
