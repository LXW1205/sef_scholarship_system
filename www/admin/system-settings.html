<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>System Settings - ScholarNet Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: 'hsl(222.2 47.4% 11.2%)', foreground: 'hsl(210 40% 98%)' },
                        secondary: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(222.2 47.4% 11.2%)' },
                        muted: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(215.4 16.3% 46.9%)' },
                    }
                }
            }
        }
    </script>
</head>

<body class="font-sans antialiased bg-muted/30">
    <nav class="bg-primary text-primary-foreground border-b border-border">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <i data-lucide="graduation-cap" class="w-6 h-6"></i>
                    <h1 class="text-xl font-bold">ScholarNet Admin</h1>
                </div>
                <div class="flex items-center gap-6">
                    <a href="/admin/dashboard-admin.html"
                        class="hover:text-muted-foreground transition-colors flex items-center gap-1">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                        Dashboard
                    </a>
                    <a href="/admin/users-management.html"
                        class="hover:text-muted-foreground transition-colors flex items-center gap-1">
                        <i data-lucide="users" class="w-4 h-4"></i>
                        Users
                    </a>
                    <a href="/admin/scholarships-management.html"
                        class="hover:text-muted-foreground transition-colors flex items-center gap-1">
                        <i data-lucide="award" class="w-4 h-4"></i>
                        Scholarships
                    </a>
                    <button id="logoutBtn"
                        class="px-4 py-2 bg-secondary text-secondary-foreground rounded-lg hover:bg-secondary/80 transition-colors flex items-center gap-1">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="min-h-screen py-12">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="text-3xl font-bold mb-6">System Settings</h2>
            <div class="bg-white p-8 rounded-xl border border-gray-200 shadow-sm space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">System Name</label>
                    <input type="text" value="DSX - Digital Scholarship Experience"
                        class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Support Email</label>
                    <input type="email" value="support@dsx.edu" class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Timezone</label>
                    <select class="w-full px-4 py-2 border rounded-lg">
                        <option>UTC-5 (Eastern Time)</option>
                        <option>UTC-8 (Pacific Time)</option>
                        <option>UTC+8 (Singapore Time)</option>
                    </select>
                </div>
                <button class="px-6 py-2 bg-primary text-white rounded-lg">Save Changes</button>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>

</html>
