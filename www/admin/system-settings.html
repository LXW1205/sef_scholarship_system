<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>System Settings - ScholarNet Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: 'hsl(222.2 47.4% 11.2%)', foreground: 'hsl(210 40% 98%)' },
                        secondary: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(222.2 47.4% 11.2%)' },
                        muted: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(215.4 16.3% 46.9%)' },
                    }
                }
            }
        }
    </script>
</head>

<body class="font-sans antialiased bg-muted/30">
    <div id="header-container"></div>

    <main class="min-h-screen py-12">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="text-3xl font-bold mb-6">System Settings</h2>
            <div class="bg-white p-8 rounded-xl border border-gray-200 shadow-sm space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">System Name</label>
                    <input type="text" value="DSX - Digital Scholarship Experience"
                        class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Support Email</label>
                    <input type="email" value="support@dsx.edu" class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Timezone</label>
                    <select class="w-full px-4 py-2 border rounded-lg">
                        <option>UTC-5 (Eastern Time)</option>
                        <option>UTC-8 (Pacific Time)</option>
                        <option>UTC+8 (Singapore Time)</option>
                    </select>
                </div>
                <button class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors">Save
                    Changes</button>
            </div>

            <h3 class="text-2xl font-bold mb-6 mt-12">Administration Tools</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <a href="/admin/send-notifications.html"
                    class="p-6 bg-white rounded-xl border border-gray-200 hover:border-primary hover:shadow-md transition-all group flex items-start gap-4">
                    <div
                        class="p-3 bg-blue-500/10 rounded-lg group-hover:bg-blue-500 group-hover:text-white transition-colors">
                        <i data-lucide="send" class="w-6 h-6 text-blue-600 group-hover:text-white"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-gray-900 mb-1">Send Notifications</h4>
                        <p class="text-sm text-gray-500">Blast emails and system alerts to users</p>
                    </div>
                </a>

                <a href="/admin/audit-logs.html"
                    class="p-6 bg-white rounded-xl border border-gray-200 hover:border-primary hover:shadow-md transition-all group flex items-start gap-4">
                    <div
                        class="p-3 bg-purple-500/10 rounded-lg group-hover:bg-purple-500 group-hover:text-white transition-colors">
                        <i data-lucide="shield" class="w-6 h-6 text-purple-600 group-hover:text-white"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-gray-900 mb-1">Audit Logs</h4>
                        <p class="text-sm text-gray-500">Track system activities and security events</p>
                    </div>
                </a>

                <a href="/admin/notification-settings.html"
                    class="p-6 bg-white rounded-xl border border-gray-200 hover:border-primary hover:shadow-md transition-all group flex items-start gap-4">
                    <div
                        class="p-3 bg-yellow-500/10 rounded-lg group-hover:bg-yellow-500 group-hover:text-white transition-colors">
                        <i data-lucide="bell" class="w-6 h-6 text-yellow-600 group-hover:text-white"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-gray-900 mb-1">Alert Configuration</h4>
                        <p class="text-sm text-gray-500">Manage automated triggers and templates</p>
                    </div>
                </a>

                <a href="/admin/backup-maintenance.html"
                    class="p-6 bg-white rounded-xl border border-gray-200 hover:border-primary hover:shadow-md transition-all group flex items-start gap-4">
                    <div
                        class="p-3 bg-green-500/10 rounded-lg group-hover:bg-green-500 group-hover:text-white transition-colors">
                        <i data-lucide="database" class="w-6 h-6 text-green-600 group-hover:text-white"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-gray-900 mb-1">Backup & Maintenance</h4>
                        <p class="text-sm text-gray-500">Database snapshots and system health</p>
                    </div>
                </a>
            </div>
        </div>
    </main>
    <div id="footer-container"></div>
    <div id="footer-container"></div>
    <script src="/common.js"></script>
    <script>
        const saveBtn = document.querySelector('button');
        const inputs = document.querySelectorAll('input, select');

        // Load Settings
        fetch('/api/system/settings')
            .then(res => res.json())
            .then(data => {
                inputs[0].value = data.systemName || '';
                inputs[1].value = data.supportEmail || '';
                if (data.timezone) {
                    inputs[2].value = data.timezone;
                }
            });

        saveBtn.addEventListener('click', async () => {
            const data = {
                systemName: inputs[0].value,
                supportEmail: inputs[1].value,
                timezone: inputs[2].value
            };

            saveBtn.textContent = 'Saving...';
            saveBtn.disabled = true;

            try {
                const response = await fetch('/api/system/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.success) {
                    alert('Settings saved successfully!');
                } else {
                    alert('Failed to save settings');
                }
            } catch (err) {
                console.error(err);
                alert('Error saving settings');
            } finally {
                saveBtn.textContent = 'Save Changes';
                saveBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
