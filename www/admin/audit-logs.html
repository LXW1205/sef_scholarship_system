<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Audit Logs - ScholarNet Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: 'hsl(222.2 47.4% 11.2%)', foreground: 'hsl(210 40% 98%)' },
                        secondary: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(222.2 47.4% 11.2%)' },
                        muted: { DEFAULT: 'hsl(210 40% 96.1%)', foreground: 'hsl(215.4 16.3% 46.9%)' },
                    }
                }
            }
        }
    </script>
</head>

<body class="font-sans antialiased bg-muted/30">
    <nav class="bg-primary text-primary-foreground border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <i data-lucide="graduation-cap" class="w-6 h-6"></i>
                    <h1 class="text-xl font-bold">ScholarNet Admin</h1>
                </div>
                <a href="/admin/dashboard-admin.html" class="hover:text-gray-300">Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="min-h-screen py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="text-3xl font-bold mb-6">Audit Logs</h2>
            <div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-900">User</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-900">Action</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-900">IP Address</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-gray-900">Timestamp</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <tr>
                            <td class="px-6 py-4">admin001</td>
                            <td class="px-6 py-4">Updated Scholarship Settings</td>
                            <td class="px-6 py-4">192.168.1.5</td>
                            <td class="px-6 py-4 text-gray-500">2026-01-07 14:30:22</td>
                        </tr>
                        <tr>
                            <td class="px-6 py-4">admin001</td>
                            <td class="px-6 py-4">Created User 'reviewer002'</td>
                            <td class="px-6 py-4">192.168.1.5</td>
                            <td class="px-6 py-4 text-gray-500">2026-01-07 13:15:10</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>

</html>
