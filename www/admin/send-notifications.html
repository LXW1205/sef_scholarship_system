<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Notifications - ScholarNet Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(214.3 31.8% 91.4%)',
                        input: 'hsl(214.3 31.8% 91.4%)',
                        ring: 'hsl(222.2 84% 4.9%)',
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(222.2 84% 4.9%)',
                        primary: {
                            DEFAULT: 'hsl(222.2 47.4% 11.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        secondary: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(222.2 47.4% 11.2%)',
                        },
                        destructive: {
                            DEFAULT: 'hsl(0 84.2% 60.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        muted: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(215.4 16.3% 46.9%)',
                        },
                        card: {
                            DEFAULT: 'hsl(0 0% 100%)',
                            foreground: 'hsl(222.2 84% 4.9%)',
                        },
                    },
                }
            }
        }
    </script>
</head>

<body class="font-sans antialiased bg-[#7A8691]">
    <div id="header-container"></div>

    <main class="min-h-screen py-12">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-12 h-12 bg-primary/10 rounded-lg flex items-center justify-center">
                    <i data-lucide="bell-ring" class="w-6 h-6 text-primary"></i>
                </div>
                <div>
                    <h2 class="text-3xl font-bold">Send Notifications</h2>
                    <p class="text-black">Broadcast messages to system users</p>
                </div>
            </div>

            <div class="bg-card rounded-xl border border-border p-8 shadow-sm">
                <form id="notificationForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Recipients</label>
                        <select
                            class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
                            <option value="all">All Users</option>
                            <option value="student">All Students</option>
                            <option value="reviewer">All Reviewers</option>
                            <option value="committee">Committee Members</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Subject</label>
                        <input type="text"
                            class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
                            placeholder="Announcement subject">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Message</label>
                        <textarea rows="6"
                            class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
                            placeholder="Type your message here..."></textarea>
                    </div>

                    <div class="flex justify-end gap-3">
                        <a href="/admin/dashboard-admin.html"
                            class="px-6 py-2 bg-secondary text-secondary-foreground rounded-lg hover:bg-secondary/80 transition-colors font-medium">Cancel</a>
                        <button type="submit"
                            class="px-6 py-2 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-medium flex items-center gap-2">
                            <i data-lucide="send" class="w-4 h-4"></i>
                            Send Notification
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        document.getElementById('notificationForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const recipients = document.querySelector('select').value;
            const subject = document.querySelector('input[type="text"]').value; // Note: Backend currently doesn't use subject, just message
            const messageBody = document.querySelector('textarea').value;

            // combine subject and message for now as the backend only takes 'message'
            const fullMessage = subject ? `[${subject}] ${messageBody}` : messageBody;

            const btn = document.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.textContent = 'Sending...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/notifications', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ recipients: recipients, message: fullMessage })
                });

                const result = await response.json();
                if (result.success) {
                    alert('Notification sent successfully!');
                    document.getElementById('notificationForm').reset();
                } else {
                    alert('Failed to send: ' + (result.error || 'Unknown error'));
                }
            } catch (err) {
                console.error(err);
                alert('Error sending notification');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
    <div id="footer-container"></div>
    <script src="/common.js"></script>
</body>

</html>
