<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Status - Digital Scholarship Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <div id="header-container"></div>

  <main class="min-h-screen py-12">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="mb-6">
        <a href="/student/applications-student.html"
          class="inline-flex items-center gap-2 text-primary hover:underline">
          <i data-lucide="arrow-left" class="w-4 h-4"></i>
          Back to Applications
        </a>
      </div>

      <!-- Status Overview -->
      <div class="bg-card rounded-xl border border-border p-8 mb-6">
        <div class="flex items-start justify-between mb-6">
          <div class="flex items-center gap-4">
            <div class="w-16 h-16 bg-primary/10 rounded-lg flex items-center justify-center">
              <i data-lucide="award" class="w-8 h-8 text-primary"></i>
            </div>
            <div>
              <h2 id="scholarshipTitle" class="text-2xl font-bold mb-2">Loading...</h2>
              <div class="flex items-center gap-4 text-sm text-muted-foreground">
                <span class="flex items-center gap-1">
                  <i data-lucide="hash" class="w-4 h-4"></i>
                  Application ID: <span id="appId" class="font-medium">...</span>
                </span>
                <span class="flex items-center gap-1">
                  <i data-lucide="calendar" class="w-4 h-4"></i>
                  Submitted: <span id="submissionDate">...</span>
                </span>
              </div>
            </div>
          </div>
          <div class="flex flex-col items-end gap-2">
            <span id="statusBadge" class="px-4 py-2 text-sm font-medium rounded-full"></span>
            <button id="withdrawBtn" onclick="withdrawApplication()"
              class="hidden px-4 py-2 text-sm font-medium text-destructive border border-destructive/20 rounded-lg hover:bg-destructive/10 transition-colors flex items-center gap-2">
              <i data-lucide="x-circle" class="w-4 h-4"></i>
              Withdraw Application
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- Feedback Section -->
    <div id="feedbackSection" class="hidden bg-card rounded-xl border border-border p-8 mb-6">
      <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
        <i data-lucide="message-square" class="w-6 h-6 text-primary"></i>
        Application Feedback
      </h3>
      <div class="space-y-6">
        <!-- Reviewer Feedback -->
        <div id="reviewerFeedback" class="hidden">
          <h4 class="text-sm font-semibold text-muted-foreground uppercase tracking-wider mb-2">Reviewer Feedback</h4>
          <div class="bg-muted/30 rounded-lg p-4 border border-border/50">
            <p id="reviewerComments" class="text-sm italic leading-relaxed text-foreground/80 font-serif"></p>
          </div>
        </div>
        <!-- Committee Feedback -->
        <div id="committeeFeedback" class="hidden">
          <h4 class="text-sm font-semibold text-muted-foreground uppercase tracking-wider mb-2">Committee Decision
            Statement</h4>
          <div class="bg-primary/5 rounded-lg p-4 border border-primary/10">
            <p id="committeeComments" class="text-sm font-medium leading-relaxed text-primary"></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Additional Information -->
    <div class="bg-muted/50 rounded-xl border border-border p-6">
      <h3 class="font-bold mb-3 flex items-center gap-2">
        <i data-lucide="info" class="w-5 h-5"></i>
        Need Help?
      </h3>
      <p class="text-sm text-muted-foreground mb-4">
        If you have questions about your application status, please contact our support team.
      </p>
      <a href="student/support.html"
        class="text-primary hover:underline text-sm font-medium inline-flex items-center gap-1">
        Contact Support
        <i data-lucide="arrow-right" class="w-4 h-4"></i>
      </a>
    </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

    // TESTING MODE: Auth check disabled
    // if (!token || user.role !== 'Student') {
    //   window.location.href = '/login.html';
    // }

    const urlParams = new URLSearchParams(window.location.search);
    const applicationId = urlParams.get('id');


    async function loadApplicationStatus() {
      if (!applicationId) {
        document.getElementById('scholarshipTitle').textContent = 'No Application ID Provided';
        return;
      }

      try {
        const studentId = user.studentID;
        const url = studentId ? `/api/applications?studentId=${studentId}` : '/api/applications';
        const response = await fetch(url, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        const application = data.applications?.find(app => app.id == applicationId);

        if (!application) {
          document.getElementById('scholarshipTitle').textContent = 'Application Not Found';
          document.getElementById('appId').textContent = applicationId;
          return;
        }

        document.getElementById('scholarshipTitle').textContent = application.scholarship_title || 'Scholarship Application';
        document.getElementById('appId').textContent = application.id;
        document.getElementById('submissionDate').textContent = application.submissiondate ? new Date(application.submissiondate).toLocaleDateString() : 'N/A';

        const statusBadge = document.getElementById('statusBadge');
        statusBadge.textContent = application.status;
        statusBadge.className = `px-4 py-2 text-sm font-medium rounded-full ${application.status === 'Awarded' ? 'bg-success/10 text-success' :
          application.status === 'Reviewed' || application.status === 'Under Review' ? 'bg-blue-500/10 text-blue-600' :
            application.status === 'Pending' ? 'bg-yellow-500/10 text-yellow-600' :
              application.status === 'Rejected' ? 'bg-destructive/10 text-destructive' :
                'bg-muted text-muted-foreground'
          }`;

        // Handle Feedback Display
        const feedbackSection = document.getElementById('feedbackSection');
        const reviewerFeedback = document.getElementById('reviewerFeedback');
        const committeeFeedback = document.getElementById('committeeFeedback');
        let showFeedback = false;

        if (application.evaluation && application.evaluation.comments) {
          document.getElementById('reviewerComments').textContent = application.evaluation.comments;
          reviewerFeedback.classList.remove('hidden');
          showFeedback = true;
        }

        if (application.decisionComments) {
          document.getElementById('committeeComments').textContent = application.decisionComments;
          committeeFeedback.classList.remove('hidden');
          showFeedback = true;
        }

        if (showFeedback) {
          feedbackSection.classList.remove('hidden');
        }

        // Show/hide withdraw button based on status
        const withdrawBtn = document.getElementById('withdrawBtn');
        const cancellableStatuses = ['Pending', 'Reviewing', 'Reviewed', 'Under Review'];
        if (cancellableStatuses.includes(application.status)) {
          withdrawBtn.classList.remove('hidden');
        } else {
          withdrawBtn.classList.add('hidden');
        }

        // Build timeline based on status
        const timeline = [];
        timeline.push({
          status: "Submitted",
          date: new Date(application.submissiondate),
          completed: true,
          description: "Application successfully submitted"
        });

        if (application.status !== 'Pending') {
          timeline.push({
            status: "Under Review",
            date: new Date(),
            completed: true,
            description: "Your application is being reviewed"
          });
        } else {
          timeline.push({
            status: "Under Review",
            date: null,
            completed: false,
            description: "Pending review"
          });
        }

        if (application.status === 'Awarded' || application.status === 'Rejected') {
          timeline.push({
            status: "Final Decision",
            date: new Date(),
            completed: true,
            description: `Application ${application.status.toLowerCase()}`
          });
        } else {
          timeline.push({
            status: "Final Decision",
            date: null,
            completed: false,
            description: "Awaiting final decision"
          });
        }

        // Render timeline
        const timelineDiv = document.getElementById('timeline');
        timelineDiv.innerHTML = timeline.map((item, index) => `
          <div class="flex gap-4 relative">
            <div class="w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0 z-10 ${item.completed ? 'bg-success text-success-foreground' : 'bg-muted text-muted-foreground'
          }">
              <i data-lucide="${item.completed ? 'check' : 'circle'}" class="w-5 h-5"></i>
            </div>
            <div class="flex-1 pb-8">
              <h3 class="font-semibold mb-1">${item.status}</h3>
              <p class="text-sm text-muted-foreground mb-1">${item.description}</p>
              ${item.date ? `<p class="text-xs text-muted-foreground">${item.date.toLocaleDateString()}</p>` : ''}
            </div>
          </div>
        `).join('');

        lucide.createIcons();
      } catch (error) {
        console.error('Failed to load application:', error);
      }
    }

    async function withdrawApplication() {
      if (!confirm('Are you sure you want to withdraw this application? This action cannot be undone.')) {
        return;
      }

      const btn = document.getElementById('withdrawBtn');
      const originalContent = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Withdrawing...';
      lucide.createIcons();

      try {
        const response = await fetch('/api/applications', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'withdraw',
            appId: applicationId,
            studentId: user.studentID
          })
        });

        const result = await response.json();
        if (result.success) {
          alert('Application withdrawn successfully.');
          window.location.reload();
        } else {
          alert('Failed to withdraw application: ' + (result.error || 'Unknown error'));
          btn.disabled = false;
          btn.innerHTML = originalContent;
          lucide.createIcons();
        }
      } catch (error) {
        console.error('Withdrawal error:', error);
        alert('An error occurred while withdrawing the application.');
        btn.disabled = false;
        btn.innerHTML = originalContent;
        lucide.createIcons();
      }
    }

    loadApplicationStatus();
    lucide.createIcons();
  </script>
  <div id="footer-container"></div>
  <script src="/common.js"></script>
</body>

</html>
