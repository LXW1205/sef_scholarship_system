<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Status - Digital Scholarship Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>
<body class="font-sans antialiased bg-muted/30">
  <nav class="bg-primary text-primary-foreground border-b border-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
          <i data-lucide="graduation-cap" class="w-6 h-6"></i>
          <h1 class="text-xl font-bold">Student Portal</h1>
        </div>
        <div class="flex items-center gap-6">
          <a href="student/dashboard.html" class="hover:text-muted-foreground transition-colors flex items-center gap-1">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
            Dashboard
          </a>
          <button id="logoutBtn" class="px-4 py-2 bg-secondary text-secondary-foreground rounded-lg hover:bg-secondary/80 transition-colors flex items-center gap-1">
            <i data-lucide="log-out" class="w-4 h-4"></i>
            Logout
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="min-h-screen py-12">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="mb-6">
        <a href="student/my-applications.html" class="inline-flex items-center gap-2 text-primary hover:underline">
          <i data-lucide="arrow-left" class="w-4 h-4"></i>
          Back to Applications
        </a>
      </div>

      <!-- Status Overview -->
      <div class="bg-card rounded-xl border border-border p-8 mb-6">
        <div class="flex items-start justify-between mb-6">
          <div class="flex items-center gap-4">
            <div class="w-16 h-16 bg-primary/10 rounded-lg flex items-center justify-center">
              <i data-lucide="award" class="w-8 h-8 text-primary"></i>
            </div>
            <div>
              <h2 id="scholarshipTitle" class="text-2xl font-bold mb-2">Loading...</h2>
              <div class="flex items-center gap-4 text-sm text-muted-foreground">
                <span class="flex items-center gap-1">
                  <i data-lucide="hash" class="w-4 h-4"></i>
                  Application ID: <span id="appId" class="font-medium">...</span>
                </span>
                <span class="flex items-center gap-1">
                  <i data-lucide="calendar" class="w-4 h-4"></i>
                  Submitted: <span id="submissionDate">...</span>
                </span>
              </div>
            </div>
          </div>
          <span id="statusBadge" class="px-4 py-2 text-sm font-medium rounded-full"></span>
        </div>

        <!-- Status Timeline -->
        <div class="relative">
          <div class="absolute left-6 top-0 bottom-0 w-0.5 bg-border"></div>
          <div id="timeline" class="space-y-8 relative">
            <!-- Timeline items will be inserted here -->
          </div>
        </div>
      </div>

      <!-- Additional Information -->
      <div class="bg-muted/50 rounded-xl border border-border p-6">
        <h3 class="font-bold mb-3 flex items-center gap-2">
          <i data-lucide="info" class="w-5 h-5"></i>
          Need Help?
        </h3>
        <p class="text-sm text-muted-foreground mb-4">
          If you have questions about your application status, please contact our support team.
        </p>
        <a href="student/support.html" class="text-primary hover:underline text-sm font-medium inline-flex items-center gap-1">
          Contact Support
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </a>
      </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

    // TESTING MODE: Auth check disabled
    // if (!token || user.role !== 'Student') {
    //   window.location.href = '/login.html';
    // }

    const urlParams = new URLSearchParams(window.location.search);
    const applicationId = urlParams.get('id');

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.clear();
      sessionStorage.clear();
      window.location.href = '/login.html';
    });

    async function loadApplicationStatus() {
      // Mock data for demo - in production, fetch from API
      const mockData = {
        scholarshipTitle: "Merit-Based Academic Scholarship 2024",
        applicationId: applicationId || "12345",
        submissionDate: new Date().toLocaleDateString(),
        status: "Under Review",
        timeline: [
          { status: "Submitted", date: new Date(), completed: true, description: "Application successfully submitted" },
          { status: "Under Review", date: new Date(), completed: true, description: "Your application is being reviewed by our committee" },
          { status: "Interview Scheduled", date: null, completed: false, description: "You will be notified if an interview is required" },
          { status: "Final Decision", date: null, completed: false, description: "Final decision will be communicated via email" }
        ]
      };

      document.getElementById('scholarshipTitle').textContent = mockData.scholarshipTitle;
      document.getElementById('appId').textContent = mockData.applicationId;
      document.getElementById('submissionDate').textContent = mockData.submissionDate;

      const statusBadge = document.getElementById('statusBadge');
      statusBadge.textContent = mockData.status;
      statusBadge.className = `px-4 py-2 text-sm font-medium rounded-full ${
        mockData.status === 'Approved' ? 'bg-success/10 text-success' :
        mockData.status === 'Under Review' ? 'bg-blue-500/10 text-blue-600' :
        mockData.status === 'Pending' ? 'bg-yellow-500/10 text-yellow-600' :
        mockData.status === 'Rejected' ? 'bg-destructive/10 text-destructive' :
        'bg-muted text-muted-foreground'
      }`;

      // Render timeline
      const timeline = document.getElementById('timeline');
      timeline.innerHTML = mockData.timeline.map((item, index) => `
        <div class="flex gap-4 relative">
          <div class="w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0 z-10 ${
            item.completed ? 'bg-success text-success-foreground' : 'bg-muted text-muted-foreground'
          }">
            <i data-lucide="${item.completed ? 'check' : 'circle'}" class="w-5 h-5"></i>
          </div>
          <div class="flex-1 pb-8">
            <h3 class="font-semibold mb-1">${item.status}</h3>
            <p class="text-sm text-muted-foreground mb-1">${item.description}</p>
            ${item.date ? `<p class="text-xs text-muted-foreground">${item.date.toLocaleDateString()}</p>` : ''}
          </div>
        </div>
      `).join('');

      lucide.createIcons();
    }

    loadApplicationStatus();
    lucide.createIcons();
  </script>
</body>
</html>
