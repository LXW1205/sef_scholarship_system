<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - ScholarNet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(214.3 31.8% 91.4%)',
                        input: 'hsl(214.3 31.8% 91.4%)',
                        ring: 'hsl(222.2 84% 4.9%)',
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(222.2 84% 4.9%)',
                        primary: {
                            DEFAULT: 'hsl(222.2 47.4% 11.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        secondary: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(222.2 47.4% 11.2%)',
                        },
                        destructive: {
                            DEFAULT: 'hsl(0 84.2% 60.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        muted: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(215.4 16.3% 46.9%)',
                        },
                        card: {
                            DEFAULT: 'hsl(0 0% 100%)',
                            foreground: 'hsl(222.2 84% 4.9%)',
                        },
                        success: {
                            DEFAULT: 'hsl(142.1 76.2% 36.3%)',
                            foreground: 'hsl(355.7 100% 97.3%)',
                        },
                    },
                }
            }
        }
    </script>
</head>

</head>

<body class="font-sans antialiased bg-muted/30">
    <div id="header-container"></div>

    <main class="min-h-screen py-12">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="mb-8">
                <h2 class="text-3xl font-bold mb-2">My Profile</h2>
                <p class="text-muted-foreground">Manage your personal information and preferences</p>
            </div>

            <div class="bg-card rounded-xl border border-border overflow-hidden">
                <div class="p-8 border-b border-border bg-muted/30">
                    <div class="flex items-center gap-6">
                        <div
                            class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center border-4 border-background">
                            <i data-lucide="user" class="w-12 h-12 text-primary"></i>
                        </div>
                        <div>
                            <h3 id="userNameDisplay" class="text-2xl font-bold">Student Name</h3>
                            <p id="userEmailDisplay" class="text-muted-foreground">student@example.com</p>
                            <div
                                class="mt-2 text-xs font-medium px-2 py-1 bg-primary/10 text-primary rounded-full inline-block">
                                Student Account</div>
                        </div>
                    </div>
                </div>

                <form class="p-8 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Full Name</label>
                            <input type="text" id="fullName"
                                class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
                                value="">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Email Address</label>
                            <input type="email" id="email"
                                class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
                                value="" readonly>
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-2">Student ID</label>
                            <input type="text" id="studentID"
                                class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
                                value="" readonly>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-border">
                        <h4 class="font-bold mb-4">Academic Information</h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">Major/Program</label>
                                <input type="text" id="major"
                                    class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
                                    placeholder="e.g. Computer Science">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Current CGPA</label>
                                <input type="number" id="cgpa" step="0.01" min="0" max="4.0"
                                    class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
                                    placeholder="0.00">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Qualification</label>
                                <select id="qualification"
                                    class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
                                    <option value="">Select Qualification</option>
                                    <option value="Foundation">Foundation</option>
                                    <option value="Diploma">Diploma</option>
                                    <option value="Degree">Degree</option>
                                    <option value="Master">Master</option>
                                    <option value="PhD">PhD</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Year of Study</label>
                                <select id="yearOfStudy"
                                    class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
                                    <option value="">Select Year</option>
                                    <option value="1">Year 1</option>
                                    <option value="2">Year 2</option>
                                    <option value="3">Year 3</option>
                                    <option value="4">Year 4</option>
                                    <option value="Graduate">Graduate</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Expected Graduation</label>
                                <input type="month" id="expectedGraduation"
                                    class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-border">
                        <h4 class="font-bold mb-4">Financial Information</h4>
                        <div>
                            <label class="block text-sm font-medium mb-2">Annual Family Income (RM)</label>
                            <input type="number" id="familyIncome"
                                class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
                                placeholder="0.00">
                        </div>
                    </div>

                    <div class="pt-6 border-t border-border">
                        <h4 class="font-bold mb-4">Security</h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium mb-2">New Password</label>
                                <div class="relative">
                                    <input type="password"
                                        class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
                                        placeholder="••••••••">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">Confirm New Password</label>
                                <div class="relative">
                                    <input type="password"
                                        class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
                                        placeholder="••••••••">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-4 pt-6">
                        <button type="button"
                            class="px-6 py-2 bg-secondary text-secondary-foreground rounded-lg hover:bg-secondary/80 transition-colors font-medium">Cancel</button>
                        <button type="submit"
                            class="px-6 py-2 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-medium">Save
                            Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="/common.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

        async function fetchUserProfile() {
            if (!user.id) return;

            try {
                const response = await fetch(`/api/users?id=${user.id}`);
                if (response.ok) {
                    const data = await response.json();
                    const profile = data.user;

                    document.getElementById('userNameDisplay').textContent = profile.fullName;
                    document.getElementById('userEmailDisplay').textContent = profile.email;
                    document.getElementById('fullName').value = profile.fullName;
                    document.getElementById('email').value = profile.email;

                    if (profile.role === 'Student') {
                        document.getElementById('studentID').value = profile.studentID || '';
                        document.getElementById('cgpa').value = profile.cgpa || '';
                        document.getElementById('major').value = profile.major || '';
                        document.getElementById('qualification').value = profile.qualification || '';
                        document.getElementById('yearOfStudy').value = profile.yearOfStudy || '';
                        document.getElementById('expectedGraduation').value = profile.expectedGraduation || '';
                        document.getElementById('familyIncome').value = profile.familyIncome || '';
                    }
                }
            } catch (error) {
                console.error('Error fetching profile:', error);
            }
        }

        if (user.role === 'Student') {
            fetchUserProfile();
        }

        // Handle Form Submission
        document.querySelector('form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const password = document.querySelectorAll('input[type="password"]')[0].value;
            const confirmPassword = document.querySelectorAll('input[type="password"]')[1].value;

            if (password && password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            const btn = document.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = 'Saving...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: user.id,
                        fullName: fullName,
                        password: password,
                        role: user.role, // Added role for backend logic
                        cgpa: document.getElementById('cgpa').value || 0,
                        major: document.getElementById('major').value || "",
                        qualification: document.getElementById('qualification').value || "",
                        yearOfStudy: document.getElementById('yearOfStudy').value || "",
                        expectedGraduation: document.getElementById('expectedGraduation').value || "",
                        familyIncome: document.getElementById('familyIncome').value || 0
                    })
                });

                const result = await response.json();
                if (result.success) {
                    alert('Profile updated successfully!');
                    // Update local storage name if changed
                    user.fullName = fullName;
                    localStorage.setItem('user', JSON.stringify(user));
                    window.location.reload();
                } else {
                    alert('Failed to update profile: ' + (result.error || 'Unknown error'));
                }
            } catch (err) {
                console.error(err);
                alert('Error updating profile');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        // Handle Cancel Button
        document.querySelector('button[type="button"]').addEventListener('click', () => {
            if (confirm('Are you sure you want to discard changes?')) {
                window.location.reload();
            }
        });
    </script>
</body>

</html>
