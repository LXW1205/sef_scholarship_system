<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Application - Digital Scholarship Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <div id="header-container"></div>

  <main class="min-h-screen py-12">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <!-- Progress Steps -->
      <div class="mb-8">
        <div class="flex items-center justify-between mb-4">
          <div class="flex flex-col items-center flex-1">
            <div
              class="w-10 h-10 bg-success text-success-foreground rounded-full flex items-center justify-center font-bold">
              <i data-lucide="check" class="w-5 h-5"></i>
            </div>
            <p class="text-sm mt-2 text-muted-foreground">Application Form</p>
          </div>
          <div class="flex-1 h-1 bg-success"></div>
          <div class="flex flex-col items-center flex-1">
            <div
              class="w-10 h-10 bg-success text-success-foreground rounded-full flex items-center justify-center font-bold">
              <i data-lucide="check" class="w-5 h-5"></i>
            </div>
            <p class="text-sm mt-2 text-muted-foreground">Upload Documents</p>
          </div>
          <div class="flex-1 h-1 bg-primary"></div>
          <div class="flex flex-col items-center flex-1">
            <div
              class="w-10 h-10 bg-primary text-primary-foreground rounded-full flex items-center justify-center font-bold">
              3</div>
            <p class="text-sm mt-2 font-medium">Review & Submit</p>
          </div>
        </div>
      </div>

      <!-- Review Card -->
      <div class="bg-card rounded-xl border border-border p-8">
        <div class="flex items-center gap-3 mb-6">
          <div class="w-12 h-12 bg-primary/10 rounded-lg flex items-center justify-center">
            <i data-lucide="eye" class="w-6 h-6 text-primary"></i>
          </div>
          <div>
            <h2 class="text-2xl font-bold">Review Your Application</h2>
            <p class="text-muted-foreground">Please review all information before submitting</p>
          </div>
        </div>

        <div id="applicationPreview" class="space-y-6 mb-8">
          <!-- Will be populated by JavaScript -->
        </div>

        <!-- Confirmation Checkbox -->
        <div class="bg-muted/50 rounded-lg p-4 mb-6">
          <label class="flex items-start gap-3 cursor-pointer">
            <input type="checkbox" id="confirmCheckbox"
              class="mt-1 w-4 h-4 rounded border-input text-primary focus:ring-2 focus:ring-ring">
            <span class="text-sm">
              I confirm that all the information provided in this application is accurate and complete to the best of my
              knowledge.
              I understand that providing false information may result in disqualification.
            </span>
          </label>
        </div>

        <!-- Error/Success Messages -->
        <div id="errorMessage"
          class="text-destructive bg-destructive/10 border border-destructive/20 rounded-lg p-3 text-sm flex items-center gap-2 mb-6"
          style="display: none;">
          <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
          <span id="errorText"></span>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-4">
          <button type="button" onclick="history.back()"
            class="flex-1 px-6 py-3 bg-secondary text-secondary-foreground rounded-lg hover:bg-secondary/80 transition-colors font-medium flex items-center justify-center gap-2">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            Back
          </button>
          <button type="button" onclick="history.go(-2)"
            class="flex-1 px-6 py-3 bg-muted text-foreground rounded-lg hover:bg-muted/80 transition-colors font-medium flex items-center justify-center gap-2">
            <i data-lucide="edit" class="w-5 h-5"></i>
            Edit Application
          </button>
          <button type="button" id="submitBtn"
            class="flex-1 px-6 py-3 bg-success text-success-foreground rounded-lg hover:bg-success/90 transition-colors font-medium flex items-center justify-center gap-2">
            <i data-lucide="send" class="w-5 h-5"></i>
            Submit Application
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

    // TESTING MODE: Auth check disabled
    // if (!token || user.role !== 'Student') {
    //   window.location.href = '/login.html';
    // }

    const urlParams = new URLSearchParams(window.location.search);
    const scholarshipId = urlParams.get('id');


    // Load and display application data
    function loadApplicationPreview() {
      const formData = JSON.parse(sessionStorage.getItem(`applicationDraft_${scholarshipId}`) || '{}');
      const documents = JSON.parse(sessionStorage.getItem(`documents_${scholarshipId}`) || '{}');

      const preview = document.getElementById('applicationPreview');
      preview.innerHTML = `
        <!-- Personal Information -->
        <div class="border-b border-border pb-6">
          <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
            <i data-lucide="user" class="w-5 h-5"></i>
            Personal Information
          </h3>
          <div class="grid grid-cols-2 gap-4 text-sm">
            <div><span class="text-muted-foreground">Full Name:</span> <span class="font-medium">${formData.fullName || 'N/A'}</span></div>
            <div><span class="text-muted-foreground">Email:</span> <span class="font-medium">${formData.email || 'N/A'}</span></div>
            <div><span class="text-muted-foreground">Phone:</span> <span class="font-medium">${formData.phone || 'N/A'}</span></div>
            <div><span class="text-muted-foreground">Student ID:</span> <span class="font-medium">${formData.studentId || 'N/A'}</span></div>
          </div>
        </div>

        <!-- Academic Information -->
        <div class="border-b border-border pb-6">
          <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
            <i data-lucide="book-open" class="w-5 h-5"></i>
            Academic Information
          </h3>
          <div class="grid grid-cols-2 gap-4 text-sm">
            <div><span class="text-muted-foreground">Major:</span> <span class="font-medium">${formData.major || 'N/A'}</span></div>
            <div><span class="text-muted-foreground">GPA:</span> <span class="font-medium">${formData.gpa || 'N/A'}</span></div>
            <div><span class="text-muted-foreground">Year of Study:</span> <span class="font-medium">${formData.yearOfStudy || 'N/A'}</span></div>
            <div><span class="text-muted-foreground">Expected Graduation:</span> <span class="font-medium">${formData.expectedGraduation || 'N/A'}</span></div>
          </div>
        </div>

        <!-- Personal Statement -->
        <div class="border-b border-border pb-6">
          <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
            <i data-lucide="pen-tool" class="w-5 h-5"></i>
            Personal Statement
          </h3>
          <p class="text-sm text-muted-foreground leading-relaxed whitespace-pre-wrap">${formData.essay || 'No statement provided'}</p>
        </div>

        <!-- Uploaded Documents -->
        <div class="pb-6">
          <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
            <i data-lucide="paperclip" class="w-5 h-5"></i>
            Uploaded Documents
          </h3>
          <div class="space-y-2">
            ${documents.transcript ? `
              <div class="flex items-center gap-2 text-sm bg-muted/30 rounded-lg p-3">
                <i data-lucide="file-text" class="w-4 h-4 text-primary"></i>
                <span>Academic Transcript: ${documents.transcript}</span>
              </div>
            ` : ''}
            ${documents.recommendation ? `
              <div class="flex items-center gap-2 text-sm bg-muted/30 rounded-lg p-3">
                <i data-lucide="file-signature" class="w-4 h-4 text-primary"></i>
                <span>Recommendation Letter: ${documents.recommendation}</span>
              </div>
            ` : ''}
            ${documents.id ? `
              <div class="flex items-center gap-2 text-sm bg-muted/30 rounded-lg p-3">
                <i data-lucide="id-card" class="w-4 h-4 text-primary"></i>
                <span>ID/Passport: ${documents.id}</span>
              </div>
            ` : ''}
          </div>
        </div>
      `;

      lucide.createIcons();
    }

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const confirmCheckbox = document.getElementById('confirmCheckbox');

      if (!confirmCheckbox.checked) {
        document.getElementById('errorText').textContent = 'Please confirm that all information is accurate';
        document.getElementById('errorMessage').style.display = 'flex';
        lucide.createIcons();
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Submitting...';
      lucide.createIcons();

      try {
        const response = await fetch('/api/applications', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ scholarshipID: scholarshipId })
        });

        const data = await response.json();

        if (response.ok) {
          // Clear session storage
          sessionStorage.removeItem(`applicationDraft_${scholarshipId}`);
          sessionStorage.removeItem(`documents_${scholarshipId}`);

          // Redirect to confirmation page
          window.location.href = `/student/application-submitted.html?id=${data.application.appid}`;
        } else {
          document.getElementById('errorText').textContent = data.error || 'Failed to submit application';
          document.getElementById('errorMessage').style.display = 'flex';
          lucide.createIcons();

          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i data-lucide="send" class="w-5 h-5"></i> Submit Application';
          lucide.createIcons();
        }
      } catch (error) {
        console.error('[v0] Submit application error:', error);
        document.getElementById('errorText').textContent = 'An error occurred. Please try again.';
        document.getElementById('errorMessage').style.display = 'flex';
        lucide.createIcons();

        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i data-lucide="send" class="w-5 h-5"></i> Submit Application';
        lucide.createIcons();
      }
    });

    loadApplicationPreview();
    lucide.createIcons();
  </script>
  <div id="footer-container"></div>
  <script src="/common.js"></script>
</body>

</html>
