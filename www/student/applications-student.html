<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Applications - Digital Scholarship Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-[#7A8691]">
  <!-- Navigation -->
  <div id="header-container"></div>

  <main class="min-h-screen py-12">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h2 class="text-3xl font-bold mb-2">My Applications</h2>
          <p class="text-black">Track the status of your scholarship applications</p>
        </div>
        <a href="/student/scholarships-student.html"
          class="px-4 py-2 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors flex items-center gap-2">
          <i data-lucide="plus" class="w-4 h-4"></i>
          Apply for More
        </a>
      </div>

      <!-- Status Filter -->
      <div class="bg-card rounded-xl border border-border p-4 mb-6">
        <div class="flex items-center gap-4">
          <label class="text-sm font-medium">Filter by Status:</label>
          <select id="statusFilter"
            class="px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
            <option value="">All Applications</option>
            <option value="Pending">Pending</option>
            <option value="Under Review">Under Review</option>
            <option value="Awarded">Awarded</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
      </div>

      <!-- Applications List -->
      <div id="applicationsList">
        <div class="flex items-center justify-center py-12">
          <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-muted-foreground"></i>
        </div>
      </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

    // TESTING MODE: Auth check disabled
    // if (!token || user.role !== 'Student') {
    //   window.location.href = '/login.html';
    // }


    let allApplications = [];

    async function loadApplications() {
      try {
        const studentId = user.studentID;
        const url = studentId ? `/api/applications?studentId=${studentId}` : '/api/applications';
        const response = await fetch(url, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await response.json();
        allApplications = data.applications || [];
        displayApplications(allApplications);
      } catch (error) {
        console.error('[v0] Load applications error:', error);
        document.getElementById('applicationsList').innerHTML = `
          <div class="text-center text-destructive py-8">
            Failed to load applications. Please try again.
          </div>
        `;
      }
    }

    function displayApplications(applications) {
      const list = document.getElementById('applicationsList');

      if (applications.length === 0) {
        list.innerHTML = `
          <div class="bg-card rounded-xl border border-border p-12 text-center">
            <i data-lucide="inbox" class="w-16 h-16 mx-auto mb-4 text-muted-foreground opacity-50"></i>
            <h3 class="text-xl font-bold mb-2">No Applications Found</h3>
            <p class="text-black mb-6">You haven't submitted any scholarship applications yet</p>
            <a href="/student/scholarships-student.html" class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-medium">
              <i data-lucide="search" class="w-5 h-5"></i>
              Browse Scholarships
            </a>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      list.innerHTML = `
        <div class="space-y-4">
          ${applications.map(app => `
            <div class="bg-card rounded-xl border border-border p-6 hover:border-primary transition-all">
              <div class="flex items-start justify-between">
                <div class="flex items-start gap-4 flex-1">
                  <div class="w-12 h-12 bg-primary/10 rounded-lg flex items-center justify-center flex-shrink-0">
                    <i data-lucide="award" class="w-6 h-6 text-primary"></i>
                  </div>
                  <div class="flex-1">
                    <h3 class="text-xl font-bold mb-2">${app.scholarship_title}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                      <div class="flex items-center gap-2 text-sm text-muted-foreground">
                        <i data-lucide="calendar" class="w-4 h-4"></i>
                        <span>Submitted: ${formatDate(app.submissiondate)}</span>
                      </div>

                      <div class="flex items-center gap-2 text-sm">
                        <i data-lucide="info" class="w-4 h-4 text-muted-foreground"></i>
                        <span class="px-3 py-1 text-xs font-medium rounded-full ${app.status === 'Awarded' ? 'bg-success/10 text-success' :
          app.status === 'Pending' ? 'bg-yellow-500/10 text-yellow-600' :
            app.status === 'Under Review' ? 'bg-blue-500/10 text-blue-600' :
              app.status === 'Rejected' ? 'bg-destructive/10 text-destructive' :
                'bg-muted text-muted-foreground'
        }">${app.status}</span>
                      </div>
                    </div>
                    <button onclick="viewApplicationDetails(${app.applicationid})" 
                      class="text-primary hover:underline text-sm font-medium inline-flex items-center gap-1">
                      View Details
                      <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      lucide.createIcons();
    }

    document.getElementById('statusFilter').addEventListener('change', (e) => {
      const filterValue = e.target.value;
      const filtered = filterValue
        ? allApplications.filter(app => app.status === filterValue)
        : allApplications;
      displayApplications(filtered);
    });

    function viewApplicationDetails(applicationId) {
      window.location.href = `/student/application-status.html?id=${applicationId}`;
    }

    loadApplications();
    lucide.createIcons();
  </script>
  <div id="footer-container"></div>
  <script src="/common.js"></script>
</body>

</html>
