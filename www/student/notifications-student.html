<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - ScholarNet Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(214.3 31.8% 91.4%)',
                        input: 'hsl(214.3 31.8% 91.4%)',
                        ring: 'hsl(222.2 84% 4.9%)',
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(222.2 84% 4.9%)',
                        primary: {
                            DEFAULT: 'hsl(222.2 47.4% 11.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        secondary: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(222.2 47.4% 11.2%)',
                        },
                        destructive: {
                            DEFAULT: 'hsl(0 84.2% 60.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        muted: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(215.4 16.3% 46.9%)',
                        },
                        card: {
                            DEFAULT: 'hsl(0 0% 100%)',
                            foreground: 'hsl(222.2 84% 4.9%)',
                        },
                        success: {
                            DEFAULT: 'hsl(142.1 76.2% 36.3%)',
                            foreground: 'hsl(355.7 100% 97.3%)',
                        },
                    },
                }
            }
        }
    </script>
</head>

<body class="font-sans antialiased bg-[#7A8691]">
    <div id="header-container"></div>

    <main class="min-h-screen py-12">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold mb-2">Notifications</h2>
                    <p class="text-black">Updates on your applications</p>
                </div>
                <button onclick="markAllAsRead()" class="text-sm text-primary hover:underline">Mark all as read</button>
            </div>

            <div id="notificationsList" class="space-y-4">
                <!-- Notifications will be loaded here -->
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="/common.js"></script>
    <script>
        const token = localStorage.getItem('token') || sessionStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

        if (!token || user.role !== 'Student') {
            window.location.href = '/login.html';
        }

        async function loadNotifications() {
            try {
                const response = await fetch(`/api/notifications?userId=${user.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                const notifications = data.notifications || [];

                const list = document.getElementById('notificationsList');
                if (notifications.length === 0) {
                    list.innerHTML = `
                        <div class="bg-card rounded-xl border border-border p-12 text-center">
                            <i data-lucide="bell-off" class="w-16 h-16 mx-auto mb-4 text-muted-foreground opacity-50"></i>
                            <h3 class="text-xl font-bold mb-2">No Notifications</h3>
                            <p class="text-black">You're all caught up!</p>
                        </div>
                    `;
                } else {
                    list.innerHTML = notifications.map(notif => `
                        <div class="bg-card rounded-xl border border-border p-4 hover:border-primary transition-all">
                            <div class="flex items-start gap-4">
                                <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center flex-shrink-0">
                                    <i data-lucide="info" class="w-5 h-5 text-primary"></i>
                                </div>
                                <div class="flex-1">
                                    <p class="font-medium">${notif.message}</p>
                                    <p class="text-xs text-muted-foreground mt-1">${new Date(notif.sentAt).toLocaleString()}</p>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
                lucide.createIcons();
            } catch (error) {
                console.error('Failed to load notifications:', error);
            }
        }

        async function markAllAsRead() {
            try {
                const response = await fetch('/api/notifications', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ action: 'markAllAsRead', userId: user.id })
                });
                const result = await response.json();
                if (result.success) {
                    loadNotifications();
                    if (typeof updateNotificationBadge === 'function') {
                        updateNotificationBadge();
                    }
                }
            } catch (e) {
                console.error('Failed to mark all as read:', e);
            }
        }

        loadNotifications();
    </script>
</body>

</html>
