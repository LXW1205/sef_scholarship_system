<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Inquiries - Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(214.3 31.8% 91.4%)',
                        input: 'hsl(214.3 31.8% 91.4%)',
                        ring: 'hsl(222.2 84% 4.9%)',
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(222.2 84% 4.9%)',
                        primary: {
                            DEFAULT: 'hsl(222.2 47.4% 11.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        secondary: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(222.2 47.4% 11.2%)',
                        },
                        destructive: {
                            DEFAULT: 'hsl(0 84.2% 60.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        muted: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(215.4 16.3% 46.9%)',
                        },
                        card: {
                            DEFAULT: 'hsl(0 0% 100%)',
                            foreground: 'hsl(222.2 84% 4.9%)',
                        },
                    },
                }
            }
        }
    </script>
</head>

<body class="font-sans antialiased bg-[#7A8691]">
    <div id="header-container"></div>

    <main class="max-w-[1600px] mx-auto py-8 px-4 sm:px-6 lg:px-8 min-h-screen">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-black">My Inquiries</h1>
            <p class="text-black mt-1">Ask questions and view responses from administrators.</p>
        </header>

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div class="flex items-center gap-4">
                <button onclick="document.getElementById('newInquiryForm').classList.toggle('hidden')"
                    class="flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg hover:bg-opacity-90 transition-all shadow-sm">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> New Inquiry
                </button>
                <div class="relative min-w-[150px]">
                    <select id="statusFilter" onchange="filterInquiries()"
                        class="w-full pl-3 pr-10 py-2 bg-white border border-gray-200 rounded-lg appearance-none focus:outline-none focus:ring-2 focus:ring-primary/20">
                        <option value="All">All Inquiries</option>
                        <option value="Pending">Pending</option>
                        <option value="Answered">Answered</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>
        </div>

        <form id="newInquiryForm" class="hidden mb-8 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h3 class="text-lg font-bold mb-4">Submit a Question</h3>



            <div class="mb-4">
                <label class="block text-sm font-medium mb-1 text-gray-700">Your Question</label>
                <textarea id="questionInput" rows="3"
                    class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all"
                    placeholder="Type your question here..." required></textarea>
            </div>
            <div class="flex justify-end">
                <button type="submit"
                    class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-opacity-90 transition-all shadow-sm">Submit</button>
            </div>
        </form>

        <div id="inquiriesList" class="space-y-4">
            <div class="p-8 text-center text-gray-500 bg-white rounded-xl border border-gray-200 shadow-sm">Loading
                inquiries...</div>
        </div>
    </main>

    <!-- Template for Inquiry Item -->
    <template id="inquiryTemplate">
        <div
            class="inquiry-item bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden transition-all hover:shadow-md">
            <button onclick="toggleAccordion(this)" class="w-full text-left p-6 focus:outline-none group">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-3 mb-2">
                            <span
                                class="status-badge inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold"></span>

                            <span class="date-text text-xs text-gray-400"></span>
                        </div>
                        <p
                            class="question-preview font-medium text-gray-900 truncate group-hover:text-primary transition-colors">
                        </p>
                    </div>
                    <div class="flex items-center text-gray-400 group-hover:text-primary transition-colors">
                        <i data-lucide="chevron-down"
                            class="accordion-icon w-5 h-5 transition-transform duration-200"></i>
                    </div>
                </div>
            </button>
            <div class="accordion-content hidden border-t border-gray-100 bg-gray-50/50">
                <div class="p-6 space-y-4">
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-1">Your Question</p>
                        <p class="question-full text-gray-700 whitespace-pre-wrap leading-relaxed"></p>
                    </div>
                    <div class="answer-section hidden pt-4 border-t border-gray-100">
                        <p class="text-[10px] text-primary font-bold uppercase tracking-wider mb-1">Response</p>
                        <p class="answer-text text-gray-700 whitespace-pre-wrap leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <div id="footer-container"></div>
    <script src="/common.js?v=3"></script>
    <script>
        let allInquiries = [];

        function toggleAccordion(button) {
            const content = button.nextElementSibling;
            const icon = button.querySelector('.accordion-icon');
            const isHidden = content.classList.contains('hidden');

            // Close all others
            document.querySelectorAll('.accordion-content').forEach(c => {
                if (c !== content) {
                    c.classList.add('hidden');
                    c.previousElementSibling.querySelector('.accordion-icon').style.transform = 'rotate(0deg)';
                }
            });

            if (isHidden) {
                content.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        function filterInquiries() {
            const status = document.getElementById('statusFilter').value;
            renderInquiries(status === 'All' ? allInquiries : allInquiries.filter(i => i.status === status));
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            loadInquiries();


            document.getElementById('newInquiryForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const question = document.getElementById('questionInput').value;

                const btn = e.target.querySelector('button[type="submit"]');



                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Submitting...';
                if (window.lucide) lucide.createIcons();

                try {
                    const res = await fetch('/api/inquiries', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ message: question })

                    });

                    if (res.ok) {
                        document.getElementById('questionInput').value = '';
                        document.getElementById('newInquiryForm').classList.add('hidden');
                        loadInquiries();
                    } else {
                        const errorData = await res.json();
                        alert(errorData.error || 'Failed to submit inquiry');
                    }
                } catch (err) {
                    alert('Error submitting inquiry');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Submit';
                    if (window.lucide) lucide.createIcons();
                }
            });
        });



        async function loadInquiries() {
            const container = document.getElementById('inquiriesList');
            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                const res = await fetch('/api/inquiries', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) throw new Error('Error loading inquiries');

                allInquiries = await res.json();
                renderInquiries(allInquiries);

            } catch (err) {
                container.innerHTML = `<div class="p-8 text-center text-red-500 bg-white rounded-xl border border-red-100 shadow-sm">Error loading inquiries: ${err.message}</div>`;
            }
        }

        function renderInquiries(data) {
            const container = document.getElementById('inquiriesList');
            const template = document.getElementById('inquiryTemplate');

            container.innerHTML = '';
            if (data.length === 0) {
                container.innerHTML = '<div class="p-12 text-center text-gray-500 bg-white rounded-xl border border-gray-200 shadow-sm"><i data-lucide="inbox" class="w-12 h-12 mx-auto mb-4 text-gray-300"></i> No inquiries found matching the criteria.</div>';
                if (window.lucide) lucide.createIcons();
                return;
            }

            data.forEach(i => {
                const clone = template.content.cloneNode(true);
                const item = clone.querySelector('.inquiry-item');
                item.dataset.status = i.status;

                const badge = clone.querySelector('.status-badge');
                badge.textContent = i.status;
                badge.className += i.status === 'Answered'
                    ? ' bg-green-50 text-green-700 border border-green-100'
                    : ' bg-amber-50 text-amber-700 border border-amber-100';


                clone.querySelector('.date-text').textContent = formatDate(i.submittedAt, true);
                clone.querySelector('.question-preview').textContent = i.message;
                clone.querySelector('.question-full').textContent = i.message;

                if (i.answer) {
                    const ansSec = clone.querySelector('.answer-section');
                    ansSec.classList.remove('hidden');
                    ansSec.querySelector('.answer-text').textContent = i.answer;
                }

                container.appendChild(clone);
            });


            if (window.lucide) lucide.createIcons();
        }

    </script>
</body>

</html>
