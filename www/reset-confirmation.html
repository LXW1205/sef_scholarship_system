<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Email Sent - Digital Scholarship Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>
<body class="font-sans antialiased bg-muted/30">
  <nav class="bg-primary text-primary-foreground border-b border-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
          <i data-lucide="graduation-cap" class="w-6 h-6"></i>
          <h1 class="text-xl font-bold">Digital Scholarship Portal</h1>
        </div>
      </div>
    </div>
  </nav>

  <main class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <!-- Interface I-002: Reset Confirmation -->
    <div class="max-w-md w-full bg-card text-card-foreground rounded-xl border border-border p-8 shadow-lg">
      <div class="text-center mb-8">
        <div class="flex justify-center mb-4">
          <div class="w-16 h-16 bg-success/10 rounded-full flex items-center justify-center">
            <i data-lucide="mail-check" class="w-8 h-8 text-success"></i>
          </div>
        </div>
        <h2 class="text-3xl font-bold mb-2">Check Your Email</h2>
        <p class="text-muted-foreground">We've sent a password reset link to</p>
        <p class="text-foreground font-medium mt-2" id="emailDisplay"></p>
      </div>
      
      <div class="bg-muted/50 rounded-lg p-4 mb-6">
        <div class="flex gap-3">
          <i data-lucide="info" class="w-5 h-5 text-primary flex-shrink-0 mt-0.5"></i>
          <div class="text-sm text-muted-foreground">
            <p class="mb-2">Please check your inbox and click the link to reset your password.</p>
            <p>If you don't see the email, check your spam folder.</p>
          </div>
        </div>
      </div>

      <button onclick="window.location.href='login.html'" 
        class="w-full px-4 py-3 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-medium flex items-center justify-center gap-2">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        Back to Login
      </button>

      <div class="mt-6 text-center">
        <p class="text-sm text-muted-foreground">
          Didn't receive the email? 
          <a href="forgot-password.html" class="text-primary hover:underline font-medium">Try again</a>
        </p>
      </div>
    </div>
  </main>

  <script>
    // Display the email from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');
    if (email) {
      document.getElementById('emailDisplay').textContent = email;
    }

    lucide.createIcons();
  </script>
</body>
</html>
