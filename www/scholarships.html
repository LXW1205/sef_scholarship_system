<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarships - ScholarNet</title>
  <!-- Using Tailwind CDN instead of Next.js CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Added Lucide icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <!-- Navigation with Tailwind styling -->
  <div id="header-container"></div>

  <main>
    <!-- Page header with hero background -->
    <div class="hero-image-bg">
      <div class="hero-overlay"></div>

      <section
        class="relative z-10 flex items-center justify-center min-h-[400px] px-4 sm:px-6 lg:px-8 text-center pt-32 pb-16">
        <div class="max-w-4xl mx-auto hero-content">
          <!-- Added icon to the header -->
          <div class="flex justify-center mb-6 animate-float">
            <i data-lucide="book-open" class="w-16 h-16 text-white drop-shadow-lg"></i>
          </div>
          <h2 class="text-4xl lg:text-7xl font-black mb-6 text-white drop-shadow-2xl tracking-tight">Available
            Scholarships</h2>
          <p class="text-xl lg:text-2xl text-white/90 font-medium mb-12 drop-shadow-lg leading-relaxed">Discover your
            path to success with our curated opportunities</p>

          <!-- Eligibility Toggle (Hidden by default, shown if student logged in) -->
          <div id="eligibilityToggleContainer" class="flex justify-center hidden">
            <label
              class="inline-flex items-center cursor-pointer bg-white/10 backdrop-blur-md px-8 py-4 rounded-full border border-white/20 shadow-xl transition-all hover:bg-white/20 btn-3d shine-effect">
              <input type="checkbox" id="eligibilityToggle" class="sr-only peer" onchange="toggleEligibility()">
              <div
                class="relative w-11 h-6 bg-white/20 border-2 border-white/20 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-white peer-checked:border-white">
              </div>
              <span class="ms-4 text-sm font-black text-white uppercase tracking-widest">Show Eligible Only</span>
            </label>
          </div>
        </div>
      </section>

      <!-- Scholarships grid integrated with background -->
      <section class="py-12 relative z-10 hero-content">
        <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
          <div id="loadingMessage" class="text-center text-white/80 py-12 flex flex-col items-center gap-4">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin"></i>
            <span class="font-bold text-lg">Loading scholarships...</span>
          </div>
          <div id="scholarshipsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 animate-form"></div>
          <div id="errorMessage"
            class="text-destructive bg-destructive/10 border border-destructive/20 rounded-3xl p-8 text-center backdrop-blur-xl relative z-20"
            style="display: none;"></div>
        </div>
      </section>

      <div class="fade-to-solid"></div>
    </div>
  </main>


  <script>
    async function checkUserRole() {
      const user = JSON.parse(localStorage.getItem('user'));
      if (user && user.role === 'Student') {
        document.getElementById('eligibilityToggleContainer').classList.remove('hidden');
      }
    }

    async function toggleEligibility() {
      const isChecked = document.getElementById('eligibilityToggle').checked;
      loadScholarships(isChecked);
    }

    async function loadScholarships(eligibleOnly = false) {
      const loadingMessage = document.getElementById('loadingMessage');
      const scholarshipsList = document.getElementById('scholarshipsList');
      const errorMessage = document.getElementById('errorMessage');

      loadingMessage.style.display = 'flex';
      scholarshipsList.innerHTML = '';
      errorMessage.style.display = 'none';

      try {
        let url = '/api/scholarships?active=true';
        if (eligibleOnly) {
          const user = JSON.parse(localStorage.getItem('user'));
          if (user && user.username) {
            url += `&eligibleFor=${user.username}`;
          }
        }

        const response = await fetch(url);
        const data = await response.json();

        loadingMessage.style.display = 'none';

        if (response.ok && data.scholarships && data.scholarships.length > 0) {
          scholarshipsList.innerHTML = data.scholarships.map(scholarship => `
            <div class="bg-white/90 backdrop-blur-xl rounded-3xl border border-white/20 p-8 hover:bg-white transition-all group hover:-translate-y-2 shadow-2xl flex flex-col h-full relative overflow-hidden">
              <div class="flex items-start justify-between mb-6">
                <div class="w-14 h-14 bg-[#0f172a]/5 rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform">
                  <i data-lucide="award" class="w-7 h-7 text-[#0f172a]"></i>
                </div>
                <span class="px-4 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-full ${scholarship.status === 'Active' ? 'bg-[#0f172a]/10 text-[#0f172a]' : 'bg-slate-100 text-[#475569]'}">
                  ${scholarship.status || 'Active'}
                </span>
              </div>
              <h3 class="text-2xl font-black mb-3 text-[#0f172a] tracking-tight leading-tight">${scholarship.title}</h3>
              <p class="text-[#475569] text-sm mb-6 line-clamp-3 leading-relaxed font-medium">${scholarship.description || 'No description available'}</p>
              
              <div class="mb-6">
                <h4 class="text-[10px] font-black text-[#0f172a]/40 uppercase tracking-widest mb-3">Assessment Criteria</h4>
                <div class="flex flex-wrap gap-2">
                  ${scholarship.criteria && scholarship.criteria.length > 0 ?
              scholarship.criteria.map(c => `
                      <span class="px-3 py-1.5 bg-slate-50 text-[#0f172a] text-[10px] font-bold rounded-xl border border-slate-200 flex flex-col">
                        <span>${c.name}</span>
                        <span class="opacity-50 text-[8px]">${c.weightage}% • Max ${c.maxScore}</span>
                      </span>
                    `).join('') :
              '<span class="text-xs text-[#475569] italic">No criteria defined</span>'
            }
                </div>
              </div>

              <div class="space-y-3 mb-8 mt-auto">
                <div class="flex items-center gap-3 text-sm text-[#0f172a] font-bold">
                  <i data-lucide="graduation-cap" class="w-5 h-5 opacity-40"></i>
                  <span>${(scholarship.forQualification && scholarship.forQualification !== 'Any' && scholarship.forQualification !== 'All') ? scholarship.forQualification : 'All Qualifications'}</span>
                </div>
                <div class="flex items-center gap-3 text-sm text-[#0f172a] font-black text-lg">
                  <i data-lucide="banknote" class="w-6 h-6 opacity-40"></i>
                  <span>${scholarship.amount ? (typeof scholarship.amount === 'number' ? 'RM ' + scholarship.amount.toLocaleString() : scholarship.amount) : 'N/A'}</span>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-4 pt-4 border-t border-slate-200/50">
                  <div class="flex flex-col">
                    <span class="text-[9px] text-[#475569] font-black uppercase tracking-widest mb-1">Min. CGPA</span>
                    <span class="text-sm font-black text-[#0f172a]">${scholarship.minCGPA || '0.00'}</span>
                  </div>
                  <div class="flex flex-col border-l border-slate-200/50 pl-4">
                    <span class="text-[9px] text-[#475569] font-black uppercase tracking-widest mb-1">Max Income</span>
                    <span class="text-sm font-black text-[#0f172a]">${scholarship.maxFamilyIncome ? (scholarship.maxFamilyIncome === 0 ? 'No Limit' : 'RM ' + scholarship.maxFamilyIncome.toLocaleString()) : 'No Limit'}</span>
                  </div>
                </div>
                <div class="flex items-center gap-3 text-[11px] text-[#475569] font-bold pt-4">
                  <i data-lucide="calendar" class="w-4 h-4 opacity-40"></i>
                  <span>Deadline: ${scholarship.deadline ? new Date(scholarship.deadline).toLocaleDateString() : 'N/A'}</span>
                </div>
              </div>
              <button class="w-full px-6 py-4 bg-[#0c0a09] text-white rounded-2xl hover:bg-[#1c1917] transition-all font-bold flex items-center justify-center gap-3 shadow-xl group-hover:scale-[1.02] active:scale-[0.98] btn-3d shine-effect" onclick="viewScholarship(${scholarship.scholarshipid || scholarship.id})">
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
                Review Opportunity
              </button>
            </div>
          `).join('');
          lucide.createIcons();
        } else {
          scholarshipsList.innerHTML = '<div class="col-span-full text-center text-muted-foreground py-12">No scholarships available at this time.</div>';
        }
      } catch (error) {
        console.error('[v0] Load scholarships error:', error);
        loadingMessage.style.display = 'none';
        errorMessage.textContent = 'Failed to load scholarships. Please try again later.';
        errorMessage.style.display = 'block';
      }
    }

    function viewScholarship(id) {
      window.location.href = `/scholarship-details.html?id=${id}`;
    }

    loadScholarships();
    checkUserRole();
  </script>
  <div id="footer-container"></div>
  <script src="common.js"></script>
</body>

</html>
