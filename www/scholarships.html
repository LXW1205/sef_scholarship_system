<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarships - ScholarNet</title>
  <!-- Using Tailwind CDN instead of Next.js CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Added Lucide icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased">
  <!-- Navigation with Tailwind styling -->
  <nav class="bg-primary text-primary-foreground border-b border-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
          <i data-lucide="graduation-cap" class="w-6 h-6"></i>
          <h1 class="text-xl font-bold">ScholarNet</h1>
        </div>
        <div class="flex items-center gap-8" id="navLinks">
          <a href="index.html"
            class="hover:text-muted-foreground transition-colors inline-flex items-center gap-2 whitespace-nowrap"
            style="display: inline-flex; flex-direction: row; align-items: center;">
            <i data-lucide="home" class="w-4 h-4"></i>
            <span>Home</span>
          </a>
          <a href="scholarships.html"
            class="hover:text-muted-foreground transition-colors inline-flex items-center gap-2 whitespace-nowrap"
            style="display: inline-flex; flex-direction: row; align-items: center;">
            <i data-lucide="book-open" class="w-4 h-4"></i>
            <span>Scholarships</span>
          </a>
          <a href="login.html" id="loginLink"
            class="hover:text-muted-foreground transition-colors inline-flex items-center gap-2 whitespace-nowrap"
            style="display: inline-flex; flex-direction: row; align-items: center;">
            <i data-lucide="log-in" class="w-4 h-4"></i>
            <span>Login</span>
          </a>
          <a href="register.html" id="registerLink"
            class="hover:text-muted-foreground transition-colors inline-flex items-center gap-2 whitespace-nowrap"
            style="display: inline-flex; flex-direction: row; align-items: center;">
            <i data-lucide="user-plus" class="w-4 h-4"></i>
            <span>Register</span>
          </a>
          <a href="dashboard.html" id="dashboardLink" style="display: none; flex-direction: row; align-items: center;"
            class="hover:text-muted-foreground transition-colors inline-flex items-center gap-2 whitespace-nowrap">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
            <span>Dashboard</span>
          </a>
          <button id="logoutBtn" style="display: none; flex-direction: row; align-items: center;"
            class="px-4 py-2 bg-secondary text-secondary-foreground rounded-lg hover:bg-secondary/80 transition-colors inline-flex items-center gap-2 whitespace-nowrap">
            <i data-lucide="log-out" class="w-4 h-4"></i>
            <span>Logout</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <!-- Page header with clean styling -->
    <section class="bg-muted/50 border-b border-border py-12">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <!-- Added icon to the header -->
        <div class="flex justify-center mb-4">
          <i data-lucide="book-open" class="w-12 h-12 text-primary"></i>
        </div>
        <h2 class="text-3xl lg:text-4xl font-bold mb-3">Available Scholarships</h2>
        <p class="text-lg text-muted-foreground">Browse and apply to scholarships that match your profile</p>
      </div>
    </section>

    <!-- Scholarships grid with card layout -->
    <section class="py-12 bg-background">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div id="loadingMessage" class="text-center text-muted-foreground">Loading scholarships...</div>
        <div id="scholarshipsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="errorMessage"
          class="text-destructive bg-destructive/10 border border-destructive/20 rounded-lg p-4 text-center"
          style="display: none;"></div>
      </div>
    </section>
  </main>

  <script src="auth-check.js"></script>
  <script>
    async function loadScholarships() {
      const loadingMessage = document.getElementById('loadingMessage');
      const scholarshipsList = document.getElementById('scholarshipsList');
      const errorMessage = document.getElementById('errorMessage');

      try {
        const response = await fetch('/api/scholarships?active=true');
        const data = await response.json();

        loadingMessage.style.display = 'none';

        if (response.ok && data.scholarships.length > 0) {
          scholarshipsList.innerHTML = data.scholarships.map(scholarship => `
            <div class="bg-card text-card-foreground rounded-xl border border-border p-6 hover:shadow-lg transition-shadow">
              <div class="flex justify-between items-start mb-4">
                <h3 class="text-xl font-semibold">${scholarship.title}</h3>
                <span class="px-3 py-1 text-xs font-medium rounded-full ${scholarship.isactive ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">
                  ${scholarship.isactive ? 'Active' : 'Inactive'}
                </span>
              </div>
              <p class="text-muted-foreground mb-4 leading-relaxed">${scholarship.description || 'No description available'}</p>
              <div class="space-y-2 mb-6 text-sm">
                <div class="flex justify-between">
                  <span class="text-muted-foreground">Deadline:</span>
                  <span class="font-medium">${scholarship.deadline ? new Date(scholarship.deadline).toLocaleDateString() : 'N/A'}</span>
                </div>
                <div class="flex justify-between">
                  <span class="text-muted-foreground">Criteria:</span>
                  <span class="font-medium">${scholarship.criteria_count} items</span>
                </div>
              </div>
              <button class="w-full px-4 py-2 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-medium" onclick="viewScholarship(${scholarship.scholarshipid})">
                View Details
              </button>
            </div>
          `).join('');
        } else {
          scholarshipsList.innerHTML = '<div class="col-span-full text-center text-muted-foreground py-12">No scholarships available at this time.</div>';
        }
      } catch (error) {
        console.error('[v0] Load scholarships error:', error);
        loadingMessage.style.display = 'none';
        errorMessage.textContent = 'Failed to load scholarships. Please try again later.';
        errorMessage.style.display = 'block';
      }
    }

    function viewScholarship(id) {
      window.location.href = `/scholarship-details.html?id=${id}`;
    }

    loadScholarships();
  </script>
  <!-- Initialize Lucide icons -->
  <script>
    lucide.createIcons();
  </script>
</body>

</html>
