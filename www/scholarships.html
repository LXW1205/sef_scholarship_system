<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarships - ScholarNet</title>
  <!-- Using Tailwind CDN instead of Next.js CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Added Lucide icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <!-- Navigation with Tailwind styling -->
  <div id="header-container"></div>

  <main>
    <!-- Page header with clean styling -->
    <section class="bg-muted/50 border-b border-border py-12">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <!-- Added icon to the header -->
        <div class="flex justify-center mb-4">
          <i data-lucide="book-open" class="w-12 h-12 text-primary"></i>
        </div>
        <h2 class="text-3xl lg:text-4xl font-bold mb-3">Available Scholarships</h2>
        <p class="text-lg text-muted-foreground">Browse and apply to scholarships that match your profile</p>
      </div>
    </section>

    <!-- Scholarships grid with card layout -->
    <section class="py-12 bg-background">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div id="loadingMessage" class="text-center text-muted-foreground">Loading scholarships...</div>
        <div id="scholarshipsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="errorMessage"
          class="text-destructive bg-destructive/10 border border-destructive/20 rounded-lg p-4 text-center"
          style="display: none;"></div>
      </div>
    </section>
  </main>


  <script>
    async function loadScholarships() {
      const loadingMessage = document.getElementById('loadingMessage');
      const scholarshipsList = document.getElementById('scholarshipsList');
      const errorMessage = document.getElementById('errorMessage');

      try {
        const response = await fetch('/api/scholarships?active=true');
        const data = await response.json();

        loadingMessage.style.display = 'none';

        if (response.ok && data.scholarships.length > 0) {
          scholarshipsList.innerHTML = data.scholarships.map(scholarship => `
            <div class="bg-card rounded-xl border border-border p-6 hover:border-primary transition-all hover:shadow-lg flex flex-col h-full">
              <div class="flex items-start justify-between mb-4">
                <div class="w-12 h-12 bg-primary/10 rounded-lg flex items-center justify-center">
                  <i data-lucide="award" class="w-6 h-6 text-primary"></i>
                </div>
                <span class="px-3 py-1 text-xs font-medium rounded-full ${scholarship.status === 'Active' ? 'bg-success/10 text-success' : 'bg-muted text-muted-foreground'}">
                  ${scholarship.status || 'Active'}
                </span>
              </div>
              <h3 class="text-xl font-bold mb-2">${scholarship.title}</h3>
              <p class="text-muted-foreground text-sm mb-4 line-clamp-2">${scholarship.description || 'No description available'}</p>
              
              <div class="mb-4">
                <h4 class="text-xs font-semibold text-muted-foreground uppercase tracking-wider mb-2">Criteria</h4>
                <div class="flex flex-wrap gap-2">
                  ${scholarship.criteria && scholarship.criteria.length > 0 ?
              scholarship.criteria.map(c => `
                      <span class="px-2 py-1 bg-secondary text-secondary-foreground text-[10px] font-medium rounded border border-border flex flex-col">
                        <span>${c.name}</span>
                        <span class="opacity-70 text-[8px]">${c.weightage}% (Max: ${c.maxScore})</span>
                      </span>
                    `).join('') :
              '<span class="text-xs text-muted-foreground italic">No criteria defined</span>'
            }
                </div>
              </div>

              <div class="space-y-2 mb-6 mt-auto">
                <div class="flex items-center gap-2 text-sm text-primary font-bold">
                  <i data-lucide="dollar-sign" class="w-4 h-4"></i>
                  <span>${scholarship.amount ? scholarship.amount.toLocaleString() : 'N/A'}</span>
                </div>
                <div class="flex items-center gap-2 text-sm text-muted-foreground">
                  <i data-lucide="calendar" class="w-4 h-4"></i>
                  <span>Deadline: ${scholarship.deadline ? new Date(scholarship.deadline).toLocaleDateString() : 'N/A'}</span>
                </div>
              </div>
              <button class="w-full px-4 py-2 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-medium flex items-center justify-center gap-2" onclick="viewScholarship(${scholarship.scholarshipid || scholarship.id})">
                <i data-lucide="eye" class="w-4 h-4"></i>
                View Details
              </button>
            </div>
          `).join('');
          lucide.createIcons();
        } else {
          scholarshipsList.innerHTML = '<div class="col-span-full text-center text-muted-foreground py-12">No scholarships available at this time.</div>';
        }
      } catch (error) {
        console.error('[v0] Load scholarships error:', error);
        loadingMessage.style.display = 'none';
        errorMessage.textContent = 'Failed to load scholarships. Please try again later.';
        errorMessage.style.display = 'block';
      }
    }

    function viewScholarship(id) {
      window.location.href = `/scholarship-details.html?id=${id}`;
    }

    loadScholarships();
  </script>
  <div id="footer-container"></div>
  <script src="common.js"></script>
</body>

</html>
