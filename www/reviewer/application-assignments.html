<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Assignments - Digital Scholarship Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <!-- Reviewer Navigation -->
  <div id="header-container"></div>

  <main class="min-h-screen py-12">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
      <!-- Page Header -->
      <div class="flex justify-between items-center mb-8">
        <div>
          <h2 class="text-3xl font-bold mb-2">My Assignments</h2>
          <p class="text-muted-foreground">Review and evaluate assigned scholarship applications</p>
        </div>
      </div>

      <!-- Status Filter -->
      <div class="bg-card rounded-xl border border-border p-4 mb-6">
        <div class="flex items-center gap-4">
          <label class="text-sm font-medium">Filter by Status:</label>
          <select id="statusFilter"
            class="px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
            <option value="">All Assignments</option>
            <option value="Under Review">Under Review</option>
            <option value="In Progress">In Progress</option>
            <option value="Reviewed">Reviewed</option>
          </select>
        </div>
      </div>

      <!-- Assignments List -->
      <div id="assignmentsList" class="space-y-4">
        <div class="flex items-center justify-center py-12">
          <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-muted-foreground"></i>
        </div>
      </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

    // TESTING MODE: Auth check disabled
    // if (!token || user.role !== 'Reviewer') {
    //   window.location.href = '/login.html';
    // }


    let allAssignments = [];

    async function loadAssignments() {
      try {
        const reviewerId = user.reviewerID;
        const url = reviewerId ? `/api/applications?reviewerId=${reviewerId}` : '/api/applications';
        const response = await fetch(url, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        allAssignments = (data.applications || []).map(app => ({
          id: app.id,
          studentName: app.fullname || 'Anonymous Applicant',
          studentId: app.studentid || 'N/A',
          scholarship: app.scholarship_title || 'Scholarship',
          assignedDate: app.submissiondate,
          history: [], // For future use
          status: app.status,
          priority: 'Medium'
        }));
        displayAssignments(allAssignments);
      } catch (error) {
        console.error('Failed to load assignments:', error);
        document.getElementById('assignmentsList').innerHTML = `
          <div class="bg-card rounded-xl border border-border p-12 text-center">
            <p class="text-destructive">Failed to load assignments</p>
          </div>
        `;
      }
    }

    function displayAssignments(assignments) {
      const list = document.getElementById('assignmentsList');

      if (assignments.length === 0) {
        list.innerHTML = `
          <div class="bg-card rounded-xl border border-border p-12 text-center">
            <i data-lucide="inbox" class="w-16 h-16 mx-auto mb-4 text-muted-foreground opacity-50"></i>
            <h3 class="text-xl font-bold mb-2">No Assignments Found</h3>
            <p class="text-muted-foreground">You don't have any assignments matching this filter</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      list.innerHTML = assignments.map(assignment => `
        <div class="bg-card rounded-xl border border-border p-6 hover:border-primary transition-all">
          <div class="flex items-start justify-between mb-4">
            <div class="flex items-start gap-4 flex-1">
              <div class="w-12 h-12 bg-primary/10 rounded-lg flex items-center justify-center flex-shrink-0">
                <i data-lucide="file-text" class="w-6 h-6 text-primary"></i>
              </div>
              <div class="flex-1">
                <div class="flex items-center gap-2 mb-2">
                  <h3 class="text-xl font-bold">${assignment.studentName} <span class="text-sm font-normal text-muted-foreground">(${assignment.studentId})</span></h3>
                  <span class="px-2 py-0.5 text-xs font-medium rounded ${assignment.priority === 'High' ? 'bg-destructive/10 text-destructive' :
          assignment.priority === 'Medium' ? 'bg-yellow-500/10 text-yellow-600' :
            'bg-muted text-muted-foreground'
        }">${assignment.priority} Priority</span>
                </div>
                <p class="text-muted-foreground mb-3">${assignment.scholarship}</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-sm">
                  <div class="flex items-center gap-2 text-muted-foreground">
                    <i data-lucide="calendar-plus" class="w-4 h-4"></i>
                    <span>Assigned: ${new Date(assignment.assignedDate).toLocaleDateString()}</span>
                  </div>
                  <div class="flex items-center gap-2 text-muted-foreground">
                    <i data-lucide="calendar-clock" class="w-4 h-4"></i>
                    <span>Due: ${new Date(assignment.dueDate).toLocaleDateString()}</span>
                  </div>
                  <div class="flex items-center gap-2">
                    <span class="px-3 py-1 text-xs font-medium rounded-full ${assignment.status === 'Under Review' ? 'bg-yellow-500/10 text-yellow-600' :
          assignment.status === 'In Progress' ? 'bg-blue-500/10 text-blue-600' :
            'bg-success/10 text-success'
        }">${assignment.status}</span>
                  </div>
                </div>
              </div>
            </div>
            <div class="flex gap-2">
              ${assignment.status !== 'Reviewed' ? `
                <a href="/reviewer/application-review.html?id=${assignment.id}" 
                  class="px-6 py-2 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-medium inline-flex items-center gap-2">
                  <i data-lucide="eye" class="w-4 h-4"></i>
                  ${assignment.status === 'In Progress' ? 'Continue Review' : 'Start Review'}
                </a>
              ` : `
                <button class="px-6 py-2 bg-secondary text-secondary-foreground rounded-lg hover:bg-secondary/80 transition-colors font-medium inline-flex items-center gap-2">
                  <i data-lucide="check" class="w-4 h-4"></i>
                  Completed
                </button>
              `}
            </div>
          </div>
        </div>
      `).join('');

      lucide.createIcons();
    }

    document.getElementById('statusFilter').addEventListener('change', (e) => {
      const filter = e.target.value;
      const filtered = filter ? allAssignments.filter(a => a.status === filter) : allAssignments;
      displayAssignments(filtered);
    });

    loadAssignments();
    lucide.createIcons();
  </script>
  <div id="footer-container"></div>
  <script src="/common.js"></script>
</body>

</html>
