<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarifications - Reviewer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(214.3 31.8% 91.4%)',
                        input: 'hsl(214.3 31.8% 91.4%)',
                        ring: 'hsl(222.2 84% 4.9%)',
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(222.2 84% 4.9%)',
                        primary: {
                            DEFAULT: 'hsl(222.2 47.4% 11.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        secondary: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(222.2 47.4% 11.2%)',
                        },
                        destructive: {
                            DEFAULT: 'hsl(0 84.2% 60.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        muted: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(215.4 16.3% 46.9%)',
                        },
                        card: {
                            DEFAULT: 'hsl(0 0% 100%)',
                            foreground: 'hsl(222.2 84% 4.9%)',
                        },
                    },
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 font-sans antialiased">
    <div id="header-container"></div>

    <main class="max-w-[1600px] mx-auto py-8 px-4 sm:px-6 lg:px-8 min-h-screen">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Clarification Requests</h1>
            <p class="text-gray-600 mt-1">Provide answers to the committee regarding your reviews.</p>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Scholarship/Student</th>
                        <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Question</th>
                        <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Status</th>
                        <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Action</th>
                    </tr>
                </thead>
                <tbody id="requestsTableBody" class="divide-y divide-gray-100">
                    <tr>
                        <td colspan="4" class="px-6 py-8 text-center text-gray-500">Loading requests...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Response Modal -->
    <div id="responseModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-xl w-full max-w-lg mx-4 p-6 shadow-xl">
            <h3 class="text-lg font-bold mb-4">Respond to Request</h3>
            <p id="modalQuestion" class="text-gray-600 mb-4 bg-gray-50 p-3 rounded italic"></p>

            <form id="responseForm">
                <input type="hidden" id="modalClarificationId">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Your Answer</label>
                    <textarea id="modalAnswer" rows="4"
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary/20 focus:outline-none"
                        required></textarea>
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="closeModal()"
                        class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-opacity-90">Send
                        Response</button>
                </div>
            </form>
        </div>
    </div>

    <div id="footer-container"></div>
    <script src="/common.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || "{}");

            if (!token || user.role !== 'Reviewer') {
                window.location.href = '/login.html';
                return;
            }

            loadRequests();

            document.getElementById('responseForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('modalClarificationId').value;
                const answer = document.getElementById('modalAnswer').value;
                const btn = e.target.querySelector('button[type="submit"]');

                btn.disabled = true;
                btn.textContent = 'Sending...';

                try {
                    const res = await fetch(`/api/clarifications/${id}/answer`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('token') || sessionStorage.getItem('token')}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ answer })
                    });

                    if (res.ok) {
                        closeModal();
                        loadRequests();
                    } else {
                        alert('Failed to send response');
                    }
                } catch (err) {
                    alert('Error sending response');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Send Response';
                }
            });
        });

        async function loadRequests() {
            const tbody = document.getElementById('requestsTableBody');
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            try {
                const res = await fetch('/api/clarifications', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) {
                    const errorData = await res.json();
                    console.error('Fetch failed:', errorData);
                    throw new Error(errorData.message || 'Error loading requests');
                }

                const data = await res.json();

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-gray-500">No requests found.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(r => `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4">
                            <div class="font-medium text-gray-900">${r.scholarshipTitle || 'Unknown Scholarship'}</div>
                            <div class="text-sm text-gray-500">${r.studentName || 'Unknown Student'}</div>
                        </td>
                        <td class="px-6 py-4">
                            <p class="text-gray-800">${r.question}</p>
                            <div class="text-xs text-gray-400 mt-1">${new Date(r.requestedDate).toLocaleDateString()}</div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${r.status === 'Answered' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'
                    }">
                                ${r.status}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            ${r.status === 'Pending' ? `
                                <button onclick="openModal(${r.clarificationID}, '${(r.question || '').replace(/'/g, "\\'")}')" class="text-primary hover:text-primary/80 font-medium text-sm">
                                    Respond
                                </button>
                            ` : `<span class="text-sm text-gray-600 line-clamp-1" title="${r.answer || ''}">Ans: ${r.answer || ''}</span>`}
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error('Error in loadRequests:', err);
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-red-500">Error loading data: ${err.message}</td></tr>`;
            }
        }

        function openModal(id, question) {
            document.getElementById('modalClarificationId').value = id;
            document.getElementById('modalQuestion').textContent = question;
            document.getElementById('modalAnswer').value = '';
            document.getElementById('responseModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('responseModal').classList.add('hidden');
        }
    </script>
</body>

</html>
