<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviewer Dashboard - ScholarNet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <!-- Reviewer Navigation -->
  <div id="header-container"></div>

  <main class="min-h-screen">
    <!-- Welcome Header -->
    <section class="bg-gradient-to-r from-primary to-primary/80 text-primary-foreground py-12">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-4">
          <div class="w-16 h-16 bg-primary-foreground/10 rounded-full flex items-center justify-center">
            <i data-lucide="user-check" class="w-10 h-10"></i>
          </div>
          <div>
            <h2 class="text-3xl font-bold" id="welcomeMessage">Welcome, Reviewer!</h2>
            <p class="text-primary-foreground/80 mt-1">Review and evaluate scholarship applications</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Dashboard Content -->
    <section class="py-12">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Quick Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
          <a href="/reviewer/assignments.html"
            class="bg-card rounded-xl border border-border p-6 hover:border-primary transition-all hover:shadow-md block">
            <div class="flex items-center gap-3 mb-2">
              <div class="w-10 h-10 bg-yellow-500/10 rounded-lg flex items-center justify-center">
                <i data-lucide="clock" class="w-5 h-5 text-yellow-600"></i>
              </div>
              <h3 class="font-semibold text-muted-foreground text-sm">Pending Reviews</h3>
            </div>
            <p class="text-3xl font-bold" id="pendingCount">-</p>
          </a>

          <a href="/reviewer/assignments.html?status=In Progress"
            class="bg-card rounded-xl border border-border p-6 hover:border-primary transition-all hover:shadow-md block">
            <div class="flex items-center gap-3 mb-2">
              <div class="w-10 h-10 bg-blue-500/10 rounded-lg flex items-center justify-center">
                <i data-lucide="hourglass" class="w-5 h-5 text-blue-600"></i>
              </div>
              <h3 class="font-semibold text-muted-foreground text-sm">In Progress</h3>
            </div>
            <p class="text-3xl font-bold" id="inProgressCount">-</p>
          </a>

          <a href="/reviewer/assignments.html?status=Reviewed"
            class="bg-card rounded-xl border border-border p-6 hover:border-primary transition-all hover:shadow-md block">
            <div class="flex items-center gap-3 mb-2">
              <div class="w-10 h-10 bg-success/10 rounded-lg flex items-center justify-center">
                <i data-lucide="check-circle" class="w-5 h-5 text-success"></i>
              </div>
              <h3 class="font-semibold text-muted-foreground text-sm">Completed</h3>
            </div>
            <p class="text-3xl font-bold" id="completedCount">-</p>
          </a>
        </div>

        <!-- Assigned Applications -->
        <div class="bg-card rounded-xl border border-border p-6 mb-6">
          <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold">Assigned Applications</h3>
            <a href="/reviewer/assignments.html" class="text-primary hover:underline text-sm font-medium">View All</a>
          </div>
          <div id="assignedApplications">
            <div class="flex items-center justify-center py-8">
              <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-muted-foreground"></i>
            </div>
          </div>
        </div>

        <!-- Deadlines Alert -->
        <div class="bg-yellow-500/10 border border-yellow-500/20 rounded-xl p-6">
          <div class="flex items-start gap-4">
            <i data-lucide="alert-circle" class="w-6 h-6 text-yellow-600 flex-shrink-0"></i>
            <div>
              <h3 class="font-bold text-lg mb-2">Upcoming Deadlines</h3>
              <p class="text-sm text-muted-foreground mb-4">You have 3 reviews due in the next 7 days. Please complete
                them on time.</p>
              <a href="/reviewer/assignments.html"
                class="text-primary hover:underline text-sm font-medium inline-flex items-center gap-1">
                View Assignments
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

    // TESTING MODE: Auth check disabled
    // if (!token || user.role !== 'Reviewer') {
    //   window.location.href = '/login.html';
    // }

    document.getElementById('welcomeMessage').textContent = `Welcome, ${user.username || 'Reviewer'}!`;



    // Load data from API
    async function loadDashboardData() {
      try {
        const response = await fetch('/api/applications', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        const applications = data.applications || [];

        // Calculate stats
        document.getElementById('pendingCount').textContent = applications.filter(a => a.status === 'Pending').length;
        document.getElementById('inProgressCount').textContent = applications.filter(a => a.status === 'In Progress').length;
        document.getElementById('completedCount').textContent = applications.filter(a => a.status === 'Reviewed').length;

        const assignedDiv = document.getElementById('assignedApplications');
        if (applications.length > 0) {
          assignedDiv.innerHTML = `
            <div class="space-y-4">
              ${applications.slice(0, 5).map(app => `
                <div class="flex items-center justify-between p-4 bg-muted/30 rounded-lg hover:bg-muted/50 transition-colors">
                  <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center">
                      <i data-lucide="file-text" class="w-5 h-5 text-primary"></i>
                    </div>
                    <div>
                      <h4 class="font-semibold">${app.scholarship_title || 'Application'}</h4>
                      <p class="text-sm text-muted-foreground">ID: ${app.id}</p>
                      <p class="text-xs text-muted-foreground mt-1">Submitted: ${app.submissiondate ? new Date(app.submissiondate).toLocaleDateString() : 'N/A'}</p>
                    </div>
                  </div>
                  <div class="flex items-center gap-3">
                    <span class="px-3 py-1 text-xs font-medium rounded-full ${app.status === 'Pending' ? 'bg-yellow-500/10 text-yellow-600' :
              app.status === 'In Progress' ? 'bg-blue-500/10 text-blue-600' :
                'bg-success/10 text-success'
            }">${app.status}</span>
                    <a href="/reviewer/review-application.html?id=${app.id}" 
                      class="px-4 py-2 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors text-sm font-medium">
                      Review
                    </a>
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        } else {
          assignedDiv.innerHTML = `
            <div class="text-center py-8 text-muted-foreground">
              <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-4 opacity-50"></i>
              <p>No applications assigned yet</p>
            </div>
          `;
        }

        lucide.createIcons();
      } catch (error) {
        console.error('Failed to load applications:', error);
        document.getElementById('assignedApplications').innerHTML = `
          <div class="text-center py-8 text-destructive">
            <p>Failed to load applications</p>
          </div>
        `;
      }
    }

    loadDashboardData();
  </script>
  <div id="footer-container"></div>
  <script src="/common.js"></script>
</body>

</html>
