<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ScholarNet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <!-- Updated navigation to match interface spec -->
  <div id="header-container"></div>

  <main class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-card text-card-foreground rounded-xl border border-border p-8 shadow-lg">
      <div class="text-center mb-8">
        <div class="flex justify-center mb-4">
          <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center">
            <i data-lucide="log-in" class="w-8 h-8 text-primary"></i>
          </div>
        </div>
        <h2 class="text-3xl font-bold mb-2">Welcome Back</h2>
        <p class="text-muted-foreground">Login to access your scholarship portal</p>
      </div>

      <!-- Added interface I-000 elements per spec -->
      <form id="loginForm" class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium mb-2">Email Address or User ID</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="user" class="w-5 h-5 text-muted-foreground"></i>
            </div>
            <input type="email" id="email" name="email" required
              class="w-full pl-10 pr-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
              placeholder="Enter your email or User ID">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium mb-2">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="lock" class="w-5 h-5 text-muted-foreground"></i>
            </div>
            <input type="password" id="password" name="password" required
              class="w-full pl-10 pr-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
              placeholder="Enter your password">
          </div>
        </div>

        <!-- Added Remember Me checkbox per spec -->
        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input type="checkbox" id="rememberMe" name="rememberMe"
              class="w-4 h-4 rounded border-input text-primary focus:ring-2 focus:ring-ring">
            <label for="rememberMe" class="ml-2 text-sm text-foreground">Remember me</label>
          </div>
          <!-- Added Forgot Password link per I-000 spec -->
          <a href="forgot-password.html" class="text-sm text-primary hover:underline">Forgot Password?</a>
        </div>

        <div id="errorMessage"
          class="text-destructive bg-destructive/10 border border-destructive/20 rounded-lg p-3 text-sm flex items-center gap-2"
          style="display: none;">
          <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
          <span id="errorText"></span>
        </div>

        <button type="submit" id="loginButton"
          class="w-full px-4 py-3 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-medium flex items-center justify-center gap-2">
          <i data-lucide="log-in" class="w-5 h-5"></i>
          Login
        </button>
      </form>

      <p class="text-center text-sm text-muted-foreground mt-6">
        Don't have an account? <a href="register.html" class="text-primary hover:underline font-medium">Register
          here</a>
      </p>
    </div>
  </main>

  <script>
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const loginButton = document.getElementById('loginButton');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      loginButton.disabled = true;
      loginButton.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Logging in...';
      lucide.createIcons();

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          if (rememberMe) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
          } else {
            sessionStorage.setItem('token', data.token);
            sessionStorage.setItem('user', JSON.stringify(data.user));
          }

          const role = data.user.role;
          switch (role) {
            case 'Admin':
              window.location.href = '/admin/dashboard-admin.html';
              break;
            case 'Student':
              window.location.href = '/student/dashboard-student.html';
              break;
            case 'Reviewer':
              window.location.href = '/reviewer/dashboard-reviewer.html';
              break;
            case 'Committee':
              window.location.href = '/committee/dashboard-committee.html';
              break;
            default:
              window.location.href = '/dashboard.html';
          }
        } else {
          errorText.textContent = data.error || 'Login failed';
          errorMessage.style.display = 'flex';
          lucide.createIcons();

          // Reset button
          loginButton.disabled = false;
          loginButton.innerHTML = '<i data-lucide="log-in" class="w-5 h-5"></i> Login';
          lucide.createIcons();
        }
      } catch (error) {
        console.error('[v0] Login error:', error);
        errorText.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'flex';
        lucide.createIcons();

        // Reset button
        loginButton.disabled = false;
        loginButton.innerHTML = '<i data-lucide="log-in" class="w-5 h-5"></i> Login';
        lucide.createIcons();
      }
    });
  </script>
  <div id="footer-container"></div>
  <script src="common.js"></script>
</body>

</html>
