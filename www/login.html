<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ScholarNet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <!-- Updated navigation to match interface spec -->
  <div id="header-container"></div>

  <main class="min-h-screen">
    <div class="hero-image-bg min-h-screen flex flex-col items-center justify-start pt-40 pb-20 px-4 sm:px-6 lg:px-8">
      <div class="hero-overlay"></div>

      <div
        class="max-w-md w-full bg-white/90 backdrop-blur-xl text-card-foreground rounded-3xl border border-white/20 p-10 shadow-2xl relative z-10 transition-all animate-form">
        <div class="text-center mb-10">
          <div class="flex justify-center mb-6">
            <div class="w-20 h-20 bg-[#0f172a]/5 rounded-full flex items-center justify-center animate-float">
              <i data-lucide="log-in" class="w-10 h-10 text-[#0f172a]"></i>
            </div>
          </div>
          <h2 class="text-4xl font-black mb-3 text-[#0f172a] tracking-tight">Welcome Back</h2>
          <p class="text-[#475569] font-medium leading-relaxed">Login to access your scholarship portal</p>
        </div>

        <!-- Added interface I-000 elements per spec -->
        <form id="loginForm" class="space-y-6">
          <div>
            <label for="email" class="block text-sm font-bold text-[#0f172a] mb-2 pl-1">Email Address or ID</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="user"
                  class="w-5 h-5 text-[#475569] group-focus-within:text-[#0f172a] transition-colors"></i>
              </div>
              <input type="text" id="email" name="email" required
                class="w-full pl-12 pr-4 py-4 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0f172a]/20 focus:border-[#0f172a] transition-all"
                placeholder="Enter your email or ID">
            </div>
          </div>

          <div>
            <label for="password" class="block text-sm font-bold text-[#0f172a] mb-2 pl-1">Password</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="lock"
                  class="w-5 h-5 text-[#475569] group-focus-within:text-[#0f172a] transition-colors"></i>
              </div>
              <input type="password" id="password" name="password" required
                class="w-full pl-12 pr-4 py-4 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0f172a]/20 focus:border-[#0f172a] transition-all"
                placeholder="Enter your password">
            </div>
          </div>

          <!-- Added Remember Me checkbox per spec -->
          <div class="flex items-center justify-between px-1">
            <div class="flex items-center">
              <input type="checkbox" id="rememberMe" name="rememberMe"
                class="w-5 h-5 rounded-lg border-slate-300 text-[#0f172a] focus:ring-[#0f172a]/20">
              <label for="rememberMe" class="ml-3 text-sm font-medium text-[#475569]">Remember me</label>
            </div>
            <!-- Added Forgot Password link per I-000 spec -->
            <a href="forgot-password.html" class="text-sm font-bold text-[#0f172a] hover:underline">Forgot Password?</a>
          </div>

          <div id="errorMessage"
            class="text-destructive bg-destructive/10 border border-destructive/20 rounded-2xl p-4 text-sm flex items-center gap-3"
            style="display: none;">
            <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
            <span id="errorText" class="font-medium"></span>
          </div>

          <button type="submit" id="loginButton"
            class="w-full px-6 py-4 bg-[#0c0a09] text-white rounded-2xl hover:bg-[#1c1917] transition-all font-bold flex items-center justify-center gap-3 shadow-xl hover:scale-[1.02] active:scale-[0.98] btn-3d shine-effect">
            <i data-lucide="log-in" class="w-5 h-5"></i>
            Login Account Now
          </button>
        </form>

        <p class="text-center text-sm text-[#475569] font-medium mt-10">
          Don't have an account? <a href="register.html" class="text-[#0f172a] font-black hover:underline">Register
            Now</a>
        </p>
      </div>
      <div class="fade-to-solid"></div>
    </div>
  </main>

  <script>
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const loginButton = document.getElementById('loginButton');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      loginButton.disabled = true;
      loginButton.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Logging in...';
      lucide.createIcons();

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          if (rememberMe) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
          } else {
            sessionStorage.setItem('token', data.token);
            sessionStorage.setItem('user', JSON.stringify(data.user));
          }

          const role = data.user.role;
          switch (role) {
            case 'Admin':
              window.location.href = '/admin/dashboard-admin.html';
              break;
            case 'Student':
              window.location.href = '/student/dashboard-student.html';
              break;
            case 'Reviewer':
              window.location.href = '/reviewer/dashboard-reviewer.html';
              break;
            case 'Committee':
              window.location.href = '/committee/dashboard-committee.html';
              break;
            default:
              window.location.href = '/dashboard.html';
          }
        } else {
          errorText.textContent = data.error || 'Login failed';
          errorMessage.style.display = 'flex';
          lucide.createIcons();

          // Reset button
          loginButton.disabled = false;
          loginButton.innerHTML = '<i data-lucide="log-in" class="w-5 h-5"></i> Login';
          lucide.createIcons();
        }
      } catch (error) {
        console.error('[v0] Login error:', error);
        errorText.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'flex';
        lucide.createIcons();

        // Reset button
        loginButton.disabled = false;
        loginButton.innerHTML = '<i data-lucide="log-in" class="w-5 h-5"></i> Login';
        lucide.createIcons();
      }
    });
  </script>
  <div id="footer-container"></div>
  <script src="common.js"></script>
</body>

</html>
