<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Committee Dashboard - ScholarNet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-[#7A8691]">
  <!-- Committee Navigation -->
  <div id="header-container"></div>

  <main class="min-h-screen">
    <!-- Hero Section with Embedded Stats -->
    <div class="hero-image-bg min-h-[350px] flex flex-col justify-center relative pt-24 pb-8">
      <div class="hero-overlay"></div>
      <div class="relative z-10 w-full max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-6 mb-6">
          <div
            class="w-16 h-16 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center border border-white/20 shadow-xl">
            <i data-lucide="users-round" class="w-8 h-8 text-white"></i>
          </div>
          <div>
            <h2 class="text-4xl font-black text-white tracking-tight drop-shadow-md" id="welcomeMessage">Welcome back!
            </h2>
            <p class="text-white/80 mt-2 text-lg font-medium drop-shadow-sm">Review applications and make final
              scholarship decisions</p>
          </div>
        </div>

        <!-- Quick Stats Grid moved inside Hero -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
          <a href="/committee/applications-committee.html"
            class="bg-white/95 backdrop-blur-sm rounded-xl border border-white/20 p-6 hover:bg-white transition-all hover:scale-[1.02] shadow-lg group block">
            <div class="flex items-center gap-3 mb-2">
              <div
                class="w-10 h-10 bg-yellow-500/10 rounded-lg flex items-center justify-center group-hover:bg-yellow-500 group-hover:text-white transition-colors">
                <i data-lucide="inbox" class="w-5 h-5 text-yellow-600 group-hover:text-white"></i>
              </div>
              <h3 class="font-semibold text-slate-600 text-sm">Assignments</h3>
            </div>
            <p class="text-3xl font-bold text-slate-800" id="assignedCount">-</p>
          </a>

          <a href="/committee/applications-committee.html?status=In Progress"
            class="bg-white/95 backdrop-blur-sm rounded-xl border border-white/20 p-6 hover:bg-white transition-all hover:scale-[1.02] shadow-lg group block">
            <div class="flex items-center gap-3 mb-2">
              <div
                class="w-10 h-10 bg-blue-500/10 rounded-lg flex items-center justify-center group-hover:bg-blue-500 group-hover:text-white transition-colors">
                <i data-lucide="hourglass" class="w-5 h-5 text-blue-600 group-hover:text-white"></i>
              </div>
              <h3 class="font-semibold text-slate-600 text-sm">In Progress</h3>
            </div>
            <p class="text-3xl font-bold text-slate-800" id="inProgressCount">-</p>
          </a>

          <a href="/committee/applications-committee.html?status=Reviewed"
            class="bg-white/95 backdrop-blur-sm rounded-xl border border-white/20 p-6 hover:bg-white transition-all hover:scale-[1.02] shadow-lg group block">
            <div class="flex items-center gap-3 mb-2">
              <div
                class="w-10 h-10 bg-success/10 rounded-lg flex items-center justify-center group-hover:bg-success group-hover:text-white transition-colors">
                <i data-lucide="check-circle" class="w-5 h-5 text-success group-hover:text-white"></i>
              </div>
              <h3 class="font-semibold text-slate-600 text-sm">Reviewed</h3>
            </div>
            <p class="text-3xl font-bold text-slate-800" id="reviewedCount">-</p>
          </a>

          <a href="/committee/schedule-interviews.html"
            class="bg-white/95 backdrop-blur-sm rounded-xl border border-white/20 p-6 hover:bg-white transition-all hover:scale-[1.02] shadow-lg group block">
            <div class="flex items-center gap-3 mb-2">
              <div
                class="w-10 h-10 bg-purple-500/10 rounded-lg flex items-center justify-center group-hover:bg-purple-500 group-hover:text-white transition-colors">
                <i data-lucide="calendar" class="w-5 h-5 text-purple-600 group-hover:text-white"></i>
              </div>
              <h3 class="font-semibold text-slate-600 text-sm">Scheduled</h3>
            </div>
            <p class="text-3xl font-bold text-slate-800" id="scheduledCount">-</p>
          </a>
        </div>
      </div>
      <div class="fade-to-solid"></div>
    </div>

    <!-- Dashboard Content -->
    <section class="py-12">
      <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">

        <!-- Quick Actions -->
        <div class="flex flex-wrap gap-4 mb-8">
          <a href="/committee/application-management-committee.html" class="pill-btn-black flex items-center gap-2">
            <i data-lucide="plus" class="w-4 h-4"></i> Create Scholarship
          </a>
          <a href="/committee/applications-committee.html" class="pill-btn-outline flex items-center gap-2">
            <i data-lucide="list" class="w-4 h-4"></i> View All Apps
          </a>
          <a href="/committee/schedule-interviews.html" class="pill-btn-outline flex items-center gap-2">
            <i data-lucide="calendar-plus" class="w-4 h-4"></i> Schedule Interview
          </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
          <!-- Recent Activity Table -->
          <div class="bg-card rounded-xl border border-border p-6 shadow-sm">
            <h3 class="text-xl font-bold mb-6">Recent Activity</h3>
            <div id="recentActivity">
              <div class="flex items-center justify-center py-8">
                <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-muted-foreground"></i>
              </div>
            </div>
          </div>

          <!-- Application Status Chart -->
          <div class="bg-card rounded-xl border border-border p-6 shadow-sm">
            <h3 class="text-xl font-bold mb-6">Application Status Overview</h3>
            <div class="relative h-64 w-full">
              <canvas id="statusChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

    // if (!token || user.role !== 'Committee') {
    //   window.location.href = '/login.html';
    // }

    document.getElementById('welcomeMessage').textContent = `Welcome, ${user.fullName || 'Committee Member'}!`;


    let chartInstance = null;

    async function loadDashboardData() {
      try {
        const [appsRes, scholarshipsRes, interviewsRes] = await Promise.all([
          fetch('/api/applications', { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch('/api/scholarships'),
          fetch('/api/interviews/scheduled', { headers: { 'Authorization': `Bearer ${token}` } }) // Endpoint needs fit
        ]);

        const appsData = await appsRes.json();
        // const scholarshipsData = await scholarshipsRes.json();
        const apps = appsData.applications || [];

        // Update Counts
        document.getElementById('assignedCount').textContent = apps.length;
        document.getElementById('inProgressCount').textContent = apps.filter(a => a.status === 'In Progress').length;
        document.getElementById('reviewedCount').textContent = apps.filter(a => a.status === 'Reviewed').length;
        // Mock scheduled count for now as API might not exist
        document.getElementById('scheduledCount').textContent = apps.filter(a => a.status === 'Interview Scheduled').length;


        // Render Recent Activity (Mock)
        const recentActivityDiv = document.getElementById('recentActivity');
        const recentApps = apps.slice(0, 5);
        if (recentApps.length > 0) {
          recentActivityDiv.innerHTML = `
            <div class="space-y-4">
              ${recentApps.map(app => `
                <div class="flex items-center justify-between p-3 bg-muted/30 rounded-lg">
                  <div class="flex items-center gap-3">
                     <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                        <i data-lucide="file-text" class="w-4 h-4"></i>
                     </div>
                     <div>
                        <p class="font-medium text-sm">${app.fullname} submitted an application</p>
                        <p class="text-xs text-muted-foreground">${formatDate(app.submissiondate)}</p>
                     </div>
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        } else {
          recentActivityDiv.innerHTML = '<p class="text-muted-foreground text-center py-4">No recent activity.</p>';
        }

        // Render Chart
        renderChart(apps);

        lucide.createIcons();
      } catch (error) {
        console.error('Dashboard load failed:', error);
      }
    }

    function renderChart(apps) {
      const ctx = document.getElementById('statusChart');
      if (!ctx) return;

      const statuses = {};
      apps.forEach(a => {
        statuses[a.status] = (statuses[a.status] || 0) + 1;
      });

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: Object.keys(statuses),
          datasets: [{
            data: Object.values(statuses),
            backgroundColor: [
              'rgba(245, 158, 11, 0.8)',
              'rgba(59, 130, 246, 0.8)',
              'rgba(16, 185, 129, 0.8)',
              'rgba(239, 68, 68, 0.8)',
              'rgba(107, 114, 128, 0.8)'
            ],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'right' }
          }
        }
      });
    }

    loadDashboardData();
  </script>
  <div id="footer-container"></div>
  <script src="/common.js"></script>
</body>

</html>
