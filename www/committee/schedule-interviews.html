<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Interviews - ScholarNet Committee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(214.3 31.8% 91.4%)',
                        input: 'hsl(214.3 31.8% 91.4%)',
                        ring: 'hsl(222.2 84% 4.9%)',
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(222.2 84% 4.9%)',
                        primary: {
                            DEFAULT: 'hsl(222.2 47.4% 11.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        secondary: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(222.2 47.4% 11.2%)',
                        },
                        destructive: {
                            DEFAULT: 'hsl(0 84.2% 60.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        muted: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(215.4 16.3% 46.9%)',
                        },
                        card: {
                            DEFAULT: 'hsl(0 0% 100%)',
                            foreground: 'hsl(222.2 84% 4.9%)',
                        },
                        success: {
                            DEFAULT: 'hsl(142.1 76.2% 36.3%)',
                            foreground: 'hsl(355.7 100% 97.3%)',
                        },
                    },
                }
            }
        }
    </script>
</head>

<body class="font-sans antialiased bg-muted/30">
    <div id="header-container"></div>

    <main class="min-h-screen py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold mb-2">Manage Interviews</h2>
                    <p class="text-muted-foreground">Schedule and manage interviews with scholarship applicants</p>
                </div>
                <button
                    class="px-6 py-3 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors flex items-center gap-2 font-medium">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    Schedule New Interview
                </button>
            </div>

            <div class="bg-card rounded-xl border border-border p-8 text-center">
                <div class="w-16 h-16 bg-muted rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="calendar" class="w-8 h-8 text-muted-foreground"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">No Interviews Scheduled</h3>
                <p class="text-muted-foreground mb-6 text-sm">You haven't scheduled any interviews yet. Click the button
                    above to get started.</p>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="/common.js"></script>
    <script>
        const token = localStorage.getItem('token') || sessionStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

        if (!token || user.role !== 'Committee') {
            window.location.href = '/login.html';
        }

        async function loadInterviews() {
            try {
                const response = await fetch('/api/applications', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                const shortlisted = (data.applications || []).filter(a => a.status === 'Shortlisted');

                const container = document.querySelector('main .max-w-7xl');
                const mainContent = container.querySelector('.bg-card');

                if (shortlisted.length > 0) {
                    mainContent.innerHTML = `
                        <table class="w-full text-left">
                            <thead class="bg-muted border-b border-border">
                                <tr>
                                    <th class="px-6 py-4 text-sm font-semibold">Applicant</th>
                                    <th class="px-6 py-4 text-sm font-semibold">Scholarship</th>
                                    <th class="px-6 py-4 text-sm font-semibold">Scores</th>
                                    <th class="px-6 py-4 text-sm font-semibold">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-border">
                                ${shortlisted.map(app => {
                        const score = app.evaluation ? app.evaluation.scores.reduce((acc, s) => acc + s.score, 0) : 'N/A';
                        return `
                                    <tr>
                                        <td class="px-6 py-4">
                                            <div class="font-medium">${app.fullname || 'Anonymous'}</div>
                                            <div class="text-xs text-muted-foreground">ID: ${app.applicationid}</div>
                                        </td>
                                        <td class="px-6 py-4 text-sm">
                                            ${app.scholarship_title}
                                        </td>
                                        <td class="px-6 py-4 font-semibold text-primary">
                                            ${score}
                                        </td>
                                        <td class="px-6 py-4">
                                            <a href="/committee/make-decision.html?id=${app.applicationid}" 
                                               class="text-primary hover:underline text-sm font-medium">Make Final Decision</a>
                                        </td>
                                    </tr>
                                    `;
                    }).join('')}
                            </tbody>
                        </table>
                    `;
                } else {
                    // Keep original placeholder
                }
                lucide.createIcons();
            } catch (e) {
                console.error(e);
            }
        }

        loadInterviews();
    </script>
</body>

</html>
