<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Interviews - ScholarNet Committee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(214.3 31.8% 91.4%)',
                        input: 'hsl(214.3 31.8% 91.4%)',
                        ring: 'hsl(222.2 84% 4.9%)',
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(222.2 84% 4.9%)',
                        primary: {
                            DEFAULT: 'hsl(222.2 47.4% 11.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        secondary: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(222.2 47.4% 11.2%)',
                        },
                        destructive: {
                            DEFAULT: 'hsl(0 84.2% 60.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        muted: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(215.4 16.3% 46.9%)',
                        },
                        card: {
                            DEFAULT: 'hsl(0 0% 100%)',
                            foreground: 'hsl(222.2 84% 4.9%)',
                        },
                        success: {
                            DEFAULT: 'hsl(142.1 76.2% 36.3%)',
                            foreground: 'hsl(355.7 100% 97.3%)',
                        },
                    },
                }
            }
        }
    </script>
</head>

<body class="font-sans antialiased bg-[#7A8691]">
    <div id="header-container"></div>

    <main class="min-h-screen py-12">
        <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold mb-2">Manage Interviews</h2>
                    <p class="text-black">Schedule and manage interviews with scholarship applicants</p>
                </div>
                <button onclick="openScheduleModal()"
                    class="px-6 py-3 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors flex items-center gap-2 font-medium">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    Schedule New Interview
                </button>
            </div>

            <!-- View Toggle -->
            <div class="mb-6 flex gap-2">
                <button id="calendarViewBtn" onclick="switchView('calendar')"
                    class="px-4 py-2 bg-primary text-primary-foreground rounded-lg">
                    <i data-lucide="calendar" class="w-4 h-4 inline"></i> Calendar View
                </button>
                <button id="listViewBtn" onclick="switchView('list')"
                    class="px-4 py-2 bg-muted text-foreground rounded-lg">
                    <i data-lucide="list" class="w-4 h-4 inline"></i> List View
                </button>
            </div>

            <!-- Calendar View -->
            <div id="calendarView" class="bg-card rounded-xl border border-border p-6">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="previousMonth()" class="p-2 hover:bg-muted rounded"><i
                            data-lucide="chevron-left"></i></button>
                    <h3 id="monthYear" class="text-xl font-bold"></h3>
                    <button onclick="nextMonth()" class="p-2 hover:bg-muted rounded"><i
                            data-lucide="chevron-right"></i></button>
                </div>
                <div id="calendar" class="grid grid-cols-7 gap-2"></div>
            </div>

            <!-- List View -->
            <div id="listView" class="hidden">
                <div class="bg-card rounded-xl border border-border overflow-hidden">
                    <div id="interviewsList"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Schedule Modal -->
    <div id="scheduleModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-card rounded-xl p-8 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">Schedule Interview</h3>
                <button onclick="closeScheduleModal()" class="text-muted-foreground hover:text-foreground">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="scheduleForm" onsubmit="submitSchedule(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Application</label>
                        <select id="evalIdInput" required class="w-full px-4 py-2 border border-input rounded-lg">
                            <option value="">Select an application...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Date & Time</label>
                        <input type="datetime-local" id="dateTimeInput" required
                            class="w-full px-4 py-2 border border-input rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Venue / Link</label>
                        <input type="text" id="venueInput" required placeholder="e.g., https://zoom.us/j/123456"
                            class="w-full px-4 py-2 border border-input rounded-lg">
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="submit"
                        class="flex-1 px-6 py-3 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 font-medium">
                        Schedule Interview
                    </button>
                    <button type="button" onclick="closeScheduleModal()"
                        class="px-6 py-3 border border-input rounded-lg hover:bg-muted">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-card rounded-xl p-8 max-w-2xl w-full mx-4">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">Edit Interview</h3>
                <button onclick="closeEditModal()" class="text-muted-foreground hover:text-foreground">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="editForm" onsubmit="submitEdit(event)">
                <input type="hidden" id="editIdInput">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Date & Time</label>
                        <input type="datetime-local" id="editDateTimeInput" required
                            class="w-full px-4 py-2 border border-input rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Venue / Link</label>
                        <input type="text" id="editVenueInput" required
                            class="w-full px-4 py-2 border border-input rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Status</label>
                        <select id="editStatusInput" class="w-full px-4 py-2 border border-input rounded-lg">
                            <option value="Scheduled">Scheduled</option>
                            <option value="Completed">Completed</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="submit"
                        class="flex-1 px-6 py-3 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 font-medium">
                        Update Interview
                    </button>
                    <button type="button" onclick="closeEditModal()"
                        class="px-6 py-3 border border-input rounded-lg hover:bg-muted">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="footer-container"></div>
    <script src="/common.js"></script>
    <script>
        const token = localStorage.getItem('token') || sessionStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

        if (!token || user.role !== 'Committee') {
            window.location.href = '/login.html';
        }

        let interviews = [];
        let applications = [];
        let currentDate = new Date();
        let currentView = 'calendar';

        async function loadData() {
            try {
                // Load interviews
                const interviewResponse = await fetch('/api/interviews', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const interviewData = await interviewResponse.json();
                interviews = interviewData.interviews || [];

                // Load applications for scheduling
                const appResponse = await fetch('/api/applications', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const appData = await appResponse.json();
                applications = (appData.applications || []).filter(a => a.status === 'Reviewed' || a.status === 'Shortlisted');

                populateApplicationSelector();
                if (currentView === 'calendar') {
                    renderCalendar();
                } else {
                    renderList();
                }
            } catch (e) {
                console.error('Failed to load data:', e);
            }
        }

        function populateApplicationSelector() {
            const select = document.getElementById('evalIdInput');
            select.innerHTML = '<option value="">Select an application...</option>';
            applications.forEach(app => {
                if (app.evaluation && app.evaluation.evalID) {
                    select.innerHTML += `<option value="${app.evaluation.evalID}">${app.fullname} - ${app.scholarship_title}</option>`;
                }
            });
        }

        function switchView(view) {
            currentView = view;
            if (view === 'calendar') {
                document.getElementById('calendarView').classList.remove('hidden');
                document.getElementById('listView').classList.add('hidden');
                document.getElementById('calendarViewBtn').className = 'px-4 py-2 bg-primary text-primary-foreground rounded-lg';
                document.getElementById('listViewBtn').className = 'px-4 py-2 bg-muted text-foreground rounded-lg';
                renderCalendar();
            } else {
                document.getElementById('calendarView').classList.add('hidden');
                document.getElementById('listView').classList.remove('hidden');
                document.getElementById('calendarViewBtn').className = 'px-4 py-2 bg-muted text-foreground rounded-lg';
                document.getElementById('listViewBtn').className = 'px-4 py-2 bg-primary text-primary-foreground rounded-lg';
                renderList();
            }
            lucide.createIcons();
        }

        function renderCalendar() {
            const monthYear = document.getElementById('monthYear');
            const calendar = document.getElementById('calendar');

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            monthYear.textContent = new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let html = '';
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayNames.forEach(day => {
                html += `<div class="text-center font-semibold text-sm py-2">${day}</div>`;
            });

            for (let i = 0; i < firstDay; i++) {
                html += '<div class="border border-border p-2 min-h-[100px] bg-muted/30"></div>';
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayInterviews = interviews.filter(i => i.dateTime && i.dateTime.startsWith(dateStr));

                html += `
                    <div class="border border-border p-2 min-h-[100px] hover:bg-muted/50 transition-colors">
                        <div class="font-semibold text-sm mb-2">${day}</div>
                        ${dayInterviews.map(i => `
                            <div class="text-xs bg-primary/10 text-primary p-1 rounded mb-1 cursor-pointer hover:bg-primary/20" onclick="openEditModal(${i.id})">
                                ${new Date(i.dateTime).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}
                                <br>${i.studentName || 'Unknown'}
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            calendar.innerHTML = html;
        }

        function renderList() {
            const list = document.getElementById('interviewsList');

            if (interviews.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-12">
                        <i data-lucide="calendar" class="w-12 h-12 text-muted-foreground mx-auto mb-4"></i>
                        <p class="text-muted-foreground">No interviews scheduled</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            list.innerHTML = `
                <table class="w-full">
                    <thead class="bg-muted border-b border-border">
                        <tr>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Student</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Scholarship</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Academic Info</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Date & Time</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Link/Venue</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Status</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-border">
                        ${interviews.map(i => `
                            <tr>
                                <td class="px-6 py-4">
                                    <div class="font-medium">${i.studentName || 'Unknown'}</div>
                                    <div class="text-xs text-muted-foreground">${i.studentId || ''}</div>
                                </td>
                                <td class="px-6 py-4 text-sm">${i.scholarshipTitle || 'N/A'}</td>
                                <td class="px-6 py-4 text-sm">
                                    ${i.cgpa ? `<div class="font-medium">CGPA: ${i.cgpa}</div>` : ''}
                                    ${i.major ? `<div class="text-xs text-muted-foreground">${i.major}</div>` : ''}
                                    ${i.yearOfStudy ? `<div class="text-xs text-muted-foreground">Year ${i.yearOfStudy}</div>` : ''}
                                </td>
                                <td class="px-6 py-4 text-sm">${new Date(i.dateTime).toLocaleString()}</td>
                                <td class="px-6 py-4 text-sm max-w-xs truncate">${i.venueOrLink}</td>
                                <td class="px-6 py-4">
                                    <span class="px-3 py-1 text-xs font-medium rounded-full ${i.status === 'Completed' ? 'bg-success/10 text-success' :
                    i.status === 'Cancelled' ? 'bg-destructive/10 text-destructive' :
                        'bg-blue-500/10 text-blue-600'
                }">${i.status}</span>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex gap-2">
                                        <button onclick="openEditModal(${i.id})" class="text-primary hover:underline text-sm">Edit</button>
                                        <button onclick="deleteInterview(${i.id})" class="text-destructive hover:underline text-sm">Delete</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        function openScheduleModal() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const minDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;

            const dateTimeInput = document.getElementById('dateTimeInput');
            dateTimeInput.min = minDateTime;

            document.getElementById('scheduleModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeScheduleModal() {
            document.getElementById('scheduleModal').classList.add('hidden');
            document.getElementById('scheduleForm').reset();
        }

        async function submitSchedule(e) {
            e.preventDefault();

            const evalId = document.getElementById('evalIdInput').value;
            const dateTime = document.getElementById('dateTimeInput').value;
            const venue = document.getElementById('venueInput').value;

            if (new Date(dateTime) < new Date()) {
                alert('Interview date cannot be in the past.');
                return;
            }

            try {
                const response = await fetch('/api/interviews', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ evalId, dateTime, venueOrLink: venue })
                });

                const result = await response.json();
                if (result.success) {
                    alert('Interview scheduled successfully!');
                    closeScheduleModal();
                    loadData();
                } else {
                    alert('Failed to schedule interview: ' + (result.error || 'Unknown error'));
                }
            } catch (e) {
                console.error(e);
                alert('Error scheduling interview');
            }
        }

        function openEditModal(id) {
            const interview = interviews.find(i => i.id === id);
            if (!interview) return;

            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const minDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;

            const editDateTimeInput = document.getElementById('editDateTimeInput');
            editDateTimeInput.min = minDateTime;

            document.getElementById('editIdInput').value = interview.id;
            document.getElementById('editDateTimeInput').value = interview.dateTime.substring(0, 16);
            document.getElementById('editVenueInput').value = interview.venueOrLink;
            document.getElementById('editStatusInput').value = interview.status;
            document.getElementById('editModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editForm').reset();
        }

        async function submitEdit(e) {
            e.preventDefault();

            const id = document.getElementById('editIdInput').value;
            const dateTime = document.getElementById('editDateTimeInput').value;
            const venue = document.getElementById('editVenueInput').value;
            const status = document.getElementById('editStatusInput').value;

            if (status === 'Scheduled' && new Date(dateTime) < new Date()) {
                alert('Interview date cannot be in the past.');
                return;
            }

            try {
                const response = await fetch('/api/interviews', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ action: 'update', id, dateTime, venueOrLink: venue, status })
                });

                const result = await response.json();
                if (result.success) {
                    alert('Interview updated successfully!');
                    closeEditModal();
                    loadData();
                } else {
                    alert('Failed to update interview: ' + (result.error || 'Unknown error'));
                }
            } catch (e) {
                console.error(e);
                alert('Error updating interview');
            }
        }

        async function deleteInterview(id) {
            if (!confirm('Are you sure you want to delete this interview?')) return;

            try {
                const response = await fetch(`/api/interviews?id=${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();
                if (result.success) {
                    alert('Interview deleted successfully!');
                    loadData();
                } else {
                    alert('Failed to delete interview: ' + (result.error || 'Unknown error'));
                }
            } catch (e) {
                console.error(e);
                alert('Error deleting interview');
            }
        }

        loadData();
    </script>
</body>

</html>
