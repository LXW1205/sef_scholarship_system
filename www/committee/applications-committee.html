<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviewed Applications - Digital Scholarship Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <!-- Committee Navigation -->
  <div id="header-container"></div>

  <main class="min-h-screen py-12">
    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
      <!-- Page Header -->
      <div class="flex justify-between items-center mb-8">
        <div>
          <h2 class="text-3xl font-bold mb-2">Reviewed Applications</h2>
          <p class="text-muted-foreground">View applications with reviewer scores and feedback</p>
        </div>
      </div>

      <!-- Filters -->
      <div class="bg-card rounded-xl border border-border p-6 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium mb-2">Score Range</label>
            <select id="scoreFilter"
              class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
              <option value="">All Scores</option>
              <option value="90-100">90-100 (Excellent)</option>
              <option value="80-89">80-89 (Very Good)</option>
              <option value="70-79">70-79 (Good)</option>
              <option value="0-69">Below 70</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Status</label>
            <select id="statusFilter"
              class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
              <option value="">All Statuses</option>
              <option value="Pending">Pending Decision</option>
              <option value="Shortlisted">Shortlisted</option>
              <option value="Approved">Approved</option>
              <option value="Rejected">Rejected</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Sort By</label>
            <select id="sortFilter"
              class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
              <option value="score-desc">Highest Score First</option>
              <option value="score-asc">Lowest Score First</option>
              <option value="date-desc">Most Recent</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Applications List -->
      <div id="applicationsList" class="space-y-4">
        <div class="flex items-center justify-center py-12">
          <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-muted-foreground"></i>
        </div>
      </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');

    if (!token || user.role !== 'Committee') {
      window.location.href = '/login.html';
    }


    let allApplications = [];
    async function loadApplications() {
      try {
        const response = await fetch('/api/applications', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();
        allApplications = data.applications || [];
        filterAndDisplay();
      } catch (error) {
        console.error('Failed to load applications:', error);
        document.getElementById('applicationsList').innerHTML = '<div class="text-center py-12 text-destructive">Failed to load applications</div>';
      }
    }

    function filterAndDisplay() {
      const scoreFilter = document.getElementById('scoreFilter').value;
      const statusFilter = document.getElementById('statusFilter').value;
      const sortFilter = document.getElementById('sortFilter').value;

      let filtered = [...allApplications];

      // Only show applications relevant to committee (Reviewed or further)
      // Unless they want to see everything, but usually committee acts on Reviewed
      if (!statusFilter) {
        filtered = filtered.filter(a => ['Reviewed', 'Shortlisted', 'Approved', 'Rejected'].includes(a.status));
      } else {
        filtered = filtered.filter(a => a.status === statusFilter);
      }

      if (scoreFilter) {
        const [min, max] = scoreFilter.split('-').map(Number);
        filtered = filtered.filter(a => {
          const score = a.evaluation ? calculateAvgScore(a.evaluation.scores) : 0;
          return score >= min && (max ? score <= max : true);
        });
      }

      if (sortFilter === 'score-desc') {
        filtered.sort((a, b) => (b.evaluation ? calculateAvgScore(b.evaluation.scores) : 0) - (a.evaluation ? calculateAvgScore(a.evaluation.scores) : 0));
      } else if (sortFilter === 'date-desc') {
        filtered.sort((a, b) => new Date(b.submissiondate) - new Date(a.submissiondate));
      }

      displayApplications(filtered);
    }

    function calculateAvgScore(scores) {
      if (!scores || scores.length === 0) return 0;
      const sum = scores.reduce((acc, s) => acc + s.score, 0);
      return sum; // Or sum / scores.length if normalized
    }

    function displayApplications(applications) {
      const list = document.getElementById('applicationsList');

      if (applications.length === 0) {
        list.innerHTML = `
          <div class="bg-card rounded-xl border border-border p-12 text-center">
            <i data-lucide="inbox" class="w-16 h-16 mx-auto mb-4 text-muted-foreground opacity-50"></i>
            <h3 class="text-xl font-bold mb-2">No Applications Found</h3>
            <p class="text-muted-foreground">No applications match your filters or are ready for review</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      list.innerHTML = applications.map(app => {
        const avgScore = app.evaluation ? calculateAvgScore(app.evaluation.scores) : 'N/A';
        return `
        <div class="bg-card rounded-xl border border-border p-6 hover:border-primary transition-all">
          <div class="flex items-start justify-between">
            <div class="flex items-start gap-4 flex-1">
              <div class="w-12 h-12 bg-primary/10 rounded-lg flex items-center justify-center flex-shrink-0">
                <i data-lucide="user" class="w-6 h-6 text-primary"></i>
              </div>
              <div class="flex-1">
                <div class="flex items-center gap-3 mb-2">
                  <h3 class="text-xl font-bold">${app.fullname || 'Anonymous'}</h3>
                  <span class="px-3 py-1 text-xs font-medium rounded-full ${app.status === 'Approved' ? 'bg-success/10 text-success' :
            app.status === 'Shortlisted' ? 'bg-blue-500/10 text-blue-600' :
              app.status === 'Rejected' ? 'bg-destructive/10 text-destructive' :
                'bg-yellow-500/10 text-yellow-600'
          }">${app.status}</span>
                </div>
                <p class="text-muted-foreground mb-3">${app.scholarship_title}</p>
                <div class="flex items-center gap-6 text-sm">
                  <div class="flex items-center gap-2">
                    <i data-lucide="star" class="w-4 h-4 text-yellow-500"></i>
                    <span class="font-semibold">Reviewer Score: ${avgScore}</span>
                  </div>
                  <div class="flex items-center gap-2 text-muted-foreground">
                    <i data-lucide="user-check" class="w-4 h-4"></i>
                    <span>Reviewer: ${app.reviewerName || 'Unknown'}</span>
                  </div>
                  <div class="flex items-center gap-2 text-muted-foreground">
                    <i data-lucide="calendar" class="w-4 h-4"></i>
                    <span>${new Date(app.submissiondate).toLocaleDateString()}</span>
                  </div>
                </div>
              </div>
            </div>
            <div class="flex gap-2">
              <a href="/committee/make-decision.html?id=${app.applicationid}" 
                class="px-4 py-2 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-medium inline-flex items-center gap-2">
                <i data-lucide="gavel" class="w-4 h-4"></i>
                ${app.status === 'Reviewed' ? 'Shortlist / Reject' : 'Final Decision'}
              </a>
            </div>
          </div>
        </div>
      `}).join('');

      lucide.createIcons();
    }

    document.getElementById('scoreFilter').onchange = filterAndDisplay;
    document.getElementById('statusFilter').onchange = filterAndDisplay;
    document.getElementById('sortFilter').onchange = filterAndDisplay;

    loadApplications();
    lucide.createIcons();
  </script>
  <div id="footer-container"></div>
  <script src="/common.js"></script>
</body>

</html>
