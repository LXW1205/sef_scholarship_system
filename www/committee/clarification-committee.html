<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarifications - Committee Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: 'hsl(214.3 31.8% 91.4%)',
                        input: 'hsl(214.3 31.8% 91.4%)',
                        ring: 'hsl(222.2 84% 4.9%)',
                        background: 'hsl(0 0% 100%)',
                        foreground: 'hsl(222.2 84% 4.9%)',
                        primary: {
                            DEFAULT: 'hsl(222.2 47.4% 11.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        secondary: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(222.2 47.4% 11.2%)',
                        },
                        destructive: {
                            DEFAULT: 'hsl(0 84.2% 60.2%)',
                            foreground: 'hsl(210 40% 98%)',
                        },
                        muted: {
                            DEFAULT: 'hsl(210 40% 96.1%)',
                            foreground: 'hsl(215.4 16.3% 46.9%)',
                        },
                        card: {
                            DEFAULT: 'hsl(0 0% 100%)',
                            foreground: 'hsl(222.2 84% 4.9%)',
                        },
                    },
                }
            }
        }
    </script>
</head>

<body class="font-sans antialiased bg-[#7A8691]">
    <div id="header-container"></div>

    <main class="max-w-[1600px] mx-auto py-8 px-4 sm:px-6 lg:px-8 min-h-screen">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-black">Manage Clarifications</h1>
            <p class="text-black mt-1">Request and view clarifications from reviewers.</p>
        </header>

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div class="flex items-center gap-4">
                <button onclick="document.getElementById('newRequestForm').classList.toggle('hidden')"
                    class="flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg hover:bg-opacity-90 transition-all shadow-sm">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> New Request
                </button>
                <div class="relative min-w-[200px]">
                    <select id="statusFilter" onchange="filterRequests()"
                        class="w-full pl-3 pr-10 py-2 bg-white border border-gray-200 rounded-lg appearance-none focus:outline-none focus:ring-2 focus:ring-primary/20">
                        <option value="All">All Requests</option>
                        <option value="Pending">Pending</option>
                        <option value="Answered">Answered</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>
        </div>

        <form id="newRequestForm" class="hidden mb-8 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h3 class="text-lg font-bold mb-4">Request Clarification</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-2">Select
                        Application</label>
                    <div class="relative">
                        <select id="appSelect" required
                            class="w-full pl-3 pr-10 py-2.5 bg-gray-50 border border-gray-200 rounded-lg appearance-none focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all font-medium text-gray-700">
                            <option value="">Loading applications...</option>
                        </select>
                        <div
                            class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
                            <i data-lucide="chevron-down" class="w-4 h-4"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mb-6">
                <label class="block text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-2">Your
                    Question</label>
                <textarea id="questionInput" rows="3"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all resize-none"
                    placeholder="What do you need clarification on?" required></textarea>
            </div>
            <div class="flex justify-end gap-3">
                <button type="button" onclick="document.getElementById('newRequestForm').classList.add('hidden')"
                    class="px-5 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-medium transition-colors">Cancel</button>
                <button type="submit" id="submitRequestBtn"
                    class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-opacity-90 transition-all shadow-md font-medium">
                    Submit Request
                </button>
            </div>
        </form>

        <div id="requestsList" class="space-y-4">
            <div class="p-8 text-center text-gray-500 bg-white rounded-xl border border-gray-200 shadow-sm">Loading
                requests...</div>
        </div>
    </main>

    <!-- Template for Request Item -->
    <template id="requestTemplate">
        <div
            class="request-item bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden transition-all hover:shadow-md">
            <button onclick="toggleAccordion(this)" class="w-full text-left p-6 focus:outline-none group">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-3 mb-2">
                            <span
                                class="status-badge inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider"></span>
                            <span class="date-text text-xs text-gray-400"></span>
                        </div>
                        <div class="flex flex-col gap-0.5 mb-1">
                            <span class="scholarship-title font-bold text-gray-900 leading-tight"></span>
                            <span class="reviewer-name text-xs text-gray-500"></span>
                        </div>
                        <p
                            class="question-preview text-sm text-gray-600 truncate group-hover:text-primary transition-colors">
                        </p>
                    </div>
                    <div class="flex items-center gap-4 text-gray-400 group-hover:text-primary transition-colors">
                        <i data-lucide="chevron-down"
                            class="accordion-icon w-5 h-5 transition-transform duration-200"></i>
                    </div>
                </div>
            </button>
            <div class="accordion-content hidden border-t border-gray-100 bg-gray-50/50">
                <div class="p-6 space-y-6">
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-2">Your Question</p>
                        <p class="question-full text-gray-700 whitespace-pre-wrap leading-relaxed"></p>
                    </div>

                    <div class="answer-section border-t border-gray-100 pt-6">
                        <p class="text-[10px] text-primary font-bold uppercase tracking-wider mb-2">Reviewer's Response
                        </p>
                        <div class="answer-content">
                            <p
                                class="answer-text text-gray-700 whitespace-pre-wrap leading-relaxed italic text-gray-400">
                                Waiting for reviewer response...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>
    </main>

    <div id="footer-container"></div>
    <script src="/common.js?v=3"></script>
    <script>
        let allRequests = [];

        function toggleAccordion(button) {
            const content = button.nextElementSibling;
            const icon = button.querySelector('.accordion-icon');
            const isHidden = content.classList.contains('hidden');

            document.querySelectorAll('.accordion-content').forEach(c => {
                if (c !== content) {
                    c.classList.add('hidden');
                    c.previousElementSibling.querySelector('.accordion-icon').style.transform = 'rotate(0deg)';
                }
            });

            if (isHidden) {
                content.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        function filterRequests() {
            const status = document.getElementById('statusFilter').value;
            renderRequests(status === 'All' ? allRequests : allRequests.filter(r => r.status === status));
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || "{}");

            if (!token || (user.role !== 'Committee' && user.role !== 'CommitteeMember')) {
                window.location.href = '/login.html';
                return;
            }

            loadRequests();
            loadReviewedApps();

            document.getElementById('newRequestForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const appId = document.getElementById('appSelect').value;
                const question = document.getElementById('questionInput').value;
                const btn = document.getElementById('submitRequestBtn');

                if (!appId) { alert('Please select an application'); return; }

                btn.disabled = true;
                btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Sending...';
                if (window.lucide) lucide.createIcons();

                try {
                    const res = await fetch('/api/clarifications', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ evalID: appId, question })
                    });

                    if (res.ok) {
                        document.getElementById('questionInput').value = '';
                        document.getElementById('newRequestForm').classList.add('hidden');
                        loadRequests();
                    } else {
                        alert('Failed to send request');
                    }
                } catch (err) {
                    alert('Error sending request');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Submit Request';
                    if (window.lucide) lucide.createIcons();
                }
            });
        });

        async function loadReviewedApps() {
            const select = document.getElementById('appSelect');
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            try {
                const res = await fetch('/api/applications', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Error loading applications');

                const dataRaw = await res.json();
                const data = dataRaw.applications || [];
                const reviewed = data.filter(a => a.status === 'Reviewed' && a.evaluation && a.evaluation.evalID);

                if (reviewed.length === 0) {
                    select.innerHTML = '<option value="">No reviewed apps found</option>';
                    return;
                }

                select.innerHTML = '<option value="">Select an Application</option>' +
                    reviewed.map(a => `<option value="${a.evaluation.evalID}">${a.fullname} - ${a.scholarship_title}</option>`).join('');

            } catch (err) {
                select.innerHTML = '<option value="">Error loading applications</option>';
            }
        }

        async function loadRequests() {
            const container = document.getElementById('requestsList');
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            try {
                const res = await fetch('/api/clarifications', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Error loading requests');
                allRequests = await res.json();
                renderRequests(allRequests);
            } catch (err) {
                container.innerHTML = `<div class="p-8 text-center text-red-500 bg-white rounded-xl border border-red-100 shadow-sm">Error loading data: ${err.message}</div>`;
            }
        }

        function renderRequests(data) {
            const container = document.getElementById('requestsList');
            const template = document.getElementById('requestTemplate');

            container.innerHTML = '';
            if (data.length === 0) {
                container.innerHTML = '<div class="p-12 text-center text-gray-500 bg-white rounded-xl border border-gray-200 shadow-sm"><i data-lucide="inbox" class="w-12 h-12 mx-auto mb-4 text-gray-300"></i> No requests found.</div>';
                if (window.lucide) lucide.createIcons();
                return;
            }

            data.forEach((r) => {
                const clone = template.content.cloneNode(true);
                const badge = clone.querySelector('.status-badge');
                badge.textContent = r.status;
                badge.className += r.status === 'Answered'
                    ? ' bg-green-50 text-green-700 border border-green-100'
                    : ' bg-amber-50 text-amber-700 border border-amber-100';

                clone.querySelector('.date-text').textContent = formatDate(r.requestedDate, true);
                clone.querySelector('.scholarship-title').textContent = r.scholarshipTitle || 'Scholarship App';
                clone.querySelector('.reviewer-name').textContent = `Reviewer: ${r.reviewerName || 'Unassigned'}`;
                clone.querySelector('.question-preview').textContent = r.question;
                clone.querySelector('.question-full').textContent = r.question;

                if (r.answer) {
                    const ansText = clone.querySelector('.answer-text');
                    ansText.textContent = r.answer;
                    ansText.classList.remove('italic', 'text-gray-400');
                    ansText.classList.add('text-gray-700');
                }
                container.appendChild(clone);
            });

            if (window.lucide) lucide.createIcons();
        }
    </script>
</body>

</html>
