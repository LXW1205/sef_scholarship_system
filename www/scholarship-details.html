<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarship Details - Digital Scholarship Portal</title>
  <!-- Using Tailwind CDN instead of Next.js CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Added Lucide icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased">
  <!-- Updated navigation with Tailwind classes -->
  <div id="header-container"></div>

  <main class="min-h-screen bg-background py-12">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <!-- Updated details container with Tailwind card styling -->
      <div>
        <div id="loadingMessage" class="text-center text-muted-foreground py-12">Loading scholarship details...</div>
        <div id="scholarshipDetails" class="bg-card text-card-foreground rounded-xl border border-border shadow-lg"
          style="display: none;">
          <div class="p-6 border-b border-border">
            <!-- Added arrow icon to back button -->
            <button onclick="window.history.back()"
              class="inline-flex items-center gap-2 px-4 py-2 bg-secondary text-secondary-foreground rounded-lg hover:bg-secondary/90 transition-colors font-medium mb-4">
              <i data-lucide="arrow-left" class="w-4 h-4"></i>
              Back
            </button>
            <div class="flex items-start justify-between gap-4">
              <h2 id="scholarshipTitle" class="text-3xl font-bold"></h2>
              <span id="scholarshipStatus" class="px-3 py-1 text-sm font-medium rounded-full"></span>
            </div>
          </div>

          <div class="p-6 space-y-8">
            <div>
              <div class="flex items-center gap-2 mb-3">
                <i data-lucide="file-text" class="w-5 h-5 text-primary"></i>
                <h3 class="text-xl font-semibold">Description</h3>
              </div>
              <p id="scholarshipDescription" class="text-muted-foreground leading-relaxed"></p>
            </div>

            <div>
              <div class="flex items-center gap-2 mb-3">
                <i data-lucide="graduation-cap" class="w-5 h-5 text-primary"></i>
                <h3 class="text-xl font-semibold">Required Qualification</h3>
              </div>
              <p id="scholarshipQualification" class="text-lg font-medium text-foreground"></p>
            </div>

            <div>
              <div class="flex items-center gap-2 mb-3">
                <i data-lucide="dollar-sign" class="w-5 h-5 text-primary"></i>
                <h3 class="text-xl font-semibold">Scholarship Amount</h3>
              </div>
              <p id="scholarshipAmount" class="text-2xl font-bold text-primary"></p>
            </div>

            <div>
              <div class="flex items-center gap-2 mb-3">
                <i data-lucide="calendar" class="w-5 h-5 text-primary"></i>
                <h3 class="text-xl font-semibold">Deadline</h3>
              </div>
              <p id="scholarshipDeadline" class="text-muted-foreground"></p>
            </div>

            <div>
              <div class="flex items-center gap-2 mb-3">
                <i data-lucide="check-circle" class="w-5 h-5 text-primary"></i>
                <h3 class="text-xl font-semibold">Evaluation Criteria</h3>
              </div>
              <div id="criteriaList" class="space-y-3 mb-6"></div>

              <!-- Eligibility Checker Section -->
              <div id="eligibilityChecker" class="bg-primary/5 border border-primary/20 rounded-xl p-6 mt-8"
                style="display: none;">
                <div class="flex items-center gap-2 mb-4">
                  <i data-lucide="calculator" class="w-5 h-5 text-primary"></i>
                  <h4 class="text-lg font-bold">Eligibility & Score Checker</h4>
                </div>
                <p class="text-sm text-muted-foreground mb-6">Enter your self-estimated values for each criterion to see
                  your match score.</p>
                <div id="checkerInputs" class="space-y-4"></div>
                <div class="mt-6 pt-6 border-t border-primary/20 flex items-center justify-between">
                  <div>
                    <span class="text-sm font-medium text-muted-foreground">Estimated Match Score:</span>
                    <div class="text-3xl font-bold text-primary"><span id="totalMatchScore">0.00</span> / <span
                        id="maxMatchScore">100</span></div>
                  </div>
                  <div id="matchVerdict" class="px-4 py-2 rounded-lg font-bold text-sm"></div>
                </div>
              </div>
            </div>

            <div id="applySection" class="pt-6 border-t border-border" style="display: none;">
              <button id="applyBtn"
                class="w-full px-6 py-4 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-semibold text-lg">
                Apply Now
              </button>
              <p id="applyMessage" class="mt-4 p-4 rounded-lg text-center" style="display: none;"></p>
            </div>
          </div>
        </div>
        <div id="errorMessage"
          class="text-destructive bg-destructive/10 border border-destructive/20 rounded-lg p-4 text-center"
          style="display: none;"></div>
      </div>
    </div>
  </main>


  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const scholarshipId = urlParams.get('id');

    async function loadScholarshipDetails() {
      const loadingMessage = document.getElementById('loadingMessage');
      const scholarshipDetails = document.getElementById('scholarshipDetails');
      const errorMessage = document.getElementById('errorMessage');

      if (!scholarshipId) {
        loadingMessage.style.display = 'none';
        errorMessage.textContent = 'Invalid scholarship ID';
        errorMessage.style.display = 'block';
        return;
      }

      try {
        const response = await fetch(`/api/scholarships/${scholarshipId}`);
        const data = await response.json();

        loadingMessage.style.display = 'none';

        if (response.ok) {
          const { scholarship, criteria } = data;

          document.getElementById('scholarshipTitle').textContent = scholarship.title;
          document.getElementById('scholarshipDescription').textContent = scholarship.description || 'No description available';
          document.getElementById('scholarshipAmount').textContent = scholarship.amount
            ? `${scholarship.amount.toLocaleString()}`
            : 'N/A';
          document.getElementById('scholarshipQualification').textContent = (scholarship.forQualification && scholarship.forQualification !== 'Any')
            ? scholarship.forQualification
            : 'Any Qualification';
          document.getElementById('scholarshipDeadline').textContent = scholarship.deadline
            ? new Date(scholarship.deadline).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
            : 'No deadline specified';

          const statusEl = document.getElementById('scholarshipStatus');
          statusEl.textContent = scholarship.isactive ? 'Active' : 'Inactive';
          statusEl.className = scholarship.isactive
            ? 'px-3 py-1 text-sm font-medium rounded-full bg-green-100 text-green-800'
            : 'px-3 py-1 text-sm font-medium rounded-full bg-gray-100 text-gray-800';

          const criteriaList = document.getElementById('criteriaList');
          if (criteria.length > 0) {
            criteriaList.innerHTML = criteria.map(c => `
              <div class="bg-muted/50 rounded-lg p-4 border border-border">
                <div class="font-semibold text-lg mb-2">${c.name}</div>
                <div class="flex gap-6 text-sm text-muted-foreground">
                  <span>Weight: <span class="font-medium text-foreground">${c.weightage}%</span></span>
                  <span>Max Score: <span class="font-medium text-foreground">${c.maxscore}</span></span>
                </div>
              </div>
            `).join('');

            // Setup Eligibility Checker
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (token && user.role === 'Student') {
              const checkerBody = document.getElementById('checkerInputs');
              const totalMax = criteria.reduce((sum, c) => sum + (c.maxscore || 0), 0);
              document.getElementById('maxMatchScore').textContent = totalMax.toFixed(2);

              checkerBody.innerHTML = criteria.map(c => {
                let mappedValue = '0';
                let isLocked = false;
                let mappingLabel = '';

                if (c.mappedField === 'cgpa') {
                  mappedValue = user.cgpa || '0';
                  isLocked = true;
                  mappingLabel = '<span class="text-[10px] bg-primary/10 text-primary px-1.5 py-0.5 rounded ml-2">Synced from Profile</span>';
                } else if (c.mappedField === 'familyIncome') {
                  mappedValue = user.familyIncome || '0';
                  isLocked = true;
                  mappingLabel = '<span class="text-[10px] bg-primary/10 text-primary px-1.5 py-0.5 rounded ml-2">Synced from Profile</span>';
                }

                return `
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-2 items-center">
                    <div class="flex items-center">
                      <label class="text-sm font-medium">${c.name} (Max: ${c.maxscore})</label>
                      ${mappingLabel}
                    </div>
                    <input type="number" class="checker-input w-full px-3 py-1.5 bg-background border border-input rounded-lg ${isLocked ? 'bg-muted/50 cursor-not-allowed' : ''}" 
                           data-max="${c.maxscore}" step="0.1" value="${mappedValue}" 
                           ${isLocked ? 'readonly' : ''} oninput="updateCheckerScore()">
                  </div>
                `;
              }).join('');
              document.getElementById('eligibilityChecker').style.display = 'block';
              updateCheckerScore();
            }
          } else {
            criteriaList.innerHTML = '<p class="text-muted-foreground">No criteria specified</p>';
          }

          // Show apply button if user is logged in as student
          const token = localStorage.getItem('token');
          const user = JSON.parse(localStorage.getItem('user') || '{}');
          if (token && user.role === 'Student' && scholarship.isactive) {
            document.getElementById('applySection').style.display = 'block';
          }

          scholarshipDetails.style.display = 'block';
        } else {
          errorMessage.textContent = data.error || 'Failed to load scholarship details';
          errorMessage.style.display = 'block';
        }
      } catch (error) {
        console.error('[v0] Load scholarship details error:', error);
        loadingMessage.style.display = 'none';
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'block';
      }
    }

    document.getElementById('applyBtn')?.addEventListener('click', () => {
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = '/login.html';
        return;
      }
      window.location.href = `/student/application-form.html?id=${scholarshipId}`;
    });

    function updateCheckerScore() {
      const inputs = document.querySelectorAll('.checker-input');
      let total = 0;
      let allHigherThanZero = true;

      inputs.forEach(input => {
        const val = parseFloat(input.value) || 0;
        const max = parseFloat(input.dataset.max) || 0;
        const score = Math.min(val, max);
        total += score;
        if (val <= 0) allHigherThanZero = false;
      });

      const maxTotal = parseFloat(document.getElementById('maxMatchScore').textContent);
      document.getElementById('totalMatchScore').textContent = total.toFixed(2);

      const verdict = document.getElementById('matchVerdict');
      const ratio = total / maxTotal;

      if (ratio >= 0.75) {
        verdict.textContent = 'High Match Potential';
        verdict.className = 'px-4 py-2 rounded-lg font-bold text-sm bg-green-500 text-white';
      } else if (ratio >= 0.5) {
        verdict.textContent = 'Moderate Match';
        verdict.className = 'px-4 py-2 rounded-lg font-bold text-sm bg-yellow-500 text-white';
      } else {
        verdict.textContent = 'Low Match';
        verdict.className = 'px-4 py-2 rounded-lg font-bold text-sm bg-red-500 text-white';
      }
    }

    loadScholarshipDetails();
  </script>
  <div id="footer-container"></div>
  <script src="common.js"></script>
</body>

</html>
