<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarship Details - Digital Scholarship Portal</title>
  <!-- Using Tailwind CDN instead of Next.js CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Added Lucide icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
          },
        }
      }
    }
  </script>
</head>
<body class="font-sans antialiased">
  <!-- Updated navigation with Tailwind classes -->
  <nav class="bg-primary text-primary-foreground border-b border-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center">
          <h1 class="text-xl font-bold">Digital Scholarship Portal</h1>
        </div>
        <div class="flex items-center gap-6" id="navLinks">
          <a href="index.html" class="hover:text-muted-foreground transition-colors">Home</a>
          <a href="scholarships.html" class="hover:text-muted-foreground transition-colors">Scholarships</a>
          <a href="login.html" id="loginLink" class="hover:text-muted-foreground transition-colors">Login</a>
          <a href="register.html" id="registerLink" class="hover:text-muted-foreground transition-colors">Register</a>
          <a href="dashboard.html" id="dashboardLink" style="display: none;" class="hover:text-muted-foreground transition-colors">Dashboard</a>
          <button id="logoutBtn" style="display: none;" class="px-4 py-2 bg-secondary text-secondary-foreground rounded-lg hover:bg-secondary/80 transition-colors">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="min-h-screen bg-background py-12">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <!-- Updated details container with Tailwind card styling -->
      <div>
        <div id="loadingMessage" class="text-center text-muted-foreground py-12">Loading scholarship details...</div>
        <div id="scholarshipDetails" class="bg-card text-card-foreground rounded-xl border border-border shadow-lg" style="display: none;">
          <div class="p-6 border-b border-border">
            <!-- Added arrow icon to back button -->
            <button onclick="window.history.back()" class="inline-flex items-center gap-2 px-4 py-2 bg-secondary text-secondary-foreground rounded-lg hover:bg-secondary/90 transition-colors font-medium mb-4">
              <i data-lucide="arrow-left" class="w-4 h-4"></i>
              Back
            </button>
            <div class="flex items-start justify-between gap-4">
              <h2 id="scholarshipTitle" class="text-3xl font-bold"></h2>
              <span id="scholarshipStatus" class="px-3 py-1 text-sm font-medium rounded-full"></span>
            </div>
          </div>

          <div class="p-6 space-y-8">
            <div>
              <div class="flex items-center gap-2 mb-3">
                <i data-lucide="file-text" class="w-5 h-5 text-primary"></i>
                <h3 class="text-xl font-semibold">Description</h3>
              </div>
              <p id="scholarshipDescription" class="text-muted-foreground leading-relaxed"></p>
            </div>

            <div>
              <div class="flex items-center gap-2 mb-3">
                <i data-lucide="calendar" class="w-5 h-5 text-primary"></i>
                <h3 class="text-xl font-semibold">Deadline</h3>
              </div>
              <p id="scholarshipDeadline" class="text-muted-foreground"></p>
            </div>

            <div>
              <div class="flex items-center gap-2 mb-3">
                <i data-lucide="check-circle" class="w-5 h-5 text-primary"></i>
                <h3 class="text-xl font-semibold">Evaluation Criteria</h3>
              </div>
              <div id="criteriaList" class="space-y-3"></div>
            </div>

            <div id="applySection" class="pt-6 border-t border-border" style="display: none;">
              <button id="applyBtn" class="w-full px-6 py-4 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-semibold text-lg">
                Apply Now
              </button>
              <p id="applyMessage" class="mt-4 p-4 rounded-lg text-center" style="display: none;"></p>
            </div>
          </div>
        </div>
        <div id="errorMessage" class="text-destructive bg-destructive/10 border border-destructive/20 rounded-lg p-4 text-center" style="display: none;"></div>
      </div>
    </div>
  </main>

  <script src="auth-check.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const scholarshipId = urlParams.get('id');

    async function loadScholarshipDetails() {
      const loadingMessage = document.getElementById('loadingMessage');
      const scholarshipDetails = document.getElementById('scholarshipDetails');
      const errorMessage = document.getElementById('errorMessage');

      if (!scholarshipId) {
        loadingMessage.style.display = 'none';
        errorMessage.textContent = 'Invalid scholarship ID';
        errorMessage.style.display = 'block';
        return;
      }

      try {
        const response = await fetch(`/api/scholarships/${scholarshipId}`);
        const data = await response.json();

        loadingMessage.style.display = 'none';

        if (response.ok) {
          const { scholarship, criteria } = data;

          document.getElementById('scholarshipTitle').textContent = scholarship.title;
          document.getElementById('scholarshipDescription').textContent = scholarship.description || 'No description available';
          document.getElementById('scholarshipDeadline').textContent = scholarship.deadline 
            ? new Date(scholarship.deadline).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
            : 'No deadline specified';

          const statusEl = document.getElementById('scholarshipStatus');
          statusEl.textContent = scholarship.isactive ? 'Active' : 'Inactive';
          statusEl.className = scholarship.isactive 
            ? 'px-3 py-1 text-sm font-medium rounded-full bg-green-100 text-green-800'
            : 'px-3 py-1 text-sm font-medium rounded-full bg-gray-100 text-gray-800';

          const criteriaList = document.getElementById('criteriaList');
          if (criteria.length > 0) {
            criteriaList.innerHTML = criteria.map(c => `
              <div class="bg-muted/50 rounded-lg p-4 border border-border">
                <div class="font-semibold text-lg mb-2">${c.name}</div>
                <div class="flex gap-6 text-sm text-muted-foreground">
                  <span>Weight: <span class="font-medium text-foreground">${c.weightage}%</span></span>
                  <span>Max Score: <span class="font-medium text-foreground">${c.maxscore}</span></span>
                </div>
              </div>
            `).join('');
          } else {
            criteriaList.innerHTML = '<p class="text-muted-foreground">No criteria specified</p>';
          }

          // Show apply button if user is logged in as student
          const token = localStorage.getItem('token');
          const user = JSON.parse(localStorage.getItem('user') || '{}');
          if (token && user.role === 'Student' && scholarship.isactive) {
            document.getElementById('applySection').style.display = 'block';
          }

          scholarshipDetails.style.display = 'block';
        } else {
          errorMessage.textContent = data.error || 'Failed to load scholarship details';
          errorMessage.style.display = 'block';
        }
      } catch (error) {
        console.error('[v0] Load scholarship details error:', error);
        loadingMessage.style.display = 'none';
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'block';
      }
    }

    document.getElementById('applyBtn')?.addEventListener('click', async () => {
      const applyBtn = document.getElementById('applyBtn');
      const applyMessage = document.getElementById('applyMessage');
      const token = localStorage.getItem('token');

      if (!token) {
        window.location.href = '/login.html';
        return;
      }

      applyBtn.disabled = true;
      applyBtn.textContent = 'Submitting...';
      applyBtn.className = 'w-full px-6 py-4 bg-primary/70 text-primary-foreground rounded-lg font-semibold text-lg cursor-not-allowed';

      try {
        const response = await fetch('/api/applications', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ scholarshipID: scholarshipId })
        });

        const data = await response.json();

        if (response.ok) {
          applyMessage.textContent = 'Application submitted successfully!';
          applyMessage.className = 'mt-4 p-4 rounded-lg text-center bg-green-50 text-green-800 border border-green-200';
          applyMessage.style.display = 'block';
          applyBtn.style.display = 'none';
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 2000);
        } else {
          applyMessage.textContent = data.error || 'Failed to submit application';
          applyMessage.className = 'mt-4 p-4 rounded-lg text-center bg-destructive/10 text-destructive border border-destructive/20';
          applyMessage.style.display = 'block';
          applyBtn.disabled = false;
          applyBtn.textContent = 'Apply Now';
          applyBtn.className = 'w-full px-6 py-4 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-semibold text-lg';
        }
      } catch (error) {
        console.error('[v0] Apply error:', error);
        applyMessage.textContent = 'An error occurred. Please try again.';
        applyMessage.className = 'mt-4 p-4 rounded-lg text-center bg-destructive/10 text-destructive border border-destructive/20';
        applyMessage.style.display = 'block';
        applyBtn.disabled = false;
        applyBtn.textContent = 'Apply Now';
        applyBtn.className = 'w-full px-6 py-4 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-semibold text-lg';
      }
    });

    loadScholarshipDetails();
  </script>
  <!-- Initialize Lucide icons -->
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
