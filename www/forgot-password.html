<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Digital Scholarship Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <div id="header-container"></div>

  <main class="min-h-screen">
    <div class="hero-image-bg min-h-screen flex flex-col items-center justify-start pt-32 pb-20 px-4 sm:px-6 lg:px-8">
      <div class="hero-overlay"></div>

      <div
        class="max-w-md w-full bg-white/90 backdrop-blur-xl text-card-foreground rounded-3xl border border-white/20 p-10 shadow-2xl relative z-10 transition-all animate-form">
        <!-- Interface I-001: Forgot Password Screen -->
        <div class="text-center mb-10">
          <div class="flex justify-center mb-6">
            <div class="w-20 h-20 bg-[#0f172a]/5 rounded-full flex items-center justify-center">
              <i data-lucide="key-round" class="w-10 h-10 text-[#0f172a]"></i>
            </div>
          </div>
          <h2 class="text-4xl font-black mb-3 text-[#0f172a] tracking-tight">Forgot Password?</h2>
          <p class="text-[#475569] font-medium leading-relaxed">Enter your details and we'll help you reset your access
          </p>
        </div>

        <form id="forgotPasswordForm" class="space-y-6">
          <div>
            <label for="userId" class="block text-sm font-bold text-[#0f172a] mb-2 pl-1">Student ID / Staff ID</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="id-card"
                  class="w-5 h-5 text-[#475569] group-focus-within:text-[#0f172a] transition-colors"></i>
              </div>
              <input type="text" id="userId" name="userId" required
                class="w-full pl-12 pr-4 py-4 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0f172a]/20 focus:border-[#0f172a] transition-all"
                placeholder="e.g. S2024001">
            </div>
          </div>

          <div>
            <label for="fullName" class="block text-sm font-bold text-[#0f172a] mb-2 pl-1">Full Name</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="user"
                  class="w-5 h-5 text-[#475569] group-focus-within:text-[#0f172a] transition-colors"></i>
              </div>
              <input type="text" id="fullName" name="fullName" required
                class="w-full pl-12 pr-4 py-4 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0f172a]/20 focus:border-[#0f172a] transition-all"
                placeholder="Enter your full name">
            </div>
          </div>

          <div>
            <label for="role" class="block text-sm font-bold text-[#0f172a] mb-2 pl-1">Role</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="users"
                  class="w-5 h-5 text-[#475569] group-focus-within:text-[#0f172a] transition-colors"></i>
              </div>
              <select id="role" name="role" required
                class="w-full pl-12 pr-10 py-4 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0f172a]/20 focus:border-[#0f172a] transition-all appearance-none">
                <option value="">Select your role</option>
                <option value="Student">Student</option>
                <option value="Reviewer">Reviewer</option>
                <option value="Committee">Committee</option>
                <option value="Admin">Admin</option>
              </select>
            </div>
          </div>

          <div id="errorMessage"
            class="text-destructive bg-destructive/10 border border-destructive/20 rounded-2xl p-4 text-sm flex items-center gap-3"
            style="display: none;">
            <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
            <span id="errorText" class="font-medium"></span>
          </div>

          <div class="flex gap-4 pt-4">
            <button type="button" onclick="window.location.href='login.html'"
              class="flex-1 px-6 py-4 bg-slate-100 text-[#0f172a] rounded-2xl hover:bg-slate-200 transition-all font-bold flex items-center justify-center gap-2">
              <i data-lucide="arrow-left" class="w-5 h-5"></i>
              Back
            </button>
            <button type="submit" id="resetButton"
              class="flex-1 px-6 py-4 bg-[#0c0a09] text-white rounded-2xl hover:bg-[#1c1917] transition-all font-bold flex items-center justify-center gap-3 shadow-xl hover:scale-[1.02] active:scale-[0.98]">
              <i data-lucide="shield-check" class="w-5 h-5"></i>
              Verify
            </button>
          </div>
        </form>
      </div>
      <div class="fade-to-solid"></div>
    </div>
  </main>

  <script>
    const forgotPasswordForm = document.getElementById('forgotPasswordForm');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const resetButton = document.getElementById('resetButton');

    forgotPasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.style.display = 'none';

      const id = document.getElementById('userId').value;
      const fullName = document.getElementById('fullName').value;
      const role = document.getElementById('role').value;

      resetButton.disabled = true;
      resetButton.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Verifying...';
      lucide.createIcons();

      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, fullName, role })
        });

        const data = await response.json();

        if (response.ok) {
          // data.resetToken contains the userID
          window.location.href = '/reset-password.html?token=' + encodeURIComponent(data.resetToken);
        } else {
          errorText.textContent = data.error || 'Verification failed';
          errorMessage.style.display = 'flex';
          lucide.createIcons();

          resetButton.disabled = false;
          resetButton.innerHTML = '<i data-lucide="shield-check" class="w-5 h-5"></i> Verify';
          lucide.createIcons();
        }
      } catch (error) {
        console.error('[v0] Forgot password error:', error);
        errorText.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'flex';
        lucide.createIcons();

        resetButton.disabled = false;
        resetButton.innerHTML = '<i data-lucide="shield-check" class="w-5 h-5"></i> Verify';
        lucide.createIcons();
      }
    });
  </script>
  <div id="footer-container"></div>
  <script src="common.js"></script>
</body>

</html>
