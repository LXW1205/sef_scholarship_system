<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ScholarNet</title>
  <!-- Using Tailwind CDN instead of Next.js CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Added Lucide icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <!-- Navigation with Tailwind styling -->
  <nav class="bg-primary text-primary-foreground border-b border-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
          <i data-lucide="graduation-cap" class="w-6 h-6"></i>
          <h1 class="text-xl font-bold">ScholarNet</h1>
        </div>
        <div class="flex items-center gap-8">
          <a href="index.html"
            class="hover:text-muted-foreground transition-colors inline-flex items-center gap-2 whitespace-nowrap"
            style="display: inline-flex; flex-direction: row; align-items: center;">
            <i data-lucide="home" class="w-4 h-4"></i>
            <span>Home</span>
          </a>
          <a href="scholarships.html"
            class="hover:text-muted-foreground transition-colors inline-flex items-center gap-2 whitespace-nowrap"
            style="display: inline-flex; flex-direction: row; align-items: center;">
            <i data-lucide="book-open" class="w-4 h-4"></i>
            <span>Scholarships</span>
          </a>
          <a href="login.html"
            class="hover:text-muted-foreground transition-colors inline-flex items-center gap-2 whitespace-nowrap"
            style="display: inline-flex; flex-direction: row; align-items: center;">
            <i data-lucide="log-in" class="w-4 h-4"></i>
            <span>Login</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <main class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <!-- Registration form with Tailwind grid layout -->
    <div class="max-w-md w-full bg-card text-card-foreground rounded-xl border border-border p-8 shadow-lg">
      <!-- Added icon to the header -->
      <div class="text-center mb-8">
        <div class="flex justify-center mb-4">
          <i data-lucide="user-plus" class="w-16 h-16 text-primary"></i>
        </div>
        <h2 class="text-3xl font-bold mb-2">Create Account</h2>
        <p class="text-muted-foreground">Register as a student to start applying for scholarships</p>
      </div>

      <form id="registerForm" class="space-y-4">
        <div>
          <label for="fullName" class="block text-sm font-medium mb-2">Full Name</label>
          <input type="text" id="fullName" name="fullName" required
            class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
        </div>

        <div>
          <label for="studentID" class="block text-sm font-medium mb-2">Student ID</label>
          <input type="text" id="studentID" name="studentID" placeholder="e.g., S2024001" required
            class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
        </div>

        <div>
          <label for="email" class="block text-sm font-medium mb-2">Email</label>
          <input type="email" id="email" name="email" required
            class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
        </div>

        <div>
          <label for="username" class="block text-sm font-medium mb-2">Username</label>
          <input type="text" id="username" name="username" required
            class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium mb-2">Password</label>
          <input type="password" id="password" name="password" required minlength="6"
            class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium mb-2">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6"
            class="w-full px-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring">
        </div>

        <div id="errorMessage"
          class="text-destructive bg-destructive/10 border border-destructive/20 rounded-lg p-3 text-sm"
          style="display: none;"></div>
        <div id="successMessage" class="text-green-700 bg-green-50 border border-green-200 rounded-lg p-3 text-sm"
          style="display: none;"></div>

        <button type="submit"
          class="w-full px-4 py-3 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-medium">
          Register
        </button>
      </form>

      <p class="text-center text-sm text-muted-foreground mt-6">
        Already have an account? <a href="login.html" class="text-primary hover:underline">Login here</a>
      </p>
    </div>
  </main>

  <script>
    const registerForm = document.getElementById('registerForm');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        errorMessage.textContent = 'Passwords do not match';
        errorMessage.style.display = 'block';
        return;
      }

      const formData = {
        fullName: document.getElementById('fullName').value,
        studentID: document.getElementById('studentID').value,
        email: document.getElementById('email').value,
        username: document.getElementById('username').value,
        password: password,
        role: 'Student'
      };

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (response.ok) {
          successMessage.textContent = 'Registration successful! Redirecting to login...';
          successMessage.style.display = 'block';
          setTimeout(() => {
            window.location.href = '/login.html';
          }, 2000);
        } else {
          errorMessage.textContent = data.error || 'Registration failed';
          errorMessage.style.display = 'block';
        }
      } catch (error) {
        console.error('[v0] Registration error:', error);
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'block';
      }
    });
  </script>
  <!-- Initialize Lucide icons -->
  <script>
    lucide.createIcons();
  </script>
</body>

</html>
