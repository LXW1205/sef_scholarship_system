<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ScholarNet</title>
  <!-- Using Tailwind CDN instead of Next.js CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Added Lucide icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <!-- Navigation with Tailwind styling -->
  <div id="header-container"></div>

  <main class="min-h-screen">
    <div class="hero-image-bg min-h-screen flex flex-col items-center justify-start pt-32 pb-20 px-4 sm:px-6 lg:px-8">
      <div class="hero-overlay"></div>

      <div
        class="max-w-md w-full bg-white/90 backdrop-blur-xl text-card-foreground rounded-3xl border border-white/20 p-10 shadow-2xl relative z-10 transition-all animate-form">
        <div class="text-center mb-10">
          <div class="flex justify-center mb-6">
            <div class="w-20 h-20 bg-[#0f172a]/5 rounded-full flex items-center justify-center animate-float">
              <i data-lucide="user-plus" class="w-10 h-10 text-[#0f172a]"></i>
            </div>
          </div>
          <h2 class="text-4xl font-black mb-3 text-[#0f172a] tracking-tight">Create Account</h2>
          <p class="text-[#475569] font-medium leading-relaxed">Register as a student to start applying for scholarships
          </p>
        </div>

        <form id="registerForm" class="space-y-4">
          <div>
            <label for="fullName" class="block text-sm font-bold text-[#0f172a] mb-2 pl-1">Full Name</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="user"
                  class="w-5 h-5 text-[#475569] group-focus-within:text-[#0f172a] transition-colors"></i>
              </div>
              <input type="text" id="fullName" name="fullName" required
                class="w-full pl-12 pr-4 py-3 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0f172a]/20 focus:border-[#0f172a] transition-all"
                placeholder="Enter your full name">
            </div>
          </div>

          <div>
            <label for="studentID" class="block text-sm font-bold text-[#0f172a] mb-2 pl-1">Student ID</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="contact-2"
                  class="w-5 h-5 text-[#475569] group-focus-within:text-[#0f172a] transition-colors"></i>
              </div>
              <input type="text" id="studentID" name="studentID" placeholder="e.g., S2024001" required
                class="w-full pl-12 pr-4 py-3 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0f172a]/20 focus:border-[#0f172a] transition-all">
            </div>
          </div>

          <div>
            <label for="email" class="block text-sm font-bold text-[#0f172a] mb-2 pl-1">Email Address</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="mail"
                  class="w-5 h-5 text-[#475569] group-focus-within:text-[#0f172a] transition-colors"></i>
              </div>
              <input type="email" id="email" name="email" required
                class="w-full pl-12 pr-4 py-3 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0f172a]/20 focus:border-[#0f172a] transition-all"
                placeholder="Enter your email">
            </div>
          </div>

          <div>
            <label for="password" class="block text-sm font-bold text-[#0f172a] mb-2 pl-1">Password</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="lock"
                  class="w-5 h-5 text-[#475569] group-focus-within:text-[#0f172a] transition-colors"></i>
              </div>
              <input type="password" id="password" name="password" required minlength="6"
                class="w-full pl-12 pr-4 py-3 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0f172a]/20 focus:border-[#0f172a] transition-all"
                placeholder="Create password">
            </div>
          </div>

          <div>
            <label for="confirmPassword" class="block text-sm font-bold text-[#0f172a] mb-2 pl-1">Confirm
              Password</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="shield-check"
                  class="w-5 h-5 text-[#475569] group-focus-within:text-[#0f172a] transition-colors"></i>
              </div>
              <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6"
                class="w-full pl-12 pr-4 py-3 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0f172a]/20 focus:border-[#0f172a] transition-all"
                placeholder="Confirm password">
            </div>
          </div>

          <div id="errorMessage"
            class="text-destructive bg-destructive/10 border border-destructive/20 rounded-2xl p-4 text-sm font-medium"
            style="display: none;"></div>
          <div id="successMessage"
            class="text-green-700 bg-green-50 border border-green-200 rounded-2xl p-4 text-sm font-medium"
            style="display: none;"></div>

          <button type="submit"
            class="w-full px-6 py-4 bg-[#0c0a09] text-white rounded-2xl hover:bg-[#1c1917] transition-all font-bold flex items-center justify-center gap-3 shadow-xl hover:scale-[1.02] active:scale-[0.98] btn-3d shine-effect">
            <i data-lucide="user-plus" class="w-5 h-5"></i>
            Create Account Now
          </button>
        </form>

        <p class="text-center text-sm text-[#475569] font-medium mt-10">
          Already have an account? <a href="login.html" class="text-[#0f172a] font-black hover:underline">Login here</a>
        </p>
      </div>
      <div class="fade-to-solid"></div>
    </div>
  </main>

  <script>
    const registerForm = document.getElementById('registerForm');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        errorMessage.textContent = 'Passwords do not match';
        errorMessage.style.display = 'block';
        return;
      }

      const formData = {
        fullName: document.getElementById('fullName').value,
        studentID: document.getElementById('studentID').value,
        email: document.getElementById('email').value,
        password: password,
        role: 'Student'
      };

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (response.ok) {
          successMessage.textContent = 'Registration successful! Redirecting to login...';
          successMessage.style.display = 'block';
          setTimeout(() => {
            window.location.href = '/login.html';
          }, 2000);
        } else {
          errorMessage.textContent = data.error || 'Registration failed';
          errorMessage.style.display = 'block';
        }
      } catch (error) {
        console.error('[v0] Registration error:', error);
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'block';
      }
    });
  </script>
  <div id="footer-container"></div>
  <script src="common.js"></script>
</body>

</html>
