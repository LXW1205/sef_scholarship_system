<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Digital Scholarship Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased bg-muted/30">
  <div id="header-container"></div>

  <main class="min-h-screen">
    <div class="hero-image-bg min-h-screen flex flex-col items-center justify-start pt-32 pb-20 px-4 sm:px-6 lg:px-8">
      <div class="hero-overlay"></div>

      <div
        class="max-w-md w-full bg-white/90 backdrop-blur-xl text-card-foreground rounded-3xl border border-white/20 p-10 shadow-2xl relative z-10 transition-all animate-form">
        <div class="text-center mb-10">
          <div class="flex justify-center mb-6">
            <div class="w-20 h-20 bg-[#0f172a]/5 rounded-full flex items-center justify-center">
              <i data-lucide="shield-check" class="w-10 h-10 text-[#0f172a]"></i>
            </div>
          </div>
          <h2 class="text-4xl font-black mb-3 text-[#0f172a] tracking-tight">Reset Password</h2>
          <p class="text-[#475569] font-medium leading-relaxed">Enter your new secure password below</p>
        </div>

        <form id="resetPasswordForm" class="space-y-6">
          <div>
            <label for="password" class="block text-sm font-bold text-[#0f172a] mb-2 pl-1">New Password</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="lock"
                  class="w-5 h-5 text-[#475569] group-focus-within:text-[#0f172a] transition-colors"></i>
              </div>
              <input type="password" id="password" name="password" required minlength="8"
                class="w-full pl-12 pr-4 py-4 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0f172a]/20 focus:border-[#0f172a] transition-all"
                placeholder="Enter new password">
            </div>
            <p class="text-xs text-[#475569] mt-2 font-medium pl-1">Must be at least 8 characters long</p>
          </div>

          <div>
            <label for="confirmPassword" class="block text-sm font-bold text-[#0f172a] mb-2 pl-1">Confirm
              Password</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="lock"
                  class="w-5 h-5 text-[#475569] group-focus-within:text-[#0f172a] transition-colors"></i>
              </div>
              <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8"
                class="w-full pl-12 pr-4 py-4 bg-white/50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#0f172a]/20 focus:border-[#0f172a] transition-all"
                placeholder="Confirm new password">
            </div>
          </div>

          <div id="errorMessage"
            class="text-destructive bg-destructive/10 border border-destructive/20 rounded-2xl p-4 text-sm flex items-center gap-3"
            style="display: none;">
            <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
            <span id="errorText" class="font-medium"></span>
          </div>

          <div id="successMessage"
            class="text-green-700 bg-green-50 border border-green-200 rounded-2xl p-4 text-sm flex items-center gap-3"
            style="display: none;">
            <i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0"></i>
            <span id="successText" class="font-medium"></span>
          </div>

          <button type="submit" id="resetButton"
            class="w-full px-6 py-4 bg-[#0c0a09] text-white rounded-2xl hover:bg-[#1c1917] transition-all font-bold flex items-center justify-center gap-3 shadow-xl hover:scale-[1.02] active:scale-[0.98]">
            <i data-lucide="check" class="w-5 h-5"></i>
            Reset Password Now
          </button>
        </form>
      </div>
      <div class="fade-to-solid"></div>
    </div>
  </main>

  <script>
    const resetPasswordForm = document.getElementById('resetPasswordForm');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const successMessage = document.getElementById('successMessage');
    const successText = document.getElementById('successText');
    const resetButton = document.getElementById('resetButton');

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      errorText.textContent = 'Invalid reset link. Please request a new password reset.';
      errorMessage.style.display = 'flex';
      resetButton.disabled = true;
      lucide.createIcons();
    }

    resetPasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        errorText.textContent = 'Passwords do not match';
        errorMessage.style.display = 'flex';
        lucide.createIcons();
        return;
      }

      resetButton.disabled = true;
      resetButton.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Resetting...';
      lucide.createIcons();

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await response.json();

        if (response.ok) {
          successText.textContent = 'Password reset successful! Redirecting to login...';
          successMessage.style.display = 'flex';
          lucide.createIcons();

          setTimeout(() => {
            window.location.href = '/login.html';
          }, 2000);
        } else {
          errorText.textContent = data.error || 'Failed to reset password';
          errorMessage.style.display = 'flex';
          lucide.createIcons();

          resetButton.disabled = false;
          resetButton.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i> Reset Password';
          lucide.createIcons();
        }
      } catch (error) {
        console.error('[v0] Reset password error:', error);
        errorText.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'flex';
        lucide.createIcons();

        resetButton.disabled = false;
        resetButton.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i> Reset Password';
        lucide.createIcons();
      }
    });
  </script>
  <div id="footer-container"></div>
  <script src="common.js"></script>
</body>

</html>
