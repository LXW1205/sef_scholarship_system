<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Digital Scholarship Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(214.3 31.8% 91.4%)',
            input: 'hsl(214.3 31.8% 91.4%)',
            ring: 'hsl(222.2 84% 4.9%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(222.2 84% 4.9%)',
            primary: {
              DEFAULT: 'hsl(222.2 47.4% 11.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            secondary: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(222.2 47.4% 11.2%)',
            },
            destructive: {
              DEFAULT: 'hsl(0 84.2% 60.2%)',
              foreground: 'hsl(210 40% 98%)',
            },
            muted: {
              DEFAULT: 'hsl(210 40% 96.1%)',
              foreground: 'hsl(215.4 16.3% 46.9%)',
            },
            card: {
              DEFAULT: 'hsl(0 0% 100%)',
              foreground: 'hsl(222.2 84% 4.9%)',
            },
            success: {
              DEFAULT: 'hsl(142.1 76.2% 36.3%)',
              foreground: 'hsl(355.7 100% 97.3%)',
            },
          },
        }
      }
    }
  </script>
</head>
<body class="font-sans antialiased bg-muted/30">
  <nav class="bg-primary text-primary-foreground border-b border-border">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
          <i data-lucide="graduation-cap" class="w-6 h-6"></i>
          <h1 class="text-xl font-bold">Digital Scholarship Portal</h1>
        </div>
      </div>
    </div>
  </nav>

  <main class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-card text-card-foreground rounded-xl border border-border p-8 shadow-lg">
      <div class="text-center mb-8">
        <div class="flex justify-center mb-4">
          <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center">
            <i data-lucide="shield-check" class="w-8 h-8 text-primary"></i>
          </div>
        </div>
        <h2 class="text-3xl font-bold mb-2">Reset Your Password</h2>
        <p class="text-muted-foreground">Enter your new password below</p>
      </div>
      
      <form id="resetPasswordForm" class="space-y-6">
        <div>
          <label for="password" class="block text-sm font-medium mb-2">New Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="lock" class="w-5 h-5 text-muted-foreground"></i>
            </div>
            <input type="password" id="password" name="password" required minlength="8"
              class="w-full pl-10 pr-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
              placeholder="Enter new password">
          </div>
          <p class="text-xs text-muted-foreground mt-1">Must be at least 8 characters long</p>
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium mb-2">Confirm New Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="lock" class="w-5 h-5 text-muted-foreground"></i>
            </div>
            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8"
              class="w-full pl-10 pr-4 py-2 bg-background border border-input rounded-lg focus:outline-none focus:ring-2 focus:ring-ring"
              placeholder="Confirm new password">
          </div>
        </div>

        <div id="errorMessage" class="text-destructive bg-destructive/10 border border-destructive/20 rounded-lg p-3 text-sm flex items-center gap-2" style="display: none;">
          <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
          <span id="errorText"></span>
        </div>

        <div id="successMessage" class="text-success bg-success/10 border border-success/20 rounded-lg p-3 text-sm flex items-center gap-2" style="display: none;">
          <i data-lucide="check-circle" class="w-4 h-4 flex-shrink-0"></i>
          <span id="successText"></span>
        </div>

        <button type="submit" id="resetButton" 
          class="w-full px-4 py-3 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors font-medium flex items-center justify-center gap-2">
          <i data-lucide="check" class="w-5 h-5"></i>
          Reset Password
        </button>
      </form>
    </div>
  </main>

  <script>
    const resetPasswordForm = document.getElementById('resetPasswordForm');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const successMessage = document.getElementById('successMessage');
    const successText = document.getElementById('successText');
    const resetButton = document.getElementById('resetButton');

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      errorText.textContent = 'Invalid reset link. Please request a new password reset.';
      errorMessage.style.display = 'flex';
      resetButton.disabled = true;
      lucide.createIcons();
    }

    resetPasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        errorText.textContent = 'Passwords do not match';
        errorMessage.style.display = 'flex';
        lucide.createIcons();
        return;
      }

      resetButton.disabled = true;
      resetButton.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Resetting...';
      lucide.createIcons();

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await response.json();

        if (response.ok) {
          successText.textContent = 'Password reset successful! Redirecting to login...';
          successMessage.style.display = 'flex';
          lucide.createIcons();
          
          setTimeout(() => {
            window.location.href = '/login.html';
          }, 2000);
        } else {
          errorText.textContent = data.error || 'Failed to reset password';
          errorMessage.style.display = 'flex';
          lucide.createIcons();
          
          resetButton.disabled = false;
          resetButton.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i> Reset Password';
          lucide.createIcons();
        }
      } catch (error) {
        console.error('[v0] Reset password error:', error);
        errorText.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'flex';
        lucide.createIcons();
        
        resetButton.disabled = false;
        resetButton.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i> Reset Password';
        lucide.createIcons();
      }
    });

    lucide.createIcons();
  </script>
</body>
</html>
